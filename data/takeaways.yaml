# Per-county editorial takeaways rendered on /county/<slug> landing pages.
# Schema:
#   <slug>:
#     last_updated: ISO date
#     takeaways:
#       - text: 1-2 sentence bullet. No em/en dashes, no semicolons.
#         source: 1-line provenance (data file path, Census table, or sources[N] URL ref).
#     sources:
#       - URL fetched while researching this county.
#
# Bullets contextualize the rendered stats with demographics or a single
# distinctive local fact. The build script reads this file and renders a
# "Key takeaways" section between the stats grid and the campus list.

wi-racine:
  last_updated: '2026-05-17'
  takeaways:
  - text: 27,694 people live in Mount Pleasant village. The two Microsoft campuses on the old Foxconn parcel add up to 3.3 GW of announced load, roughly 120 kW of AI compute per resident.
    source: Census ACS 2023 B01003 (Mount Pleasant village, WI) + data/sites/data_centers.csv
  - text: The We Energies residential rate rose from 17.3 cents to 19.2 cents per kWh from 2021 to 2023, an 11.4% jump. On an average 10,800 kWh household, that is about $213 more per year on bills, against a county median income of $75,331.
    source: data/cache/utility_rate_yoy.csv (Wisconsin Electric Power Co, WI) + Census ACS 2023 B19013
  - text: Microsoft bought the 315-acre Mount Pleasant parcel for $50 million in April 2023, eight years after Wisconsin pledged $3 billion to $4.8 billion in subsidies for a Foxconn LCD plant that never opened. The state recovered most of those credits when the Foxconn deal was renegotiated down to $672 million in 2021.
    source: 'sources[0] (Wikipedia: Foxconn in Wisconsin)'
  - text: County home prices are up 24.9% on a 3-year baseline, the steepest of any top-10 AI county, while property tax growth has been held to 4.1% by the local TIF financing that backed the original Foxconn deal.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 55101)
  sources:
  - https://en.wikipedia.org/wiki/Foxconn_in_Wisconsin
  - https://blogs.microsoft.com/blog/2025/09/18/inside-the-worlds-most-powerful-ai-datacenter/
  demographics:
  - text: Racine is 10.6% Black, 14.6% Hispanic, and 1.2% Asian against a 74.2% white share. The Black population share is the largest of any Wisconsin county in this batch and more than seven times Ozaukee's 1.5% next door.
    source: Census ACS 2023 B02001, B03003 (FIPS 55101)
  - text: 20.8% of Racine workers are in manufacturing, the second-highest manufacturing share in this batch behind Dodge. Median gross rent is $1,017 per month, lower than Ozaukee's $1,112 despite Racine being a much larger labor market.
    source: Census ACS 2023 C24050, B25064 (FIPS 55101)
  - text: Unemployment in Racine is 4.2% and 10.8% of residents live below the poverty line. Both numbers run roughly double Ozaukee's despite the same We Energies rate environment and roughly 60 miles of separation.
    source: Census ACS 2023 B23025, B17001 (FIPS 55101)
  - text: 90.0% of Racine households have a home broadband subscription and 6.6% of adults are veterans. The broadband share trails Ozaukee's 93.0% by 3 points despite the Foxconn-era fiber investment in Mount Pleasant.
    source: Census ACS 2023 B28002, B21001 (FIPS 55101)
wy-laramie:
  last_updated: '2026-05-17'
  takeaways:
  - text: Cheyenne has 64,976 residents. The three announced campuses (Crusoe, Meta, Microsoft) add 2.6 GW of load to a city that today draws roughly 250 MW for everything else.
    source: Census ACS 2023 B01003 (Cheyenne city, WY) + data/sites/data_centers.csv
  - text: Cheyenne Light Fuel & Power residential rates rose from 15.0 to 17.0 cents per kWh from 2021 to 2023, a 13.3% jump worth about $215 per year on a typical household bill. The utility has only 39,954 residential customers across the city.
    source: data/cache/utility_rate_yoy.csv (Cheyenne Light Fuel & Power, WY)
  - text: The Crusoe and Tallgrass Wyoming campus is designed to scale from 1.8 GW to 10 GW and runs primarily on natural gas tied to Tallgrass's existing CO2 sequestration hub. None of that power touches the residential grid.
    source: sources[0] (Crusoe/Tallgrass press release)
  - text: Laramie County property tax assessments rose 15.4% over three years against a $77,884 county median income, the steepest property-tax move in any top-10 AI county.
    source: data/cache/property_tax_yoy.csv (FIPS 56021) + Census ACS 2023 B19013
  sources:
  - https://www.crusoe.ai/resources/newsroom/crusoe-and-tallgrass-announce-ai-data-center-in-wyoming
  demographics:
  - text: 13.5% of Laramie County adults are veterans, the third-highest veteran share in this batch behind Stafford and Prince William. F E Warren Air Force Base sits inside Cheyenne city limits and anchors the same security-cleared workforce that Stargate counties outside Texas rarely capture.
    source: Census ACS 2023 B21001 (FIPS 56021)
  - text: Laramie County is 82.2% white, 15.7% Hispanic, 2.2% Black, and 1.1% Asian. The Hispanic share is comparable to Utah County's 13.9% and Loudoun's 14.2%, larger than neighboring Wyoming counties would suggest.
    source: Census ACS 2023 B02001, B03003 (FIPS 56021)
  - text: Only 9.9% of Laramie residents live below the poverty line and unemployment is 3.1%. Manufacturing employs just 3.2% of workers, the smallest manufacturing base of any top-10 AI county in this batch.
    source: Census ACS 2023 B17001, B23025, C24050 (FIPS 56021)
  - text: 90.8% of Laramie County households have a home broadband subscription and median gross rent is $1,080 per month. 84.4% of residents lived in the same house one year earlier, the lowest residential stability in this batch and the migration signal that the Crusoe, Meta, and Microsoft builds are already producing.
    source: Census ACS 2023 B28002, B25064, B07001 (FIPS 56021)
in-st-joseph:
  last_updated: '2026-05-17'
  takeaways:
  - text: St. Joseph County's population is 272,574 and has been essentially flat for 20 years (265,559 in 2000). Project Rainier's 2.2 GW AWS and Anthropic build in New Carlisle is the largest single industrial commitment to the county since Studebaker.
    source: 'Census ACS 2023 B01003 + Wikipedia: St. Joseph County, Indiana'
  - text: Indiana Michigan Power residential rates rose from 15.5 to 16.3 cents per kWh from 2021 to 2023, a 5.1% jump worth about $86 per year per household. The utility serves 422,062 residential customers across the region.
    source: data/cache/utility_rate_yoy.csv (Indiana Michigan Power, IN)
  - text: County home prices are up 16.8% over three years against a median household income of $64,885 and a median home value of $179,800. The 32.6% bachelor's-degree share is buoyed by Notre Dame, which sits in the same census tract.
    source: data/cache/realestate_yoy.csv + Census ACS 2023 B19013, B25077, B15003
  - text: Project Rainier is the public-facing name for Anthropic's primary Trainium training cluster. Microsoft separately announced two more campuses in Granger and La Porte, putting Indiana Michigan Power on the hook for more than 3 GW of new AI load across two adjacent counties.
    source: data/sites/data_centers.csv (Project Rainier, Granger, La Porte)
  sources: []
  demographics:
  - text: Manufacturing accounts for 16.8% of St. Joseph County jobs, less than the next-door LaPorte share but above the Indiana statewide average. Project Rainier inherits a county labor base that has been transitioning out of Studebaker-era manufacturing for 60 years.
    source: Census ACS 2023 C24050_001E, C24050_004E (St. Joseph County, IN)
  - text: 12.6% of St. Joseph residents are Black alone and 10.2% are Hispanic of any race, the most diverse county in the Indiana AI group. The South Bend and Mishawaka core gives the 2.2 GW campus a population profile closer to a Rust Belt mid-size city than to the surrounding rural counties.
    source: Census ACS 2023 B02001_001E, B02001_003E, B03003_001E, B03003_003E (St. Joseph County, IN)
  - text: 14.6% of St. Joseph residents live in poverty and median gross rent is $1,030. The Anthropic and AWS training cluster lands in a county where roughly one in seven residents lives below the federal poverty line, the third-highest rate in this batch.
    source: Census ACS 2023 B17001_001E, B17001_002E, B25064_001E (St. Joseph County, IN)
  - text: Only 68.8% of St. Joseph housing units are owner-occupied and 4.0% of residents moved in from out of state last year. Project Rainier's load growth hits the highest renter share and the highest in-migration in the Indiana group, the combination that translates utility-rate moves into rent moves fastest.
    source: Census ACS 2023 B25003_001E, B25003_002E, B07001_001E, B07001_065E, B07001_081E (St. Joseph County, IN)
tx-taylor:
  last_updated: '2026-05-17'
  takeaways:
  - text: Abilene's 127,130 residents now share their grid with Stargate, which the city's own 2026 timeline lists as one of its largest employers at over 6,400 workers. That is more than Hardin-Simmons, McMurry, and Abilene Christian combined and almost matches Dyess Air Force Base's 8,864.
    source: 'sources[0] (Wikipedia: Abilene, Texas) + Census ACS 2023 B01003'
  - text: ERCOT's deregulated retail market means AEP Texas does not publish a single residential rate. EIA cannot report a 3-year rate delta for Taylor County, so the household-bill impact of 2.1 GW of new AI demand is invisible in the standard data.
    source: data/cache/utility_rate_yoy.csv (no AEP Texas residential row)
  - text: Property taxes in Taylor County rose 9.4% over three years on a county median household income of $66,406 and a median home value of $190,300. The Abilene ISD and Taylor County CAD have flagged Stargate's land transactions as the lead driver of rising assessed values.
    source: data/cache/property_tax_yoy.csv (FIPS 48441) + Census ACS 2023 B19013, B25077
  - text: Stargate Abilene is anchored by an Oracle lease backed by a $2.3 billion JPMorgan loan to the Crusoe / Blue Owl / Primary Digital joint venture. Crusoe Phase 2 adds another 900 MW dedicated to Microsoft, all on the same Abilene parcel.
    source: 'sources[1] (Wikipedia: Stargate LLC) + data/sites/data_centers.csv'
  sources:
  - https://en.wikipedia.org/wiki/Abilene,_Texas
  - https://en.wikipedia.org/wiki/Stargate_LLC
  demographics:
  - text: 24.8% of Taylor County residents are Hispanic and 8.0% are Black, against a 70.5% white share. The Hispanic share is the largest in any West Texas county in this batch and twice Shackelford's next door.
    source: Census ACS 2023 B02001, B03003 (FIPS 48441)
  - text: Unemployment in Taylor County is 2.1%, the tightest labor market in this batch and well below the 3.7% national figure. Stargate is hiring 6,400 workers into a county that has effectively zero slack.
    source: Census ACS 2023 B23025 (FIPS 48441)
  - text: 9.2% of Taylor County adults are veterans, the largest veteran share among the Texas counties in this batch. Dyess Air Force Base across the county line keeps the share high and gives Stargate a security-cleared talent pipeline that other Stargate counties lack.
    source: Census ACS 2023 B21001 (FIPS 48441)
  - text: Median gross rent in Taylor County is $1,111 per month and 59.8% of homes are owner-occupied, the lowest ownership rate of the four West Texas counties here. Abilene is the rental market the rural Stargate Texas counties cannot match.
    source: Census ACS 2023 B25064, B25003 (FIPS 48441)
tn-shelby:
  last_updated: '2026-05-17'
  takeaways:
  - text: Shelby County is 922,195 residents and 61% Black, with Memphis ranking as the poorest large metro in the US census. xAI's Colossus and Colossus 2 add 2 GW of training load to a community already fighting the cancelled Byhalia Pipeline through Boxtown.
    source: 'Census ACS 2023 B01003 + sources[0] (Wikipedia: Memphis, TN)'
  - text: 'MLGW is a municipal utility, so EIA does not publish a residential rate delta for Shelby County. The political consequence: there is no public price signal on how the 2 GW of new AI load is being recovered from Memphis ratepayers.'
    source: data/cache/utility_rate_yoy.csv (no MLGW row) + sources[0]
  - text: xAI moved its gas turbines from Memphis to Southaven, Mississippi after local pushback. Mississippi regulators granted temporary approval to run the turbines for up to 12 months without a permit, exporting Memphis's emissions across the state line.
    source: 'sources[1] (SemiAnalysis: xAI Colossus 2)'
  - text: Shelby home prices rose 7.4% and property tax assessments rose 6.9% over three years, both restrained relative to the county median income of $62,337 by Memphis's persistent population stagnation.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 47157) + Census ACS 2023 B19013
  sources:
  - https://en.wikipedia.org/wiki/Memphis,_Tennessee
  - https://newsletter.semianalysis.com/p/xais-colossus-2-first-gigawatt-datacenter
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 17.5% of Shelby County residents live below the poverty line and 7.1% are unemployed, the highest unemployment in batch 4. The Colossus campus is landing in the only batch-4 county where more than one in six residents is poor.
    source: Census ACS 2023 B17001 + B23025 (FIPS 47157)
  - text: Only 54.6% of Shelby households own their home, the lowest owner-occupied rate in batch 4. Median gross rent of $1,170 puts renter exposure to any AI-driven rate pass-through directly on the bill side, with no equity offset.
    source: Census ACS 2023 B25003, B25064 (FIPS 47157)
  - text: 9.2% of Shelby's working population is in manufacturing, well above the 5-7% baseline for major Texas metros in this batch. FedEx and the Memphis logistics corridor anchor a labor market that already runs on shift work.
    source: Census ACS 2023 C24050 (FIPS 47157)
  - text: 87.2% of Shelby households have broadband at home, the lowest connectivity rate of any Tennessee or Texas county in batch 4. About 118,000 residents face a digital-divide gap as xAI is bringing 2 GW of AI training capacity into the same county.
    source: Census ACS 2023 B28002 (FIPS 47157)
la-richland:
  last_updated: '2026-05-17'
  takeaways:
  - text: Richland Parish has 19,908 residents and a median household income of $52,960, the lowest of any top-10 AI county. Meta's Hyperion campus will draw up to 5 GW at full buildout, roughly 250 kW per resident.
    source: 'Census ACS 2023 B01003, B19013 + sources[0] (Wikipedia: Hyperion data center)'
  - text: Meta is spending $10 billion on Hyperion on a 2,250-acre former-farmland parcel outside Rayville, a town of 3,297 people. The parish was originally named for the productivity of its cotton and soybean fields.
    source: 'sources[0] (Wikipedia: Hyperion data center) + Census ACS 2023 B01003 (Rayville town)'
  - text: Entergy Louisiana's residential rate actually fell 4.2% from 2021 to 2023, the only top-10 AI county where bills went down on a 3-year baseline. The state PSC has not yet ruled on how Hyperion's load will affect that trajectory.
    source: data/cache/utility_rate_yoy.csv (Entergy Louisiana LLC, LA)
  - text: Richland's property tax assessments rose 10.3% over three years, sharper than its near-zero population growth would predict. The Hyperion ITEP application is the explicit driver.
    source: data/cache/property_tax_yoy.csv (FIPS 22083)
  sources:
  - https://en.wikipedia.org/wiki/Hyperion_(data_center)
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 23.5% of Richland Parish residents live below the federal poverty line, the highest poverty rate of any top-10 AI host county. Meta's $10 billion Hyperion campus will rise on land where roughly 1 in 4 neighbors already lives below poverty.
    source: Census ACS 2023 B17001 (FIPS 22083)
  - text: Richland Parish is 36.1% Black, 60.6% white, with only 434 Hispanic residents and zero Asian residents in the 2023 ACS sample. Hyperion lands in one of the few US AI campuses sited in a majority-non-white Black Belt parish.
    source: Census ACS 2023 B02001, B03003 (FIPS 22083)
  - text: Only 68.0% of Richland households have a wired broadband subscription at home, the lowest of any county in this batch. The Hyperion campus will sit on a fiber backbone its neighbors cannot afford to plug into.
    source: Census ACS 2023 B28002 (FIPS 22083)
  - text: Median gross rent in Richland is $836 a month, less than half of Union NJ ($1,664) and Dakota MN ($1,497). A 33.0% renter share with rents this low means a small dollar increase from Hyperion spillover can move a much larger share of household budgets.
    source: Census ACS 2023 B25064, B25003 (FIPS 22083)
wv-mason:
  last_updated: '2026-05-17'
  takeaways:
  - text: Mason County has 25,214 residents with a median age of 44.2 and a median household income of $53,454. Only 16.2% of residents over 25 hold a bachelor's degree, the lowest of any top-10 AI county.
    source: Census ACS 2023 B01003, B01002, B19013, B15003
  - text: Appalachian Power residential rates rose 11.6%, from 15.0 to 16.8 cents per kWh between 2021 and 2023. That adds about $188 per year to a typical household bill on incomes that have not kept pace.
    source: data/cache/utility_rate_yoy.csv (Appalachian Power Co, WV)
  - text: Nscale's Monarch is a 2,250-acre campus next door to AEP's 1,300 MW Mountaineer coal plant, which has burned roughly 9,000 tons of coal per day since 1980 and still operates as of 2025. The Monarch microgrid is rated to scale to 8 GW, more than six times Mountaineer's nameplate.
    source: 'sources[0] (Wikipedia: Mountaineer Power Plant) + sources[1] (Nscale press release)'
  - text: Microsoft has signed a letter of intent for 1.35 GW of Vera Rubin AI capacity at Monarch starting in late 2027. The site became the United States' first state-certified AI microgrid jurisdiction.
    source: sources[1] (Nscale press release)
  sources:
  - https://en.wikipedia.org/wiki/Mountaineer_Power_Plant
  - https://www.nscale.com/press-releases/nscale-west-virginia-ai-factory
  demographics:
  - text: Mason County is 95.9% white, the least racially diverse county in this batch by a wide margin. Only 0.9% Black, 0.8% Hispanic, and 0.4% Asian residents share the AEP Mountaineer service area.
    source: Census ACS 2023 B02001, B03003 (FIPS 54053)
  - text: Only 82.5% of Mason County households have a home broadband subscription, lower than every county in this batch except Mecklenburg and Wilbarger. Nscale's Monarch microgrid will move 8 GW of compute from a county where roughly one in six households has no home internet.
    source: Census ACS 2023 B28002 (FIPS 54053)
  - text: 17.9% of Mason residents live below the poverty line and median gross rent is $654 per month, the second-lowest rent in this batch behind Shackelford. The owner-occupancy rate of 82.1% reflects a population that owns its home but has little cash flow above the mortgage.
    source: Census ACS 2023 B17001, B25064, B25003 (FIPS 54053)
  - text: 93.7% of Mason residents lived in the same house one year earlier, the highest residential stability in this batch. Unemployment is 3.0% on a 9,686-person labor force, so the Nscale construction crew will arrive almost entirely from out of county.
    source: Census ACS 2023 B07001, B23025 (FIPS 54053)
tx-nolan:
  last_updated: '2026-05-17'
  takeaways:
  - text: Sweetwater has 10,484 residents and the surrounding Nolan County has 14,565. IREN's 2 GW Sweetwater campus is roughly 200 kW of AI compute per Nolan County resident, the highest per-capita load of any top-10 county.
    source: Census ACS 2023 B01003 (Sweetwater city, Nolan County)
  - text: Nolan County hosts more than 1,500 MW of installed wind capacity, including the Roscoe Wind Farm. Wind paid the county about $18 million in landowner royalties and $12 million in school taxes in a single year, the existing rural-electric template that AI is now joining.
    source: 'sources[0] (Wikipedia: Sweetwater, Texas)'
  - text: Median household income in Nolan County is $50,160 and the median home value is $98,300, the lowest in any top-10 AI county. Only 13.7% of residents over 25 hold a bachelor's degree.
    source: Census ACS 2023 B19013, B25077, B15003
  - text: Property tax assessments rose 4.8% over three years, the most restrained of any top-10 AI county. ERCOT's deregulated retail market means there is no published residential rate delta for AEP Texas, so the bill-side impact of 2 GW of new IREN demand is invisible in the standard data.
    source: data/cache/property_tax_yoy.csv (FIPS 48353) + data/cache/utility_rate_yoy.csv (no AEP Texas residential row)
  sources:
  - https://en.wikipedia.org/wiki/Sweetwater,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 37.0% of Nolan County residents are Hispanic, roughly triple the share Sweetwater carried in the 1980 census. The IREN campus is landing in a county where the wind-farm boom already brought Latino transmission-line crews.
    source: Census ACS 2023 B03003 (FIPS 48353)
  - text: 12.8% of Nolan's working population is in manufacturing, the highest mfg share of any batch-4 Texas county outside Ellis. Sweetwater's cement and gypsum plants plus wind-tower fabrication anchor the existing industrial wage floor.
    source: Census ACS 2023 C24050 (FIPS 48353)
  - text: 18.8% of Nolan residents live in poverty and 5.7% are unemployed, with only 80.7% of households on home broadband. The IREN 2 GW campus is moving into the second-poorest county in batch 4 after Hale.
    source: Census ACS 2023 B17001, B23025, B28002 (FIPS 48353)
  - text: 66.1% of Nolan households own their home and median gross rent is $866. The 200 kW per resident IREN density is the per-capita extreme of batch 4, in a county whose existing rental stock is about 1,800 units.
    source: Census ACS 2023 B25003, B25064 (FIPS 48353)
oh-trumbull:
  last_updated: '2026-05-17'
  takeaways:
  - text: Trumbull County's population peaked at 241,863 in 1980 and has fallen to 201,367, a 17% loss. The Stargate Lordstown build occupies the former GM Lordstown assembly plant that closed in March 2019.
    source: 'Census ACS 2023 B01003 + sources[0] (Wikipedia: Trumbull County OH and Lordstown Assembly)'
  - text: 'The Lordstown site has changed hands four times in six years: GM sold to Lordstown Motors for $20 million in 2019, Foxconn paid $230 million in 2022, and SoftBank''s Crescent Dune LLC bought the property for $375 million in August 2025 to retool for Stargate equipment.'
    source: 'sources[0] (Wikipedia: Lordstown Assembly)'
  - text: FirstEnergy's Ohio Edison residential rate rose 3.4%, from 9.2 to 9.6 cents per kWh, the smallest delta of any top-10 AI county. The bill-side impact of the new 1.5 GW Stargate load has not yet flowed through to retail.
    source: data/cache/utility_rate_yoy.csv (Ohio Edison Co, OH)
  - text: Home prices rose 16.4% over three years against a median household income of $55,088 and a $128,100 median home value, a sign that the speculative spillover from the AI build has begun even before Stargate energizes.
    source: data/cache/realestate_yoy.csv + Census ACS 2023 B19013, B25077
  sources:
  - https://en.wikipedia.org/wiki/Trumbull_County,_Ohio
  - https://en.wikipedia.org/wiki/Lordstown_Assembly
  - https://api.census.gov/data/2023/acs/acs5?get=C24050_004E,C24050_001E&for=county:155&in=state:39
  - https://api.census.gov/data/2023/acs/acs5?get=B21001_002E,B21001_001E&for=county:155&in=state:39
  demographics:
  - text: Manufacturing still employs 18.9% of Trumbull's workforce despite the Lordstown plant closure, the highest manufacturing share of any Ohio AI county. The local trades have not yet exited the labor market the Stargate retool needs to rehire.
    source: Census ACS 2023 C24050 (Trumbull County, OH)
  - text: Only 83.2% of Trumbull households have wired broadband, the lowest connectivity rate of any Ohio AI county. The Stargate campus will sit inside a region where residential fiber gaps run alongside the fiber the campus itself is pulling.
    source: Census ACS 2023 B28002 (Trumbull County, OH)
  - text: Trumbull's poverty rate is 16.8%, more than double Fairfield's 8.2%. The 1.5 GW Stargate buildout is the first major capital event landing in this county since GM closed, and it lands on the most economically stressed population of the Ohio AI cluster.
    source: Census ACS 2023 B17001 (Trumbull County, OH)
  - text: Veterans make up 9.0% of Trumbull adults (14,347 veterans), the highest veteran share of any Ohio batch-3 county. Youngstown Air Reserve Station's proximity is part of why the Lordstown labor pool retained operations-and-maintenance skills the Stargate site can draw from.
    source: Census ACS 2023 B21001 (Trumbull County, OH)
mo-jackson:
  last_updated: '2026-05-17'
  takeaways:
  - text: Jackson County contains both Kansas City and Independence and is home to 717,021 residents. The two announced campuses (Nebius at 1.2 GW and a Google Kansas City build) will share Evergy's grid with 1.14 million existing jobs.
    source: 'Census ACS 2023 B01003 + sources[0] (Wikipedia: Jackson County, MO) + data/sites/data_centers.csv'
  - text: Evergy Metro Missouri residential rates rose 3.0% from 13.3 to 13.7 cents per kWh between 2021 and 2023, adding about $44 per year to a typical household bill. The Missouri PSC has not yet ruled on cost-allocation for the Nebius Independence load.
    source: data/cache/utility_rate_yoy.csv (Evergy Metro, MO)
  - text: Independence, Missouri is the second city in Jackson County with 121,944 residents and a median household income of $59,480. Northrop Grumman is the largest non-public employer there at 1,722 jobs, a baseline Nebius could match with a single training campus.
    source: 'Census ACS 2023 B01003, B19013 + sources[0] (Wikipedia: Independence, MO)'
  - text: Home prices rose 10.7% and property tax assessments rose 11.5% over three years, both well above local wage growth. The Jackson County assessor's office faced a class-action lawsuit over the 2023 reassessment cycle, which preceded the AI announcements.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 29095)
  sources:
  - https://en.wikipedia.org/wiki/Jackson_County,_Missouri
  - https://en.wikipedia.org/wiki/Independence,_Missouri
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 41.2% of Jackson County households rent rather than own, the highest renter share in this batch outside of Union NJ. Median gross rent is $1,151 a month, so a 10% rent move from data-center wage pressure would cost the typical renter household about $1,380 a year.
    source: Census ACS 2023 B25003, B25064 (FIPS 29095)
  - text: 13.8% of Jackson County residents live below poverty against a 22.5% Black population share. The Nebius and Google campuses sit on Evergy lines that cross some of the most concentrated poverty in metropolitan Kansas City.
    source: Census ACS 2023 B17001, B02001 (FIPS 29095)
  - text: Only 86.4% of Jackson County residents lived in the same house one year earlier, the second-lowest residential stability in this batch behind Cass ND. Kansas City is a transient labor market by AI county standards.
    source: Census ACS 2023 B07001 (FIPS 29095)
  - text: 36,245 Jackson County adults are veterans, 6.6% of the adult population. Whiteman Air Force Base sits 70 miles east and the regional Kansas City VA Medical Center anchors a labor pool with security clearances directly relevant to hyperscaler hiring.
    source: Census ACS 2023 B21001 (FIPS 29095)
al-jackson:
  last_updated: '2026-05-17'
  takeaways:
  - text: Bridgeport had 2,264 residents at the 2020 census, down from 2,418 in 2010. The Google campus sits on the retired Widows Creek Power Plant parcel that TVA opened in 1952 and shut in September 2015 at 1,600 MW of coal-fired nameplate.
    source: 'sources[0] (Wikipedia: Bridgeport, Alabama) + sources[1] (Wikipedia: Widows Creek Fossil Plant)'
  - text: Google announced $600 million for the Widows Creek conversion in June 2015 and TVA added matching renewable capacity to the system. The site is one of 58 TVA direct-serve industrial and institutional customers, which is why no residential rate delta shows up for Jackson County.
    source: 'sources[1] (Wikipedia: Widows Creek Fossil Plant) + sources[2] (Wikipedia: TVA)'
  - text: Jackson County has 52,839 residents on a median household income of $49,454. Only 15.5% of adults over 25 hold a bachelor's degree, the lowest education share in this batch and a step below the rural-Appalachian baseline.
    source: Census ACS 2023 B01003, B19013, B15003 (Jackson County, AL)
  - text: County home prices rose 26.6% on a 3-year baseline, the largest jump in this batch and the second-largest in any AI county outside Racine. The median home value remains $145,800, so the dollar move per house is roughly $40,000.
    source: data/cache/realestate_yoy.csv (FIPS 01071) + Census ACS 2023 B25077
  sources:
  - https://en.wikipedia.org/wiki/Bridgeport,_Alabama
  - https://en.wikipedia.org/wiki/Widows_Creek_Fossil_Plant
  - https://en.wikipedia.org/wiki/Tennessee_Valley_Authority
  demographics:
  - text: 92.0% of Jackson County residents lived in the same house a year earlier and only 1.6% moved in from out of state, the most rooted population in this batch. That immobile cohort is the one that will absorb any TVA rate pass-through from data-center load with the least ability to leave.
    source: Census ACS 2023 B07001_001E, B07001_017E, B07001_065E (Jackson County, AL)
  - text: Manufacturing still accounts for 25.2% of jobs in Jackson County, more than triple the national 8% baseline. The Widows Creek site converts from coal generation to data-center load inside a labor market still anchored by old-economy production.
    source: Census ACS 2023 C24050_001E, C24050_004E (Jackson County, AL)
  - text: Median gross rent is $762 per month, the cheapest in this 16-county batch and roughly half the Atlanta-metro rate. The 75.0% owner-occupied share means most households are insulated from rent shock but exposed to property-tax reassessment.
    source: Census ACS 2023 B25064_001E, B25003_001E, B25003_002E (Jackson County, AL)
  - text: 16.8% of Jackson County residents live below the poverty line and 86.9% have a broadband subscription at home. The 13-point gap between poverty and broadband non-access is the digital floor the Google campus markets to but does not serve.
    source: Census ACS 2023 B17001_001E, B17001_002E, B28002_001E, B28002_004E (Jackson County, AL)
al-montgomery:
  last_updated: '2026-05-17'
  takeaways:
  - text: Montgomery County has 227,197 residents and a median household income of $58,153. Hyundai Motor Manufacturing Alabama has been the largest private employer at 3,530 workers since the plant opened in May 2005, with another 1,010 at MOBIS Alabama and 12,280 at Maxwell-Gunter Air Force Base.
    source: 'Census ACS 2023 B01003, B19013 + sources[0] (Wikipedia: Hyundai Motor Manufacturing Alabama) + sources[1] (Wikipedia: Montgomery, Alabama)'
  - text: Alabama Power's residential rate rose 10.7%, from 15.1 to 16.8 cents per kWh between 2021 and 2023, on 1.33 million in-state residential customers. That adds about $179 per year to a typical 10,800 kWh household bill.
    source: data/cache/utility_rate_yoy.csv (Alabama Power Co, AL)
  - text: Property tax assessments rose 23.8% on a 3-year baseline, the steepest move in this batch and the second-steepest of any AI county. Home prices rose 12.0% over the same window against a median home value of $160,100.
    source: data/cache/property_tax_yoy.csv (FIPS 01101) + data/cache/realestate_yoy.csv + Census ACS 2023 B25077
  - text: 34.3% of Montgomery County adults hold a bachelor's degree, which is well above the surrounding Black-Belt counties. Meta's campus joins an industrial corridor where automotive and federal employers already anchor the load.
    source: Census ACS 2023 B15003 (Montgomery County, AL)
  sources:
  - https://en.wikipedia.org/wiki/Hyundai_Motor_Manufacturing_Alabama
  - https://en.wikipedia.org/wiki/Montgomery,_Alabama
  demographics:
  - text: 58.8% of Montgomery County residents are Black alone and 19.3% live in poverty, the highest poverty rate in this batch. The Meta campus drops on the most racially and economically distinct host community in the batch.
    source: Census ACS 2023 B02001_001E, B02001_003E, B17001_001E, B17001_002E (Montgomery County, AL)
  - text: Only 57.7% of Montgomery County housing units are owner-occupied, the lowest owner share in this batch outside Fulton. The 42% renter base will see the Alabama Power rate increase pass straight into monthly rent before any property reassessment cycle catches up.
    source: Census ACS 2023 B25003_001E, B25003_002E (Montgomery County, AL)
  - text: 8.9% of adults are veterans, the highest veteran share in this batch and a direct reflection of the Maxwell-Gunter footprint. Federal and military payrolls already stabilize the local labor base before the Meta build adds construction headcount.
    source: Census ACS 2023 B21001_001E, B21001_002E (Montgomery County, AL)
  - text: Median gross rent is $1,061 against a 12.4% manufacturing employment share, half the Jackson-County share to the north. Montgomery is the post-industrial pivot county in the Alabama pair, not the rural one.
    source: Census ACS 2023 B25064_001E, C24050_001E, C24050_004E (Montgomery County, AL)
az-maricopa:
  last_updated: '2026-05-17'
  takeaways:
  - text: Maricopa County is 4,491,987 residents, the fourth-largest county in the US. Five publicly announced AI campuses share the Salt River Project and APS service area, including Meta and Apple at Mesa, Microsoft at Goodyear and El Mirage, and Google at Mesa.
    source: Census ACS 2023 B01003 + data/sites/data_centers.csv
  - text: Mesa alone had 504,258 residents at the 2020 census, making it bigger than 19 US state capitals and larger than Atlanta proper. Three of the five Maricopa campuses sit inside Mesa city limits.
    source: 'sources[0] (Wikipedia: Mesa, Arizona) + data/sites/data_centers.csv'
  - text: Salt River Project's residential rate rose 12.6%, from 11.95 to 13.46 cents per kWh from 2021 to 2023, on 1.05 million residential customers. That is about $163 more per year on a typical household bill.
    source: data/cache/utility_rate_yoy.csv (Salt River Project, AZ)
  - text: Median household income in Maricopa is $85,518 and 35.9% of adults hold a bachelor's degree. Home prices rose only 3.1% over three years, a sharp deceleration from the 2020-22 Phoenix run-up.
    source: Census ACS 2023 B19013, B15003 + data/cache/realestate_yoy.csv (FIPS 04013)
  sources:
  - https://en.wikipedia.org/wiki/Mesa,_Arizona
  demographics:
  - text: 30.9% of Maricopa County residents are Hispanic of any race and 14.3% are foreign-born, the highest immigrant share in this batch. The five-campus AI cluster lands in the Salt River Project and APS service area whose customer base is one of the most Spanish-speaking large metros in the US.
    source: Census ACS 2023 B03003_001E, B03003_003E, B05002_001E, B05002_013E (Maricopa County, AZ)
  - text: Median gross rent in Maricopa is $1,587 per month, more than double the Jackson Alabama rent and the highest in this batch. The 35.0% renter share is the cohort that absorbs any utility pass-through immediately, before annual lease renewals reprice.
    source: Census ACS 2023 B25064_001E, B25003_001E, B25003_002E (Maricopa County, AZ)
  - text: Manufacturing accounts for only 7.8% of Maricopa jobs against an 11.3% poverty rate. The county is the rare AI host where the data centers do not displace a still-significant manufacturing base, they simply add to a service economy already at 4.5 million people.
    source: Census ACS 2023 C24050_001E, C24050_004E, B17001_001E, B17001_002E (Maricopa County, AZ)
  - text: Broadband at home reaches 92.1% of Maricopa households, the highest connectivity rate in the Mountain West group. The Apple, Meta, Microsoft, and Google campuses sell capacity to a base that is already a heavy consumer of the end product.
    source: Census ACS 2023 B28002_001E, B28002_004E (Maricopa County, AZ)
ga-douglas:
  last_updated: '2026-05-17'
  takeaways:
  - text: Douglasville is 20 miles west of Atlanta with 34,650 residents at the 2020 census and three interchanges on I-20. The CoreWeave / Flexential campus sits inside that I-20 transit corridor on Georgia Power feed.
    source: 'sources[0] (Wikipedia: Douglasville, Georgia) + data/sites/data_centers.csv'
  - text: Douglas County is the only AI county in this batch where 3-year home prices actually fell, dropping 5.2%. Property tax assessments still rose 17.9% over the same window, a 23-point spread that points to a reassessment cycle running ahead of the market.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 13097)
  - text: County population is 146,141 with a median household income of $80,764, the second-highest in this batch. 30.8% of adults hold a bachelor's degree.
    source: Census ACS 2023 B01003, B19013, B15003 (Douglas County, GA)
  - text: Georgia Power's residential rate rose 8.0% from 2021 to 2023, from 14.3 to 15.5 cents per kWh, on 2.45 million residential customers across the state. That adds about $124 per year on a typical 10,800 kWh household bill.
    source: data/cache/utility_rate_yoy.csv (Georgia Power Co, GA)
  sources:
  - https://en.wikipedia.org/wiki/Douglasville,_Georgia
  demographics:
  - text: 49.2% of Douglas County residents are Black alone and 11.7% are Hispanic, making it a majority-minority I-20 exurb. The CoreWeave campus joins a county that is demographically much closer to south Fulton than to the white-majority Walton and Whitfield host counties in the Georgia group.
    source: Census ACS 2023 B02001_001E, B02001_003E, B03003_001E, B03003_003E (Douglas County, GA)
  - text: Manufacturing is only 8.8% of Douglas County jobs against a 6.1% unemployment rate, the highest unemployment in this batch outside DeKalb Illinois. The county already had labor slack before any AI campus broke ground.
    source: Census ACS 2023 C24050_001E, C24050_004E, B23025_002E, B23025_005E (Douglas County, GA)
  - text: 93.0% of Douglas households have a broadband subscription, the highest connectivity rate in this batch. The customer base for the workloads the CoreWeave campus will host is largely already online inside the same county.
    source: Census ACS 2023 B28002_001E, B28002_004E (Douglas County, GA)
  - text: Median gross rent is $1,447 and only 66.4% of housing units are owner-occupied. The 33.6% renter share is well above the rural-Georgia baseline and matches the I-20 commuter-corridor profile rather than a self-contained exurb.
    source: Census ACS 2023 B25064_001E, B25003_001E, B25003_002E (Douglas County, GA)
ga-fulton:
  last_updated: '2026-05-17'
  takeaways:
  - text: Microsoft's Fairwater Atlanta sits in Palmetto, a town of 5,071 residents that mostly lies in south Fulton County. The county itself has 1,068,507 residents, so the campus drops on a population gradient that runs from rural-southern Fulton to downtown Atlanta within 30 miles.
    source: 'sources[0] (Wikipedia: Palmetto, Georgia) + Census ACS 2023 B01003'
  - text: Fulton County's median household income is $91,490 and 58.0% of adults hold a bachelor's degree, the highest education share of any AI county in this batch. The county absorbs the campus with by far the deepest local talent base.
    source: Census ACS 2023 B19013, B15003 (Fulton County, GA)
  - text: Home prices rose 7.9% over three years on a median home value of $431,200. Property tax assessments rose 11.6% over the same window, consistent with the steady Atlanta-metro reassessment rhythm rather than a campus-driven shock.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 13121) + Census ACS 2023 B25077
  - text: Georgia Power's 8.0% residential rate move (14.3 to 15.5 cents per kWh) is the same 2.45-million-customer pool that absorbed the Plant Vogtle nuclear cost recovery. The Microsoft Fairwater build joins that cost stack.
    source: data/cache/utility_rate_yoy.csv (Georgia Power Co, GA)
  sources:
  - https://en.wikipedia.org/wiki/Palmetto,_Georgia
  demographics:
  - text: Only 54.1% of Fulton County housing units are owner-occupied, the lowest owner share of any AI host county in this batch. Microsoft Fairwater drops on a 45.9% renter base that absorbs the Georgia Power rate pass-through inside the monthly rent cycle, not the annual property-tax cycle.
    source: Census ACS 2023 B25003_001E, B25003_002E (Fulton County, GA)
  - text: 43.1% of Fulton County residents are Black alone, 7.6% are Asian, and 13.7% are foreign-born. The Fairwater campus has the most demographically complex customer-and-grievance base of any AI host in this batch.
    source: Census ACS 2023 B02001_001E, B02001_003E, B02001_005E, B05002_001E, B05002_013E (Fulton County, GA)
  - text: 12.9% of Fulton residents live in poverty against a $1,635 median gross rent, the highest rent in this batch. The 9-point gap between high incomes downtown and entrenched poverty in south Fulton is the social geography Palmetto sits inside.
    source: Census ACS 2023 B17001_001E, B17001_002E, B25064_001E (Fulton County, GA)
  - text: Only 4.7% of Fulton adults are veterans, the lowest veteran share in this batch. The county has none of the federal-payroll floor that stabilizes Montgomery Alabama, so the Microsoft campus is not buffered against a service-sector slowdown.
    source: Census ACS 2023 B21001_001E, B21001_002E (Fulton County, GA)
ga-walton:
  last_updated: '2026-05-17'
  takeaways:
  - text: Walton County's seat is Monroe with a 2020 population of 96,673, and the Meta site is in Social Circle, a town of 4,974 residents 45 miles east of Atlanta. Total county population is 100,361.
    source: 'sources[0] (Wikipedia: Social Circle, Georgia) + sources[1] (Wikipedia: Walton County, Georgia) + Census ACS 2023 B01003'
  - text: Home prices fell 4.4% on a 3-year baseline against a $300,500 median home value, the only AI county outside Douglas where Redfin shows a clear negative trend. Property taxes still rose 14.2% over the same window.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 13297) + Census ACS 2023 B25077
  - text: Median household income is $82,381 and 24.9% of adults hold a bachelor's degree. The 39.7 median age is the oldest in this batch by more than a year, reflecting a settled exurban demographic rather than a college or boomtown population.
    source: Census ACS 2023 B19013, B15003, B01002 (Walton County, GA)
  - text: The Meta campus sits on the Georgia Power 8.0% rate move, the same statewide pool that runs through Fulton and Douglas counties in this batch. There is no separate Walton-specific tariff.
    source: data/cache/utility_rate_yoy.csv (Georgia Power Co, GA)
  sources:
  - https://en.wikipedia.org/wiki/Social_Circle,_Georgia
  - https://en.wikipedia.org/wiki/Walton_County,_Georgia
  demographics:
  - text: 79.2% of Walton County housing units are owner-occupied, the highest owner share in this batch. The Meta campus drops on a county where the utility-rate pass-through hits homeowners through the bill, not renters through their lease, slowing the political feedback loop.
    source: Census ACS 2023 B25003_001E, B25003_002E (Walton County, GA)
  - text: 72.1% of Walton residents are white alone and 19.7% are Black, a demographic profile closer to rural-North-Georgia than to either Atlanta or Augusta. The county is the racially least-diverse Meta site in the eastern US.
    source: Census ACS 2023 B02001_001E, B02001_002E, B02001_003E (Walton County, GA)
  - text: Manufacturing still accounts for 12.1% of Walton jobs, double the Fulton rate next door. Social Circle's Meta site lands in a county where one in eight workers still clocks into a factory shift.
    source: Census ACS 2023 C24050_001E, C24050_004E (Walton County, GA)
  - text: 7.7% of Walton adults are veterans and only 2.3% of residents moved in from outside Georgia in the last year. The Meta build will pull labor from a settled, locally-rooted base rather than from the kind of in-migration churn seen in Ada Idaho or Maricopa.
    source: Census ACS 2023 B21001_001E, B21001_002E, B07001_001E, B07001_065E, B07001_081E (Walton County, GA)
ga-whitfield:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dalton produced 85% to 90% of all carpet sold in the US at the turn of the 21st century. That same municipal Dalton Utilities now feeds the 175 MW Core Scientific campus, the only top-100 AI campus on a publicly owned electric system in Georgia.
    source: 'sources[0] (Wikipedia: Carpet) + sources[1] (Wikipedia: Dalton, Georgia)'
  - text: The carpet industry shed 4,600 jobs between June 2011 and June 2012, making Dalton the city with the worst single-year job loss in the United States that year. The Core Scientific campus arrives in a labor market that has not fully replaced those losses.
    source: 'sources[1] (Wikipedia: Dalton, Georgia)'
  - text: Whitfield County has 103,118 residents and a median household income of $64,262. Only 19.3% of adults hold a bachelor's degree, the second-lowest education share in this batch after rural Jackson County, Alabama.
    source: Census ACS 2023 B01003, B19013, B15003 (Whitfield County, GA)
  - text: Dalton Utilities residential rates actually fell 5.7% on a 3-year baseline, from 10.7 to 10.1 cents per kWh, by far the cheapest published rate in this batch. That is the structural advantage that brought Core Scientific in the first place.
    source: data/cache/utility_rate_yoy.csv (Dalton Utilities, GA)
  sources:
  - https://en.wikipedia.org/wiki/Carpet
  - https://en.wikipedia.org/wiki/Dalton,_Georgia
  demographics:
  - text: Manufacturing accounts for 34.6% of Whitfield County jobs, the highest manufacturing share in this batch and more than four times the national average. The Core Scientific campus is the only AI host in the batch where the local economy is still structurally industrial rather than post-industrial.
    source: Census ACS 2023 C24050_001E, C24050_004E (Whitfield County, GA)
  - text: 36.6% of Whitfield residents are Hispanic of any race and 18.3% are foreign-born, the highest immigrant share in this batch and a direct legacy of the carpet-industry labor pull. The campus arrives in a workforce where roughly one in three workers is from a Spanish-first household.
    source: Census ACS 2023 B03003_001E, B03003_003E, B05002_001E, B05002_013E (Whitfield County, GA)
  - text: Median gross rent is $907 per month, the cheapest in the Georgia group and roughly 55% of the Atlanta-metro rate. Dalton's combination of cheap power and cheap housing is a structural advantage that Atlanta-suburb counties cannot match.
    source: Census ACS 2023 B25064_001E (Whitfield County, GA)
  - text: 91.7% of Whitfield residents lived in the same house a year ago and only 1.6% moved in from out of state, the second-lowest in-migration in this batch after Jackson Alabama. The Core Scientific build will not pull a fresh tech-labor wave into Dalton, the county will absorb it through retraining or commuting.
    source: Census ACS 2023 B07001_001E, B07001_017E, B07001_065E (Whitfield County, GA)
ia-dallas:
  last_updated: '2026-05-17'
  takeaways:
  - text: Apple chose Waukee in 2017 for a $1.38 billion data-center campus. Waukee's population grew from 13,790 in 2010 to 23,940 in 2020 (a 73.6% jump) and is estimated at 34,420 by 2024, putting the campus in the fastest-growing suburb of Des Moines.
    source: 'sources[0] (Wikipedia: Waukee, Iowa)'
  - text: Dallas County's median household income is $102,349, the highest in this batch and the second-highest of any AI county nationwide after Loudoun, Virginia. 51.6% of adults hold a bachelor's degree.
    source: Census ACS 2023 B19013, B15003 (Dallas County, IA)
  - text: Home prices rose only 1.7% over three years against a $333,400 median home value. Property tax assessments still rose 8.0% over the same window, sharper than the home-price track.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 19049) + Census ACS 2023 B25077
  - text: MidAmerican Energy's residential rate is essentially flat over three years (+0.9%), the smallest move in this batch. That stability reflects MidAmerican's heavy in-state wind generation share, which now exceeds 80% of its Iowa retail load on annual energy.
    source: data/cache/utility_rate_yoy.csv (MidAmerican Energy Co, IA)
  sources:
  - https://en.wikipedia.org/wiki/Waukee,_Iowa
  demographics:
  - text: Only 5.8% of Dallas County residents live in poverty and unemployment is 2.9%, the lowest poverty and lowest unemployment in this batch. The Apple campus lands in the tightest labor market of any AI host county nationwide outside Loudoun Virginia.
    source: Census ACS 2023 B17001_001E, B17001_002E, B23025_002E, B23025_005E (Dallas County, IA)
  - text: 4.6% of Dallas County residents are Asian alone, the highest Asian share in this batch outside Fulton Georgia. The Waukee tech-corridor base is already pulling a national talent profile, not just a Des Moines metro one.
    source: Census ACS 2023 B02001_001E, B02001_005E (Dallas County, IA)
  - text: Manufacturing is 8.1% of Dallas County jobs against a 69.5% owner-occupied share. The county runs on a service and finance footprint (Principal, Wells Fargo) rather than the manufacturing base that dominates the Polk and Linn AI sites.
    source: Census ACS 2023 C24050_001E, C24050_004E, B25003_001E, B25003_002E (Dallas County, IA)
  - text: Median gross rent is $1,239 per month, the highest in the Iowa group by 26%. Apple's tenants and contractors in Waukee compete for housing inside a rent market that is already pricing closer to Minneapolis than to the rest of MidAmerican territory.
    source: Census ACS 2023 B25064_001E (Dallas County, IA)
ia-linn:
  last_updated: '2026-05-17'
  takeaways:
  - text: Cedar Rapids has 137,710 residents, Iowa's second-largest city. The August 2020 derecho left 95% of the city without power with 60 to 80 mph sustained winds and gusts over 110 mph, the most expensive thunderstorm event in US history.
    source: 'sources[0] (Wikipedia: Cedar Rapids, Iowa)'
  - text: Linn County has 229,463 residents on a median household income of $76,421. The Google campus drops onto Alliant Energy territory, where EIA does not publish a clean 3-year residential rate delta for Linn County.
    source: Census ACS 2023 B01003, B19013 + data/cache/utility_rate_yoy.csv (no Alliant Energy IA residential row)
  - text: Home prices rose 14.2% over three years against a $204,400 median home value. Property tax assessments rose 10.2% over the same window, a 4-point spread that says the market is moving faster than the assessor.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 19113) + Census ACS 2023 B25077
  - text: 34.8% of Linn County adults hold a bachelor's degree against a median age of 38.5. The Cedar Rapids labor market already supports Collins Aerospace and Quaker Foods, so the Google campus enters a workforce with industrial-engineering depth.
    source: Census ACS 2023 B15003, B01002 (Linn County, IA)
  sources:
  - https://en.wikipedia.org/wiki/Cedar_Rapids,_Iowa
  demographics:
  - text: Manufacturing accounts for 17.1% of Linn County jobs, the highest manufacturing share in the Iowa group. Cedar Rapids carries the Collins Aerospace and Quaker Foods base that already gives the Google campus an industrial-grade contractor and millwright pool to draw from.
    source: Census ACS 2023 C24050_001E, C24050_004E (Linn County, IA)
  - text: 9.9% of Linn residents live in poverty and median gross rent is $915, the cheapest in the Iowa group. The Google campus arrives in the lowest-cost-of-living host of the three Iowa AI counties in this batch.
    source: Census ACS 2023 B17001_001E, B17001_002E, B25064_001E (Linn County, IA)
  - text: 5.8% of Linn residents are Black alone and 4.0% are Hispanic. That is the highest Black share in the Iowa group and a direct legacy of Cedar Rapids' meatpacking and rail-yard labor history, the base that will absorb the construction phase.
    source: Census ACS 2023 B02001_001E, B02001_003E, B03003_001E, B03003_003E (Linn County, IA)
  - text: 7.5% of Linn adults are veterans and only 1.9% moved in from outside Iowa last year. The Google build sits on the second-most settled in-migration profile in the Iowa group, behind only Pottawattamie.
    source: Census ACS 2023 B21001_001E, B21001_002E, B07001_001E, B07001_065E (Linn County, IA)
ia-polk:
  last_updated: '2026-05-17'
  takeaways:
  - text: Microsoft maintains several West Des Moines data centers, one of which hosts the company's most advanced supercomputer that supported training for OpenAI's ChatGPT. The Polk County build pre-dates the current AI cycle and was first announced in the early 2010s.
    source: 'sources[0] (Wikipedia: West Des Moines, Iowa)'
  - text: Meta started construction in Altoona in 2013 and asked local firm RPM Access to build a wind farm sized to put more energy into the system than the data center consumes. That structural pairing now serves as the template for hyperscaler PPAs across the region.
    source: 'sources[1] (Wikipedia: Altoona, Iowa)'
  - text: Polk County has 497,441 residents on a median household income of $81,621. MidAmerican Energy's residential rate rose only 0.9% over three years, which is the smallest delta in this batch and reflects a wind-heavy generation mix.
    source: Census ACS 2023 B01003, B19013 + data/cache/utility_rate_yoy.csv (MidAmerican Energy Co, IA)
  - text: 39.5% of Polk County adults hold a bachelor's degree and 36.2 is the median age. Property tax growth of 5.8% over three years is the smallest in this batch outside of DeKalb, Illinois.
    source: Census ACS 2023 B15003, B01002 + data/cache/property_tax_yoy.csv (FIPS 19153)
  sources:
  - https://en.wikipedia.org/wiki/West_Des_Moines,_Iowa
  - https://en.wikipedia.org/wiki/Altoona,_Iowa
  demographics:
  - text: 10.0% of Polk County residents are Hispanic of any race and 10.0% are foreign-born, the highest immigrant share in the Iowa group. The Microsoft and Meta campuses in Des Moines feed into a metro that has been the primary Iowa landing spot for new arrivals for two decades.
    source: Census ACS 2023 B03003_001E, B03003_003E, B05002_001E, B05002_013E (Polk County, IA)
  - text: Median gross rent in Polk is $1,113 against an owner-occupied share of 67.1%. The 32.9% renter base in the largest Iowa AI county is the cohort that sees the MidAmerican grid investment pass-through inside the lease cycle.
    source: Census ACS 2023 B25064_001E, B25003_001E, B25003_002E (Polk County, IA)
  - text: Manufacturing is only 9.3% of Polk County jobs, half the Linn share to the east. Polk runs on insurance, finance, and government payrolls, so the campus reinforces an existing white-collar service base rather than retraining a blue-collar one.
    source: Census ACS 2023 C24050_001E, C24050_004E (Polk County, IA)
  - text: 7.5% of Polk County residents are Black alone, the highest in the Iowa group and concentrated in the Des Moines core. The Altoona and West Des Moines campuses sit outside that core, so the property-tax base lift accrues to suburban municipalities, not the city.
    source: Census ACS 2023 B02001_001E, B02001_003E (Polk County, IA)
ia-pottawattamie:
  last_updated: '2026-05-17'
  takeaways:
  - text: Google's Council Bluffs campus reached $1.5 billion in total investment, which Wikipedia notes is the largest private investment in Iowa history as of the 2014 Southlands expansion announcement. Employment grew from a 200-job target at first opening (2009) to over 300 on site by June 2016.
    source: 'sources[0] (Wikipedia: Council Bluffs, Iowa)'
  - text: Pottawattamie County has 93,407 residents on a median household income of $71,446. 23.5% of adults hold a bachelor's degree, well below the Polk and Dallas County share but typical for the western-Iowa Loess Hills corridor.
    source: Census ACS 2023 B01003, B19013, B15003 (Pottawattamie County, IA)
  - text: Home prices rose 15.7% over three years against a $183,600 median home value. That is the sharpest 3-year move in this batch outside Jackson County Alabama and DeKalb Illinois, and is happening on the lowest median home value in the Iowa group.
    source: data/cache/realestate_yoy.csv (FIPS 19155) + Census ACS 2023 B25077
  - text: Median age in Pottawattamie is 40.1, the oldest in the Iowa cluster. MidAmerican Energy's 0.9% residential rate move is the same wind-heavy Iowa pool that holds across all three Iowa hyperscaler counties in this batch.
    source: Census ACS 2023 B01002 + data/cache/utility_rate_yoy.csv (MidAmerican Energy Co, IA)
  sources:
  - https://en.wikipedia.org/wiki/Council_Bluffs,_Iowa
  demographics:
  - text: 89.0% of Pottawattamie residents are white alone and only 1.8% are Black, the demographic floor of the Iowa group. Council Bluffs is the AI host in this batch that looks closest to a 1990s Iowa population snapshot.
    source: Census ACS 2023 B02001_001E, B02001_002E, B02001_003E (Pottawattamie County, IA)
  - text: Broadband at home reaches only 84.0% of Pottawattamie households, the lowest connectivity rate in the Iowa group and 8 points below Polk County across the river. The Google campus exports compute capacity from a county where roughly one in six homes is still offline.
    source: Census ACS 2023 B28002_001E, B28002_004E (Pottawattamie County, IA)
  - text: 8.6% of Pottawattamie adults are veterans, the highest veteran share in the Iowa group and a reflection of Offutt Air Force Base just across the Missouri River. The federal payroll floor is the same dynamic that anchors Montgomery Alabama.
    source: Census ACS 2023 B21001_001E, B21001_002E (Pottawattamie County, IA)
  - text: Manufacturing is 10.5% of Pottawattamie jobs against a $970 median gross rent, the second-cheapest in the Iowa group. The Council Bluffs cost-of-living base is one structural reason Google's three-phase build was the largest private investment in Iowa history.
    source: Census ACS 2023 C24050_001E, C24050_004E, B25064_001E (Pottawattamie County, IA)
id-ada:
  last_updated: '2026-05-17'
  takeaways:
  - text: Ada County has 508,052 residents and includes Boise. Meta's announced campus is in Kuna, a south-Ada town that sits on Idaho Power's territory along with the rest of the county.
    source: Census ACS 2023 B01003 + data/sites/data_centers.csv
  - text: Idaho Power's residential rate rose 7.8% (10.9 to 11.8 cents per kWh) between 2021 and 2023 on 525,751 in-state residential customers. That is the steepest residential rate move in the Mountain West outside Cheyenne.
    source: data/cache/utility_rate_yoy.csv (Idaho Power Co, ID)
  - text: Median household income in Ada County is $88,907 and 43.9% of adults hold a bachelor's degree. The median home value is $476,000, the highest in this batch and a structural barrier to in-migration even before campus construction starts.
    source: Census ACS 2023 B19013, B15003, B25077 (Ada County, ID)
  - text: Home prices rose only 1.6% on a 3-year baseline, the smallest delta in this batch except for Maricopa. The Boise market has cooled sharply from the 2020 to 2022 in-migration peak.
    source: data/cache/realestate_yoy.csv (FIPS 16001)
  sources: []
  demographics:
  - text: 5.5% of Ada County residents moved in from a different state in the last year, the highest in-migration rate in this 16-county batch. Meta's Kuna campus lands in the host county with the most actively churning population, which is also why the Idaho Power rate pass-through politically lands fastest.
    source: Census ACS 2023 B07001_001E, B07001_065E (Ada County, ID)
  - text: 9.5% of Ada residents are Hispanic of any race and 6.0% are foreign-born, the highest Hispanic share in the Mountain West group. The Boise demographic profile is closer to the Salt Lake metro than to the rural-Idaho counties around it.
    source: Census ACS 2023 B03003_001E, B03003_003E, B05002_001E, B05002_013E (Ada County, ID)
  - text: 8.0% of Ada adults are veterans against a 3.1% unemployment rate, the second-lowest unemployment in this batch after Dallas Iowa. Meta arrives in a labor market that is already tight before the data-center construction phase begins.
    source: Census ACS 2023 B21001_001E, B21001_002E, B23025_002E, B23025_005E (Ada County, ID)
  - text: Broadband at home reaches 94.4% of Ada households, the highest in this batch. The customer base for the workloads the Kuna campus will host is the most online residential population among the 16 AI host counties.
    source: Census ACS 2023 B28002_001E, B28002_004E (Ada County, ID)
il-dekalb:
  last_updated: '2026-05-17'
  takeaways:
  - text: Meta announced an $800 million DeKalb data center in June 2020. Northern Illinois University, the city's largest employer with about 20,000 students, is Illinois's third-largest campus and shares the same ComEd substation rotation that now backs the Meta build.
    source: 'sources[0] (Wikipedia: DeKalb, Illinois)'
  - text: DeKalb already hosts distribution warehouses for Target, 3M, Nestle, and Ferrara Candy Company. The Meta campus on the south side of town joins that industrial cluster instead of starting greenfield.
    source: 'sources[0] (Wikipedia: DeKalb, Illinois)'
  - text: DeKalb County has 100,512 residents on a median household income of $69,022. Home prices rose 20.5% over three years against a $231,900 median home value, the sharpest move in this batch.
    source: Census ACS 2023 B01003, B19013, B25077 + data/cache/realestate_yoy.csv (FIPS 17037)
  - text: ComEd's residential rate rose only 3.1% over three years and property tax assessments rose 5.3% over the same window, both the most restrained in this batch outside Dalton. Illinois's nuclear-heavy generation mix is the structural reason the rate is so flat.
    source: data/cache/utility_rate_yoy.csv (Commonwealth Edison Co, IL) + data/cache/property_tax_yoy.csv (FIPS 17037)
  sources:
  - https://en.wikipedia.org/wiki/DeKalb,_Illinois
  demographics:
  - text: Unemployment in DeKalb County is 7.1%, the highest in this batch and more than twice the Dallas Iowa or Ada Idaho rate. The Meta campus arrives in a labor market with the most slack, which is the structural reason home-price acceleration without wage acceleration is plausible.
    source: Census ACS 2023 B23025_002E, B23025_005E (DeKalb County, IL)
  - text: 14.0% of DeKalb residents are Hispanic of any race and 6.4% are foreign-born, well above the rural-Illinois baseline. The Northern Illinois University-anchored labor pool already pulls a more diverse base than the surrounding farm counties.
    source: Census ACS 2023 B03003_001E, B03003_003E, B05002_001E, B05002_013E (DeKalb County, IL)
  - text: Only 60.9% of DeKalb housing units are owner-occupied, the second-lowest owner share in this batch after Fulton. The 39.1% renter base is partly student housing for NIU's 20,000 students, the cohort least insulated from any ComEd rate move that follows the Meta build.
    source: Census ACS 2023 B25003_001E, B25003_002E (DeKalb County, IL)
  - text: 15.9% of DeKalb residents live in poverty and median gross rent is $1,041. The combined poverty-and-rent profile is closer to a Rust Belt mid-size city than to the I-90 logistics corridor DeKalb appears in on a map.
    source: Census ACS 2023 B17001_001E, B17001_002E, B25064_001E (DeKalb County, IL)
in-clark:
  last_updated: '2026-05-17'
  takeaways:
  - text: Jeffersonville sits across the Ohio River from Louisville, Kentucky. Duke Energy Indiana's residential rate actually fell 9.8% (14.1 to 12.7 cents per kWh) between 2021 and 2023 on 796,265 in-state residential customers, the only rate cut in this batch.
    source: data/cache/utility_rate_yoy.csv (Duke Energy Indiana LLC, IN)
  - text: Clark County has 122,800 residents on a median household income of $72,298 and a $212,400 median home value. 25.5% of adults hold a bachelor's degree, lifted slightly by the Louisville cross-river commute share.
    source: Census ACS 2023 B01003, B19013, B25077, B15003 (Clark County, IN)
  - text: Property tax assessments rose 18.3% over three years, the second-steepest move in this batch after Montgomery, Alabama. That is happening before the announced Meta campus begins energizing load.
    source: data/cache/property_tax_yoy.csv (FIPS 18019)
  - text: Median age in Clark is 39.8 against a 6.0% 3-year home-price move. The 24-point spread between flat home prices and a 18% tax-assessment jump is the largest mismatch in this batch.
    source: Census ACS 2023 B01002 + data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 18019)
  sources: []
  demographics:
  - text: Manufacturing accounts for 16.3% of Clark County jobs against a 3.8% unemployment rate. Jeffersonville is one of the tighter manufacturing labor markets in this batch, which means the Meta construction phase will compete for the same skilled trades the Ford and GE Appliances supplier base already books.
    source: Census ACS 2023 C24050_001E, C24050_004E, B23025_002E, B23025_005E (Clark County, IN)
  - text: 89.2% of Clark residents lived in the same house a year ago and only 3.0% moved in from out of state, despite the Louisville cross-river commute. The county absorbs the Meta build with a settled local base, not transient construction labor.
    source: Census ACS 2023 B07001_001E, B07001_017E, B07001_065E (Clark County, IN)
  - text: 7.0% of Clark residents are Black alone and 6.6% are Hispanic, the most diverse county in the Indiana AI group. The Louisville metro spillover is the structural reason Clark looks demographically less like Indiana and more like Kentucky.
    source: Census ACS 2023 B02001_001E, B02001_003E, B03003_001E, B03003_003E (Clark County, IN)
  - text: Median gross rent in Clark is $1,058 against a 9.3% poverty rate, the lowest poverty rate in the Indiana group. The Meta campus joins a host county with the strongest household balance sheet of the three Indiana AI counties in this batch.
    source: Census ACS 2023 B25064_001E, B17001_001E, B17001_002E (Clark County, IN)
in-laporte:
  last_updated: '2026-05-17'
  takeaways:
  - text: LaPorte County's 112,141 residents have a median household income of $70,452 and a median age of 40.8. Only 21.7% of adults 25 and older hold a bachelor's degree, well below the share at next-door St. Joseph County where Notre Dame sits.
    source: Census ACS 2023 B01003, B19013, B01002, B15003 (FIPS 18091)
  - text: Microsoft's $1 billion La Porte campus is a 245,000 sqft build at the Radius Industrial Park. Indiana Michigan Power residential rates rose 5.1% from 2021 to 2023, adding about $86 per year to a typical household bill, and the utility serves 422,062 residential customers across the region.
    source: data/sites/data_centers.csv (La Porte campus) + data/cache/utility_rate_yoy.csv (Indiana Michigan Power Co, IN)
  - text: County home prices rose 19.1% over three years against a $180,700 median home value, the steepest 3-year delta of any non-coastal Microsoft site in our cache. Property tax assessments tracked at +9.8%.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 18091) + Census ACS 2023 B25077
  - text: 'Microsoft has now announced three Indiana Michigan Power campuses in the South Bend metro: Project Rainier in New Carlisle, Granger, and La Porte. The three sites together are the largest concentration of new AI load tied to a single mid-size Midwestern utility.'
    source: data/sites/data_centers.csv (Project Rainier, Granger, La Porte)
  sources:
  - https://en.wikipedia.org/wiki/La_Porte,_Indiana
  demographics:
  - text: Manufacturing accounts for 22.5% of LaPorte County jobs, the highest manufacturing share in the Indiana group and the second-highest in this batch after Whitfield. Microsoft's La Porte campus lands at the Radius Industrial Park inside one of the most factory-anchored host counties of the 16.
    source: Census ACS 2023 C24050_001E, C24050_004E (LaPorte County, IN)
  - text: 14.0% of LaPorte residents live in poverty against a $926 median gross rent. The county has the second-highest poverty rate in this batch after Montgomery Alabama, paired with the second-cheapest rent in the Indiana group.
    source: Census ACS 2023 B17001_001E, B17001_002E, B25064_001E (LaPorte County, IN)
  - text: 10.5% of LaPorte residents are Black alone, the highest Black share in the Indiana AI group and a Gary-and-Michigan-City legacy. The Microsoft build adds load to a county whose population profile mirrors the broader Lake Michigan industrial arc.
    source: Census ACS 2023 B02001_001E, B02001_003E (LaPorte County, IN)
  - text: 7.4% of LaPorte adults are veterans and 86.7% lived in the same house a year ago. The campus arrives in a settled, veteran-heavy labor pool that has already weathered the closures of NIPSCO coal units and the Bethlehem Steel downsize.
    source: Census ACS 2023 B21001_001E, B21001_002E, B07001_001E, B07001_017E (LaPorte County, IN)
mn-dakota:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dakota County is 442,204 people with a $105,212 median household income, the highest of any county in this batch. 44.6% of adults 25 and older hold a bachelor's degree, making it the most-educated Meta site outside of the Bay Area.
    source: Census ACS 2023 B01003, B19013, B15003 (FIPS 27037)
  - text: Meta's 715,000 sqft Rosemount build sits on the former UMore Park parcel, land the University of Minnesota acquired from the WWII-era Gopher Ordnance Works in 1947. Rosemount itself is 25,650 residents.
    source: 'data/sites/data_centers.csv (Rosemount) + sources[0] (Wikipedia: Rosemount, MN)'
  - text: Xcel Energy's Minnesota residential rate rose from 15.3 to 17.0 cents per kWh between 2021 and 2023, an 11.2% jump worth about $184 per year on a typical 10,800 kWh household. Xcel's 1.23 million Minnesota residential customers are absorbing that on top of the new Rosemount load.
    source: data/cache/utility_rate_yoy.csv (Northern States Power Co - Minnesota, MN)
  - text: Property tax assessments rose 10.0% over three years against a $362,100 median home value, the only Twin Cities suburban county in this batch and the only one where home prices have stayed under +5% while taxes ran into double digits.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 27037)
  sources:
  - https://en.wikipedia.org/wiki/Rosemount,_Minnesota
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Only 5.6% of Dakota County residents live below the federal poverty line and unemployment is 3.6%, both the lowest values in this batch. The Meta Rosemount campus is landing in a county that already runs a tight labor market before the construction phase ramps.
    source: Census ACS 2023 B17001, B23025 (FIPS 27037)
  - text: 10.8% of Dakota County workers are in manufacturing, the third-highest share in this batch. Flint Hills Resources operates the Pine Bend refinery and CHS owns the regional supply chain, so Meta is competing for skilled trades against established industrial employers.
    source: Census ACS 2023 C24050 (FIPS 27037)
  - text: 93.8% of Dakota County households have a wired broadband subscription, the highest in this batch. The Meta site is being built into a metro that already lives online, which changes who actually benefits from the new fiber Meta funds.
    source: Census ACS 2023 B28002 (FIPS 27037)
  - text: Dakota County is 7.3% Black, 8.4% Hispanic, 5.2% Asian, and 76.0% white. The Asian share is twice that of any North Dakota AI county and reflects the Twin Cities Hmong, Somali, and Lao communities concentrated north of Rosemount.
    source: Census ACS 2023 B02001, B03003 (FIPS 27037)
nc-caldwell:
  last_updated: '2026-05-17'
  takeaways:
  - text: Caldwell County is 80,618 residents with a $55,401 median household income and a median age of 45.5. Lenoir, the county seat at 18,352 residents, built its economy on Broyhill Furniture and the broader Catawba Valley furniture cluster before Google arrived in 2008.
    source: 'Census ACS 2023 B01003, B19013, B01002 (FIPS 37027) + sources[0] (Wikipedia: Lenoir, NC)'
  - text: Duke Energy Carolinas residential rates rose from 10.9 to 13.9 cents per kWh from 2021 to 2023, a 28.3% jump worth about $330 per year on a typical 10,800 kWh household. Duke serves 1.92 million residential customers in North Carolina alone.
    source: data/cache/utility_rate_yoy.csv (Duke Energy Carolinas, NC)
  - text: Home prices rose 23.2% over three years against a $174,000 median home value, the steepest 3-year home-price delta in any North Carolina AI county we track. Only 18.6% of adults hold a bachelor's degree.
    source: data/cache/realestate_yoy.csv (FIPS 37027) + Census ACS 2023 B25077, B15003
  - text: Google's Lenoir campus has been operational since 2008, well before the current AI boom. It is the longest-running hyperscaler campus on Duke Energy Carolinas, and the original tax-incentive package generated the local controversy now being replayed in Caldwell's three new neighboring builds in Catawba and Rutherford.
    source: data/sites/data_centers.csv (Lenoir) + sources[0]
  sources:
  - https://en.wikipedia.org/wiki/Lenoir,_North_Carolina
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 21.5% of Caldwell County workers are in manufacturing, the highest manufacturing share of any AI host county in this batch. The Catawba Valley furniture and fiber-optic-cable cluster still employs more workers than any service sector.
    source: Census ACS 2023 C24050 (FIPS 37027)
  - text: Median gross rent in Caldwell is $735 a month, the lowest in this batch. With 26.0% renter households and a poverty rate of 12.7%, any wage-driven rent inflation from the Google Lenoir expansion lands hardest on the third of the county that does not own.
    source: Census ACS 2023 B25064, B25003, B17001 (FIPS 37027)
  - text: Caldwell County is 86.6% white, 4.1% Black, 6.4% Hispanic, and only 0.5% Asian. Google's longest-running Southeast campus operates in a county that is demographically closer to mid-century Appalachia than to its Atlanta or Charlotte hyperscaler peers.
    source: Census ACS 2023 B02001, B03003 (FIPS 37027)
  - text: Only 1.2% of Caldwell residents moved in from another state in the past year, the second-lowest interstate migration rate in this batch. Google has spent 17 years operating in a county whose population is not being replenished by newcomers.
    source: Census ACS 2023 B07001 (FIPS 37027)
nc-catawba:
  last_updated: '2026-05-17'
  takeaways:
  - text: Catawba County's 162,051 residents have a $64,544 median household income. The Hickory area still makes 40% of the world's fiber-optic cable, which gives the county both the labor pool and the right-of-way to host three hyperscaler campuses on Duke Energy Carolinas.
    source: 'Census ACS 2023 B01003, B19013 (FIPS 37035) + sources[0] (Wikipedia: Hickory, NC)'
  - text: Apple's Maiden iCloud campus has been operational since 2011 on a 500,000 sqft footprint. Maiden itself is a town of 3,736 that was incorporated in 1883 as a cotton-mill site.
    source: 'data/sites/data_centers.csv (Maiden) + sources[1] (Wikipedia: Maiden, NC)'
  - text: Microsoft's Lyle Creek and Boyd Farms builds add a 1,385-acre Catawba County campus cluster announced in 2024. The two parcels sit within a few miles of Apple's existing campus, all on the same Duke Energy Carolinas grid that just took a 28.3% residential rate increase.
    source: data/sites/data_centers.csv (Lyle Creek, Boyd Farms) + data/cache/utility_rate_yoy.csv
  - text: Property tax assessments rose 12.7% over three years against a $218,100 median home value. Home prices rose 10.7% on the same baseline, a more restrained pairing than in Caldwell or Rutherford even with three active builds.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 37035) + Census ACS 2023 B25077
  sources:
  - https://en.wikipedia.org/wiki/Hickory,_North_Carolina
  - https://en.wikipedia.org/wiki/Maiden,_North_Carolina
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 26.5% of Catawba County workers are in manufacturing, the highest share of any AI host county in this batch and roughly 3x the national average of about 10%. The Hickory fiber-optic and furniture clusters give Microsoft and Apple a labor pool no other Carolinas county can match.
    source: Census ACS 2023 C24050 (FIPS 37035)
  - text: Catawba County is 4.1% Asian and 11.1% Hispanic, the most ethnically diverse of the three Carolinas counties in this batch. The Hmong and Latino communities around Newton and Conover are a legacy of the 1980s textile-mill labor recruitment.
    source: Census ACS 2023 B02001, B03003 (FIPS 37035)
  - text: Only 1.8% of Catawba residents moved in from another state in the past year despite three active hyperscaler builds. The skilled workforce hosting Apple, Microsoft Lyle Creek, and Microsoft Boyd Farms is still drawn overwhelmingly from within North Carolina.
    source: Census ACS 2023 B07001 (FIPS 37035)
  - text: 12.8% of Catawba residents live below poverty and 27.3% rent. With three campuses on the same Duke Energy grid that just took a 28.3% residential rate hike, the rent and bill stack on lower-income households compounds faster than in Caldwell or Rutherford.
    source: Census ACS 2023 B17001, B25003 (FIPS 37035)
nc-cherokee:
  last_updated: '2026-05-17'
  takeaways:
  - text: Cherokee County has 29,197 residents with a median age of 53.3, the oldest of any AI host county in this batch. Median household income is $51,496.
    source: Census ACS 2023 B01003, B19013, B01002 (FIPS 37039)
  - text: Core Scientific's 65 MW Marble site is small by current AI standards but represents a roughly $250 million capital investment in a county whose entire annual GDP is under $1 billion. The CoreWeave lease is the anchor tenant.
    source: data/sites/data_centers.csv (Marble) + Census ACS 2023 B19013
  - text: Duke Energy Carolinas residential rates rose 28.3% from 2021 to 2023, the same jump felt across the Carolinas. On Cherokee's $51,496 median household income, that 28.3% rate move adds about $330 per year to a typical bill before the Marble load energizes.
    source: data/cache/utility_rate_yoy.csv (Duke Energy Carolinas, NC) + Census ACS 2023 B19013
  - text: Home prices rose 11.6% over three years against a $208,700 median home value. Only 24.2% of adults 25 and older hold a bachelor's degree, and the county lost population between 2010 and 2020.
    source: data/cache/realestate_yoy.csv (FIPS 37039) + Census ACS 2023 B25077, B15003
  sources:
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 11.3% of Cherokee County adults are veterans, the second-highest veteran share in this batch behind Sarpy NE. The aging veteran population overlaps with the county's 53.3-year median age and explains the high homeownership rate.
    source: Census ACS 2023 B21001 (FIPS 37039)
  - text: 83.6% of Cherokee County households own their home, the highest homeownership rate of any county in this batch. Only 16.4% rent, so the Core Scientific Marble campus lands in a community where housing stock is owner-controlled and slow to flip.
    source: Census ACS 2023 B25003 (FIPS 37039)
  - text: 14.6% of Cherokee residents live below poverty, the highest poverty rate among the four North Carolina AI counties in this batch. The 91.2% white, 1.5% Black, 3.5% Hispanic profile makes Marble the most demographically homogeneous Carolinas data-center host.
    source: Census ACS 2023 B17001, B02001, B03003 (FIPS 37039)
  - text: Only 82.2% of Cherokee households have a wired broadband subscription, the lowest in North Carolina across this batch. The Murphy and Marble area sits on the western edge of the state's broadband-equity gap that the Core Scientific build will not close on its own.
    source: Census ACS 2023 B28002 (FIPS 37039)
nc-rutherford:
  last_updated: '2026-05-17'
  takeaways:
  - text: Rutherford County has 64,850 residents with a $49,771 median household income, the lowest of any North Carolina AI county we track. Forest City, where Meta's campus sits, is 7,377 residents and built its economy on the Alexander Manufacturing textile mill before Facebook arrived in 2010.
    source: 'Census ACS 2023 B01003, B19013 (FIPS 37161) + sources[0] (Wikipedia: Forest City, NC)'
  - text: Meta's original Forest City announcement in 2010 was a $450 million build. The campus is now classified as legacy storage-heavy and is being expanded as part of Meta's national AI footprint refresh.
    source: data/sites/data_centers.csv (Forest City) + sources[0]
  - text: Property tax assessments rose 21.0% over three years, the steepest property-tax delta in any North Carolina AI county we track and roughly three times the local wage growth implied by Census BLS data.
    source: data/cache/property_tax_yoy.csv (FIPS 37161)
  - text: Duke Energy Carolinas residential rates rose 28.3% from 2021 to 2023, adding about $330 per year to a typical household bill. On Rutherford's $49,771 median income, that rate jump consumes roughly 0.7% of pre-tax household income before the Meta expansion adds new load.
    source: data/cache/utility_rate_yoy.csv (Duke Energy Carolinas, NC) + Census ACS 2023 B19013
  sources:
  - https://en.wikipedia.org/wiki/Forest_City,_North_Carolina
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 17.6% of Rutherford County residents live below poverty, the highest poverty rate of any North Carolina AI host county in this batch. Meta's Forest City expansion arrives in a county that has carried mill-closure poverty since the 2000s.
    source: Census ACS 2023 B17001 (FIPS 37161)
  - text: 16.1% of Rutherford workers are in manufacturing, second only to Caldwell among the Carolinas AI counties in this batch. The textile-and-furniture industrial base remains the wage floor that Meta's expansion is now bidding against.
    source: Census ACS 2023 C24050 (FIPS 37161)
  - text: 8.0% of Rutherford adults are veterans, the highest veteran share among the four North Carolina counties in this batch. The 5.5% unemployment rate is also the highest of any NC AI county here.
    source: Census ACS 2023 B21001, B23025 (FIPS 37161)
  - text: Median gross rent in Rutherford is $748 a month against a 25.9% renter share. With Duke Energy Carolinas already up 28.3% on residential rates, the dollar bill increase from electricity now exceeds an entire month of typical rent inflation.
    source: Census ACS 2023 B25064, B25003 (FIPS 37161)
nd-cass:
  last_updated: '2026-05-17'
  takeaways:
  - text: Cass County is 189,286 residents anchored by Fargo, with a $75,023 median household income and a median age of 32.9, the youngest of any AI host county in this batch. 43.3% of adults hold a bachelor's degree, lifted by North Dakota State University.
    source: Census ACS 2023 B01003, B19013, B01002, B15003 (FIPS 38017)
  - text: Applied Digital's $3 billion Polaris Forge 2 campus sits in Harwood, a city of 794 residents north of Fargo. The campus is the largest single industrial commitment Cass County has seen since the Microsoft Bing data center build cycle of the late 2000s.
    source: 'data/sites/data_centers.csv (Polaris Forge 2) + sources[0] (Wikipedia: Harwood, ND)'
  - text: Otter Tail Power's North Dakota residential rate rose from 10.4 to 11.4 cents per kWh between 2021 and 2023, a 9.3% jump worth about $104 per year on a typical 10,800 kWh household. Otter Tail has only 45,467 residential customers across all of North Dakota.
    source: data/cache/utility_rate_yoy.csv (Otter Tail Power Co, ND)
  - text: Median home value in Cass County is $284,700 and property tax assessments rose 10.0% over three years. Zillow does not publish a 3-year typical-home-value series for Cass County, which is why the standard home-price delta reads as n/a.
    source: Census ACS 2023 B25077 + data/cache/property_tax_yoy.csv (FIPS 38017) + data/cache/realestate_yoy.csv
  sources:
  - https://en.wikipedia.org/wiki/Harwood,_North_Dakota
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 48.0% of Cass County households rent rather than own, the highest renter share of any North Dakota AI county and second only to Union NJ in this batch. The North Dakota State University student body inflates the renter pool that absorbs Applied Digital wage pressure.
    source: Census ACS 2023 B25003 (FIPS 38017)
  - text: Only 79.2% of Cass residents lived in the same house one year earlier, the lowest residential stability in this batch. Fargo's renter churn means rent signals from Polaris Forge 2 will show up in lease turnover faster than in any other AI host county here.
    source: Census ACS 2023 B07001 (FIPS 38017)
  - text: 6.3% of Cass residents moved in from another state in the past year, the highest interstate migration rate of any county in this batch. The Polaris Forge 2 hiring funnel is plugging into an already-flowing Fargo in-migration pipe.
    source: Census ACS 2023 B07001 (FIPS 38017)
  - text: Unemployment is 3.0% with a poverty rate of 10.3% and a manufacturing share of 8.7%. Cass is the tightest North Dakota labor market in this batch and the AI buildout is competing against Bobcat, Microsoft Bing operations, and an already-low Fargo jobless pool.
    source: Census ACS 2023 B23025, B17001, C24050 (FIPS 38017)
nd-dickey:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dickey County has 4,959 residents and a $63,125 median household income. Applied Digital's 400 MW Ellendale Polaris Forge 1 campus translates to roughly 81 kW of AI compute per resident, the highest per-capita ratio of any county in this batch.
    source: Census ACS 2023 B01003, B19013 (FIPS 38021) + data/sites/data_centers.csv (Ellendale Polaris Forge 1)
  - text: Ellendale itself is 1,125 residents and was platted in 1882 as a stop on the Chicago, Milwaukee, St. Paul and Pacific Railroad. CoreWeave's 250 MW lease at Polaris Forge 1 is now the anchor tenant on the only US AI campus built primarily for HPC training in a town this small.
    source: 'sources[0] (Wikipedia: Ellendale, ND) + data/sites/data_centers.csv (Ellendale Polaris Forge 1)'
  - text: Property tax assessments fell 1.3% over three years, the only county in this batch where assessments actually dropped. Otter Tail Power's North Dakota residential rate is up 9.3% on the same baseline.
    source: data/cache/property_tax_yoy.csv (FIPS 38021) + data/cache/utility_rate_yoy.csv (Otter Tail Power Co, ND)
  - text: Median home value is $167,100, the lowest of any AI county in this batch, and 27.1% of adults 25 and older hold a bachelor's degree. Zillow has no 3-year typical-home-value series here, so any home-price spillover from the AI build will not surface in the standard data feed.
    source: Census ACS 2023 B25077, B15003 + data/cache/realestate_yoy.csv (no FIPS 38021 row)
  sources:
  - https://en.wikipedia.org/wiki/Ellendale,_North_Dakota
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Dickey County has 4,959 residents but only 1,953 housing units. The CoreWeave-anchored Ellendale Polaris Forge 1 campus will draw construction and operations workers into a county with roughly 2,000 doors total, including the rental stock.
    source: Census ACS 2023 B25003 (FIPS 38021)
  - text: 92.7% of Dickey residents are white, 3.9% Hispanic, 1.1% Asian, and 0.3% Black, with just 14 Black residents in the 2023 ACS sample. Applied Digital is opening the most racially homogeneous AI host county in the entire dataset.
    source: Census ACS 2023 B02001, B03003 (FIPS 38021)
  - text: Unemployment is 2.9% and 13.4% of Dickey workers are in manufacturing. Cavalier Specialty Vehicles in Ellendale and the regional grain processors already absorb the working-age labor pool, so Polaris Forge 1 will largely run on commute-in or housed-in workers.
    source: Census ACS 2023 B23025, C24050 (FIPS 38021)
  - text: Only 81.7% of Dickey households have a wired broadband subscription. The 400 MW CoreWeave HPC cluster will train frontier models on a fiber spine that 18% of its host county's residents do not yet plug into at home.
    source: Census ACS 2023 B28002 (FIPS 38021)
nd-stutsman:
  last_updated: '2026-05-17'
  takeaways:
  - text: Stutsman County is 21,525 residents centered on Jamestown, a city of 15,849 that was a Northern Pacific Railroad repair-yard town from 1872 until the 1960s. The economy now leans on precision manufacturing, food processing, and the Jamestown JMS01 HPC site.
    source: 'Census ACS 2023 B01003 (FIPS 38093) + sources[0] (Wikipedia: Jamestown, ND)'
  - text: Applied Digital's 100 MW Jamestown JMS01 went operational in 2024 and was the company's first North Dakota HPC site, predating the larger Polaris Forge campuses in Dickey and Cass counties. The 100 MW load is roughly 4.6 kW per Stutsman resident.
    source: data/sites/data_centers.csv (Jamestown JMS01) + Census ACS 2023 B01003
  - text: Otter Tail Power's North Dakota residential rate rose 9.3% from 2021 to 2023 and the utility has only 45,467 residential customers statewide. Property tax assessments rose 9.2% over the same baseline on a $200,300 median home value.
    source: data/cache/utility_rate_yoy.csv (Otter Tail Power Co, ND) + data/cache/property_tax_yoy.csv (FIPS 38093) + Census ACS 2023 B25077
  - text: Median household income is $60,172 and the median age is 40.6. 24.4% of adults hold a bachelor's degree, leaving Stutsman with a smaller technically-trained labor pool than Cass County 100 miles north.
    source: Census ACS 2023 B19013, B01002, B15003 (FIPS 38093)
  sources:
  - https://en.wikipedia.org/wiki/Jamestown,_North_Dakota
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 11.0% of Stutsman County workers are in manufacturing including Cavendish Farms potato processing in Jamestown. The 100 MW JMS01 site is competing for the same skilled-trades labor pool that staffs the Cavendish line.
    source: Census ACS 2023 C24050 (FIPS 38093)
  - text: Unemployment is 3.6% and 12.4% of Stutsman residents live below poverty. The poverty rate is higher than Cass County 100 miles north despite the same Otter Tail Power rate environment.
    source: Census ACS 2023 B23025, B17001 (FIPS 38093)
  - text: 36.4% of Stutsman households rent rather than own, the highest renter share of any North Dakota AI host county. A small 100 MW hyperscaler load can move rents in a market this tight more visibly than the larger Cass or Dickey builds will.
    source: Census ACS 2023 B25003 (FIPS 38093)
  - text: 92.0% of Stutsman residents are white, 3.0% Hispanic, 2.1% Black, and 0.5% Asian. The University of Jamestown student body lifts the local diversity baseline above what the surrounding agricultural counties report.
    source: Census ACS 2023 B02001, B03003 (FIPS 38093)
ne-sarpy:
  last_updated: '2026-05-17'
  takeaways:
  - text: Sarpy County has 194,051 residents with a $101,402 median household income, the highest in Nebraska and the second-highest in this batch behind Dakota MN. Papillion is 24,159 residents and 41.9% of county adults hold a bachelor's degree.
    source: 'Census ACS 2023 B01003, B19013, B15003 (FIPS 31153) + sources[0] (Wikipedia: Papillion, NE)'
  - text: Meta's Papillion campus has been operational since 2017 on the OPPD grid. Google also operates separate data centers in Papillion, making Sarpy County one of the few US counties where both Meta and Google hyperscalers run on the same municipal utility.
    source: data/sites/data_centers.csv (Sarpy County) + sources[0]
  - text: OPPD is a public-power utility with 362,918 residential customers. Its residential rate rose from 11.7 to 12.4 cents per kWh between 2021 and 2023, a 5.7% jump worth about $72 per year on a typical household bill, the most restrained in any county in this batch with multiple hyperscalers.
    source: data/cache/utility_rate_yoy.csv (Omaha Public Power District, NE)
  - text: Home prices rose 1.9% over three years against a $287,600 median home value, the smallest 3-year home-price delta in this batch. Property tax assessments rose 13.2% on the same baseline, an unusual decoupling of tax growth from price growth.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 31153) + Census ACS 2023 B25077
  sources:
  - https://en.wikipedia.org/wiki/Papillion,_Nebraska
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 12.8% of Sarpy County adults are veterans, the highest veteran share of any county in this batch. Offutt Air Force Base, headquarters of US Strategic Command, sits inside the county and seeds a labor pool with active security clearances directly relevant to Meta and Google.
    source: Census ACS 2023 B21001 (FIPS 31153)
  - text: Unemployment is 2.3% and poverty is 5.2%, both the lowest values of any county in this batch. The Sarpy hyperscaler labor pool is the tightest of any multi-campus county here.
    source: Census ACS 2023 B23025, B17001 (FIPS 31153)
  - text: 94.8% of Sarpy households have a wired broadband subscription, the highest in this batch. Meta and Google built into a county where residential connectivity already matches the campus they then funded.
    source: Census ACS 2023 B28002 (FIPS 31153)
  - text: Median gross rent in Sarpy is $1,284 against a 29.4% renter share and an 11.1% Hispanic population. The renter share is lower than urban metros even though Papillion and Bellevue function as Omaha-suburban commuter towns.
    source: Census ACS 2023 B25064, B25003, B03003 (FIPS 31153)
nj-union:
  last_updated: '2026-05-17'
  takeaways:
  - text: Union County is 572,549 residents with a $100,117 median household income and a $488,800 median home value. It is the only Northeast urban county in this batch and the only one where a hyperscaler is converting an existing pharmaceutical complex into AI compute.
    source: Census ACS 2023 B01003, B19013, B25077 (FIPS 34039)
  - text: CoreWeave's $1.8 billion Kenilworth NEST is built into former Merck and Schering-Plough lab space. Merck announced in April 2020 it would move its global headquarters out of Kenilworth to Rahway by the end of 2023, freeing the campus for retrofit.
    source: 'data/sites/data_centers.csv (Kenilworth NEST) + sources[0] (Wikipedia: Kenilworth, NJ)'
  - text: PSE&G's New Jersey residential rate rose from 17.1 to 19.8 cents per kWh between 2021 and 2023, a 15.6% jump worth about $292 per year on a typical household bill. PSE&G has 2.06 million residential customers across the state.
    source: data/cache/utility_rate_yoy.csv (Public Service Elec & Gas Co, NJ)
  - text: County home prices rose 13.3% over three years and property tax assessments are flat at 0.0%, the only AI host county in this batch where tax assessments did not move. The CoreWeave project was the first award under New Jersey's new EDA AI tax-credit program.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 34039) + data/sites/data_centers.csv (Kenilworth NEST source URL)
  sources:
  - https://en.wikipedia.org/wiki/Kenilworth,_New_Jersey
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Union County is 34.4% Hispanic, 20.5% Black, 5.6% Asian, and 41.7% white, the only US AI host county with no racial majority. Kenilworth NEST is the first hyperscaler retrofit landing in a true Northeast plurality county.
    source: Census ACS 2023 B02001, B03003 (FIPS 34039)
  - text: 42.4% of Union County households rent rather than own, the highest renter share of any county in this batch. Median gross rent is $1,664 a month, the highest rent in the dataset, so a 15.6% PSE&G rate increase compounds on top of an already squeezed renter base.
    source: Census ACS 2023 B25003, B25064 (FIPS 34039)
  - text: Unemployment is 6.3% in Union County, the second-highest jobless rate in this batch. CoreWeave's Kenilworth retrofit lands in a labor market where roughly 1 in 16 active workers is currently unemployed, against the same Census reference month.
    source: Census ACS 2023 B23025 (FIPS 34039)
  - text: Only 2.8% of Union adults are veterans, the lowest veteran share of any AI host county in this batch. The traditional defense-manufacturing labor pipeline that anchors counties like Sarpy or Jackson does not exist here.
    source: Census ACS 2023 B21001 (FIPS 34039)
nm-dona-ana:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dona Ana County has 221,665 residents with a $55,663 median household income. Santa Teresa, where Project Jupiter sits, is a 5,044-resident community 81% Hispanic or Latino, anchored by a US-Mexico port of entry and the Dona Ana County International Jetport.
    source: 'Census ACS 2023 B01003, B19013 (FIPS 35013) + sources[0] (Wikipedia: Santa Teresa, NM)'
  - text: Oracle and OpenAI's Project Jupiter is the public name for a $165 billion Stargate site at Santa Teresa, on El Paso Electric's grid rather than New Mexico's PNM. El Paso Electric's New Mexico residential rate actually fell 9.8% from 2021 to 2023, the steepest 3-year rate decline of any AI host county in this batch.
    source: data/sites/data_centers.csv (Project Jupiter) + data/cache/utility_rate_yoy.csv (El Paso Electric Co, NM)
  - text: 31.4% of county adults 25 and older hold a bachelor's degree, lifted by New Mexico State University in Las Cruces. Median home value is $205,400 and home prices rose 3.0% over three years.
    source: Census ACS 2023 B15003, B25077 + data/cache/realestate_yoy.csv (FIPS 35013)
  - text: Property tax assessments rose 10.4% over three years, well above the 3.0% home-price delta. The Santa Teresa Gateway Rail Park, a 1,100-acre Union Pacific interchange, gives Project Jupiter direct rail access to the wider Stargate logistics chain.
    source: data/cache/property_tax_yoy.csv (FIPS 35013) + sources[0]
  sources:
  - https://en.wikipedia.org/wiki/Santa_Teresa,_New_Mexico
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 22.2% of Dona Ana County residents live below the federal poverty line and 67.6% are Hispanic. Project Jupiter sits in the second-poorest county in this batch behind Richland LA and the highest Hispanic share of any AI host county tracked.
    source: Census ACS 2023 B17001, B03003 (FIPS 35013)
  - text: Only 4.6% of Dona Ana workers are in manufacturing, the lowest manufacturing share of any county in this batch. The local economy runs on government, NMSU, agriculture, and the Santa Teresa port of entry rather than industrial wages.
    source: Census ACS 2023 C24050 (FIPS 35013)
  - text: Unemployment is 6.8% in Dona Ana County, the highest jobless rate of any AI host county in this batch. Project Jupiter is being announced into the loosest labor market in the dataset.
    source: Census ACS 2023 B23025 (FIPS 35013)
  - text: 34.7% of Dona Ana households rent rather than own. Median gross rent is $903 a month, low by national standards but high relative to the 22.2% poverty rate, so a Stargate-driven rent move would hit the working-poor Hispanic majority hardest.
    source: Census ACS 2023 B25003, B25064, B17001 (FIPS 35013)
nm-valencia:
  last_updated: '2026-05-17'
  takeaways:
  - text: Valencia County is 77,382 residents with a $58,333 median household income. Los Lunas, on the west bank of the Rio Grande, is 17,242 residents and 20.8% of county adults hold a bachelor's degree.
    source: 'Census ACS 2023 B01003, B19013, B15003 (FIPS 35061) + sources[0] (Wikipedia: Los Lunas, NM)'
  - text: Meta's Los Lunas campus is now eight data centers totaling 3.8 million sqft. The original Facebook announcement was in September 2016 and the site has been operational since February 2019, with construction phases overlapping AI buildout.
    source: data/sites/data_centers.csv (Los Lunas) + sources[0]
  - text: PNM residential rates rose from 14.7 to 15.6 cents per kWh between 2021 and 2023, a 5.9% jump worth about $96 per year on a typical 10,800 kWh household. PNM has 492,945 residential customers across New Mexico.
    source: data/cache/utility_rate_yoy.csv (Public Service Co of NM, NM)
  - text: Property tax assessments rose 7.3% over three years against a $206,800 median home value. Zillow has no 3-year typical-home-value series for Valencia County, so the home-price spillover from Meta's expansion is not yet visible in standard data.
    source: data/cache/property_tax_yoy.csv (FIPS 35061) + Census ACS 2023 B25077 + data/cache/realestate_yoy.csv (no FIPS 35061 row)
  sources:
  - https://en.wikipedia.org/wiki/Los_Lunas,_New_Mexico
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 60.6% of Valencia County residents are Hispanic, the second-highest Hispanic share of any AI host county tracked behind Dona Ana. The traditional New Mexican land-grant communities along the Rio Grande are the demographic core of Meta's Los Lunas neighborhood.
    source: Census ACS 2023 B03003 (FIPS 35061)
  - text: 9.6% of Valencia adults are veterans, the second-highest veteran share among AI counties in this batch behind Sarpy and Cherokee. Kirtland Air Force Base and Sandia National Labs in Albuquerque seed a Valencia commuter workforce with cleared technical skills.
    source: Census ACS 2023 B21001 (FIPS 35061)
  - text: 82.1% of Valencia households own their home, the second-highest homeownership rate in this batch behind Cherokee NC. The 17.9% renter share is the smallest channel through which Meta wage pressure can move local housing costs.
    source: Census ACS 2023 B25003 (FIPS 35061)
  - text: 18.4% of Valencia residents live below poverty and unemployment is 6.9%, both elevated against a national baseline. The eight-building Meta complex anchors a county where almost 1 in 5 residents lives below the poverty line.
    source: Census ACS 2023 B17001, B23025 (FIPS 35061)
nv-clark:
  last_updated: '2026-05-17'
  takeaways:
  - text: Clark County is 2,293,764 residents, the largest county in this batch by more than 4x. Median household income is $73,845 and 27.3% of adults 25 and older hold a bachelor's degree, both well below the Las Vegas tourism-economy narrative implies.
    source: Census ACS 2023 B01003, B19013, B15003 (FIPS 32003)
  - text: Google's Henderson campus was a $600 million build on a 64-acre site, the company's first Nevada data center. Google announced an additional $400 million investment in Nevada data centers in 2024.
    source: 'data/sites/data_centers.csv (Henderson) + sources[0] (Wikipedia: Henderson, NV)'
  - text: NV Energy's residential rate rose from 14.3 to 15.3 cents per kWh between 2021 and 2023, a 6.9% jump worth about $108 per year on a typical 10,800 kWh household. Nevada Power has 916,385 residential customers, the second-largest residential base of any utility in this batch behind PSE&G.
    source: data/cache/utility_rate_yoy.csv (Nevada Power Co, NV)
  - text: Home prices rose 4.6% over three years against a $400,800 median home value, the highest median value in this batch outside of Union NJ. Property tax assessments rose 9.4% on the same baseline.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 32003) + Census ACS 2023 B25077
  sources:
  - https://en.wikipedia.org/wiki/Henderson,_Nevada
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Clark County is 31.4% Hispanic, 12.1% Black, 10.5% Asian, and 47.1% white, the most racially diverse AI host county in the entire dataset. Google's Henderson expansion lands in a community without any single demographic majority.
    source: Census ACS 2023 B02001, B03003 (FIPS 32003)
  - text: Unemployment is 7.4% in Clark County, the highest jobless rate of any AI host county in the dataset. The Las Vegas service economy still bears Strip cycle volatility that the Henderson tech corridor only partially insulates.
    source: Census ACS 2023 B23025 (FIPS 32003)
  - text: 43.0% of Clark County households rent rather than own at a median rent of $1,518 a month. NV Energy's 6.9% residential rate jump on a renter base this large amplifies the effective bill-plus-rent stack on roughly 364,000 households.
    source: Census ACS 2023 B25003, B25064 (FIPS 32003)
  - text: Only 3.9% of Clark County workers are in manufacturing, against 13.2% in poverty. Google's data-center capex is one of the few non-hospitality industrial investments in a county whose labor force is otherwise locked to tourism cycles.
    source: Census ACS 2023 C24050, B17001 (FIPS 32003)
nv-washoe:
  last_updated: '2026-05-17'
  takeaways:
  - text: Washoe County has 491,770 residents and a median household income of $85,600, both the highest of any AI county outside the Pacific Northwest tech corridor. The Tahoe Reno Industrial Center east of Sparks spans 107,000 acres, the largest industrial park in the United States.
    source: 'Census ACS 2023 B01003, B19013 (Washoe County, NV) + sources[0] (Wikipedia: Tahoe Reno Industrial Center)'
  - text: Google bought 1,200 acres at the TRI Center for its Storey County campus. The same park already hosts Tesla's Gigafactory Nevada, Switch, Walmart, and Panasonic battery production behind a private power network of more than 900 MW.
    source: 'sources[0] (Wikipedia: Tahoe Reno Industrial Center) + data/sites/data_centers.csv'
  - text: NV Energy's Nevada Power residential rate rose from 14.3 to 15.3 cents per kWh between 2021 and 2023, a 6.9% jump worth about $107 per year on a typical household. Sierra Pacific Power, the NV Energy subsidiary that actually serves Reno, posted a sharper 8.0% rise over the same period.
    source: data/cache/utility_rate_yoy.csv (Nevada Power Co and Sierra Pacific Power Co, NV)
  - text: Property tax assessments rose 10.6% over three years, sharper than the 6.3% home price gain. Apple's Reno Technology Park added a second Sparks campus that runs on NV Energy alongside the Google site, with neither operator disclosing the actual draw.
    source: data/cache/property_tax_yoy.csv (FIPS 32031) + data/cache/realestate_yoy.csv + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Tahoe_Reno_Industrial_Center
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 25.6% of Washoe County residents are Hispanic and 5.6% are Asian, with a 65.5% white share. Reno is the most Hispanic of the Northwest tech-corridor AI host counties and the only one where the Hispanic share exceeds 20%.
    source: Census ACS 2023 B02001, B03003 (FIPS 32031)
  - text: 40.5% of Washoe County households rent rather than own at a median gross rent of $1,507 a month, a stack much closer to Clark NV than to the rural northern Nevada baseline. The Tahoe Reno Industrial Center wage premium runs through this rental market.
    source: Census ACS 2023 B25003, B25064 (FIPS 32031)
  - text: 9.6% of Washoe workers are in manufacturing, a higher share than Clark NV's 3.9% even though Reno is one-fifth the population. Tesla Gigafactory and the Panasonic battery line at TRI are the visible drivers behind that ratio.
    source: Census ACS 2023 C24050 (FIPS 32031)
  - text: 3.6% of Washoe residents moved in from another state in the past year, the highest interstate-migration rate of any Nevada AI county. The Bay Area to Reno corridor is still feeding labor into the Google and Apple builds.
    source: Census ACS 2023 B07001 (FIPS 32031)
ny-niagara:
  last_updated: '2026-05-17'
  takeaways:
  - text: Niagara County has 211,341 residents and a median household income of $67,809. Home prices rose 23.4% over three years, the steepest 3-year gain in any batch-3 county, against a median home value of just $177,400.
    source: Census ACS 2023 B01003, B19013, B25077 (Niagara County, NY) + data/cache/realestate_yoy.csv
  - text: Lake Mariner sits on the former Somerset coal plant site in Barker, leased to TeraWulf by an entity 99.9% owned by CEO Paul Prager. The 360 MW campus signed AI hosting agreements with Fluidstack that route capacity to Google, the largest hyperscaler tied to Niagara hydropower.
    source: 'sources[0] (Wikipedia: TeraWulf) + data/sites/data_centers.csv'
  - text: Niagara Mohawk's residential rate rose only 4.5% from 2021 to 2023, well below the New York investor-owned average. New York State Electric and Gas in the same region rose 27.9%, so the bill outcome for Lake Mariner's neighbors depends entirely on which utility their meter is on.
    source: data/cache/utility_rate_yoy.csv (Niagara Mohawk Power Corp and New York State Elec and Gas, NY)
  - text: Anthropic's New York campus in the Town of Niagara is a Fluidstack custom build with no announced MW disclosure. The town itself has 7,903 residents, so the project will likely be the second-largest private employer in the municipality once energized.
    source: 'data/sites/data_centers.csv (Anthropic New York) + sources[1] (Wikipedia: Niagara town NY)'
  sources:
  - https://en.wikipedia.org/wiki/TeraWulf
  - https://en.wikipedia.org/wiki/Niagara_(town),_New_York
  - https://api.census.gov/data/2023/acs/acs5?get=B25003_002E,B25003_001E&for=county:063&in=state:36
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:063&in=state:36
  demographics:
  - text: 70.9% of Niagara County housing is owner-occupied at a median home value cited elsewhere of $177,400, so the speculative spillover from Lake Mariner lands largely on existing homeowners rather than a thin rental market.
    source: Census ACS 2023 B25003 (Niagara County, NY)
  - text: Manufacturing still employs 13.9% of Niagara's workforce, a holdover from the chemical and metals economy along the Niagara River that historically rode the same hydro that now powers TeraWulf.
    source: Census ACS 2023 C24050 (Niagara County, NY)
  - text: Niagara's veteran share is 7.7% of adults 18 and over (13,066 veterans), an underused labor pool the Lake Mariner site could tap for plant-operator roles converted from former Somerset coal staff.
    source: Census ACS 2023 B21001 (Niagara County, NY)
  - text: Only 88.6% of Niagara households have a wired broadband subscription, behind the national 91% baseline. The same Town of Niagara that hosts the Anthropic build sits in the lower-connectivity bucket for upstate New York.
    source: Census ACS 2023 B28002 (Niagara County, NY)
oh-fairfield:
  last_updated: '2026-05-17'
  takeaways:
  - text: Fairfield County has 161,289 residents and a median household income of $87,069, the highest of any batch-3 county. Lancaster, the county seat, has 40,552 residents and a 200-year glass-manufacturing legacy that earned it the nickname Glass City.
    source: 'Census ACS 2023 B01003, B19013 (Fairfield County, OH) + sources[0] (Wikipedia: Lancaster, OH)'
  - text: AEP Ohio (Ohio Power Co) residential rates rose 13.7%, from 12.6 to 14.4 cents per kWh between 2021 and 2023. That adds about $187 per year to a typical household bill before any new AI demand flows through to retail.
    source: data/cache/utility_rate_yoy.csv (Ohio Power Co, OH)
  - text: Home prices rose 11.1% over three years against a $272,200 median home value. Property tax assessments rose 13.3% in the same window, the second-steepest of any batch-3 county.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 39045) + Census ACS 2023 B25077
  - text: Google's Lancaster campus is the southernmost site in its $2.3 billion central Ohio cluster, joining the Columbus and New Albany builds in Franklin and Licking counties. All three counties share the same AEP Ohio retail tariff, so the Lancaster build's bill impact is indistinguishable from its neighbors.
    source: data/sites/data_centers.csv (Lancaster Google) + data/cache/utility_rate_yoy.csv (Ohio Power Co, OH)
  sources:
  - https://en.wikipedia.org/wiki/Lancaster,_Ohio
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:045&in=state:39
  - https://api.census.gov/data/2023/acs/acs5?get=B25064_001E&for=county:045&in=state:39
  demographics:
  - text: 91.2% of Fairfield County households subscribe to wired broadband, the highest connectivity rate of any Ohio county in this batch. The Google Lancaster build lands in the part of the central Ohio cluster least exposed to a residential digital divide.
    source: Census ACS 2023 B28002 (Fairfield County, OH)
  - text: Fairfield's poverty rate is 8.2% and unemployment is just 3.6%, the tightest labor market of the four Ohio AI counties. Any local hire for the Lancaster Google campus pulls from a workforce that is already near full employment.
    source: Census ACS 2023 B17001 and B23025 (Fairfield County, OH)
  - text: Median gross rent in Fairfield County is $1,114, well below the Franklin County figure of $1,233 next door. The 16-mile commute from Lancaster to Columbus is a rent arbitrage already running before Google adds construction labor demand.
    source: Census ACS 2023 B25064 (Fairfield County, OH)
  - text: 89.0% of Fairfield residents lived in the same county a year earlier, the lowest residential stickiness of the central Ohio AI cluster. The county is already a net in-migration destination for Columbus commuters, a flow the Google campus will accelerate.
    source: Census ACS 2023 B07001 (Fairfield County, OH)
oh-franklin:
  last_updated: '2026-05-17'
  takeaways:
  - text: Franklin County is the most populous of the central Ohio AI counties at 1,321,635 residents and includes Columbus. 42.0% of residents over 25 hold a bachelor's degree, the highest education base of any AI county in Ohio.
    source: Census ACS 2023 B01003, B15003 (Franklin County, OH)
  - text: AEP Ohio residential rates rose 13.7% from 2021 to 2023, the same retail tariff that hits Licking and Fairfield counties. On the Franklin County median household income of $73,795, the $187 annual bill impact is muted by the strongest wage base in the cluster.
    source: data/cache/utility_rate_yoy.csv (Ohio Power Co, OH) + Census ACS 2023 B19013
  - text: Google's Columbus campus opened in 2023 as the cloud region anchor for central Ohio. The AWS Hilliard site adds a 3-campus cluster in the western suburb, but neither operator has disclosed a single MW figure for any Franklin County build.
    source: data/sites/data_centers.csv (Columbus Google, Hilliard)
  - text: Home prices rose 8.1% and property tax assessments rose 7.9% over three years, the most restrained pair in the central Ohio cluster. The 34.7 median age and university anchor partly explain why Franklin has absorbed the AI announcements without the price spike Licking saw next door.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 39049) + Census ACS 2023 B01002
  sources:
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_003E,B02001_001E&for=county:049&in=state:39
  - https://api.census.gov/data/2023/acs/acs5?get=C24050_004E,C24050_001E&for=county:049&in=state:39
  demographics:
  - text: Franklin County is 23.0% Black and 7.1% Hispanic, the most diverse county in the central Ohio AI cluster. Columbus absorbs the hyperscaler footprint without the demographic monoculture Licking and Fairfield show next door.
    source: Census ACS 2023 B02001 and B03003 (Franklin County, OH)
  - text: 93.3% of Franklin households have wired broadband, the highest in any Ohio batch-3 county. The 547,922-unit housing stock includes Ohio State student rentals and downtown Columbus apartments that already run on fiber the rural AI counties lack.
    source: Census ACS 2023 B28002 and B25003 (Franklin County, OH)
  - text: Only 53.0% of Franklin's housing is owner-occupied (290,219 units), the lowest of any Ohio AI county. The Google Columbus and AWS Hilliard builds therefore land in a rental-heavy market where landlord pass-throughs, not homeowner tax escrows, capture the bill-side rate impact.
    source: Census ACS 2023 B25003 (Franklin County, OH)
  - text: Manufacturing has fallen to 7.5% of Franklin's workforce, half the share in Trumbull County. The Columbus cluster is the only Ohio AI county where the data center buildout is layering on a service economy rather than backfilling a deindustrialized one.
    source: Census ACS 2023 C24050 (Franklin County, OH)
oh-licking:
  last_updated: '2026-05-17'
  takeaways:
  - text: Licking County has 180,311 residents, but the New Albany Personal Property Tax district absorbs four campuses (Meta Prometheus, Microsoft Heath/Hebron, Google New Albany, AWS New Albany) totaling over 1 GW of announced load. New Albany itself has only 10,825 residents.
    source: 'Census ACS 2023 B01003 (Licking County, OH) + sources[0] (Wikipedia: New Albany, OH) + data/sites/data_centers.csv'
  - text: Meta's Prometheus is the world's first announced 1 GW AI data center, a single building scheduled to energize in 2026 on AEP Ohio's grid. Its load alone exceeds the residential demand of any city in Licking County.
    source: 'data/sites/data_centers.csv (Prometheus) + sources[1] (DCPulse: Meta Prometheus)'
  - text: Property tax assessments rose 12.2% over three years against a median household income of $81,033. The home-price rise of 6.0% is unusually moderate for a county absorbing four hyperscaler builds at once, a sign that most of the tax base growth is industrial rather than residential.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 39089) + Census ACS 2023 B19013
  - text: New Albany grew from 414 residents in 1980 to 10,825 in 2020, an explicit master-planned community funded by Limited Brands founder Les Wexner. Intel's separate $20 billion semiconductor fab next door means the same AEP Ohio substation has to land semiconductor and AI campus load in parallel.
    source: 'sources[0] (Wikipedia: New Albany, OH)'
  sources:
  - https://en.wikipedia.org/wiki/New_Albany,_Ohio
  - https://dcpulse.com/project/meta-prometheus-new-albany-1gw-ai-data-center
  - https://api.census.gov/data/2023/acs/acs5?get=B07001_017E,B07001_001E&for=county:089&in=state:39
  - https://api.census.gov/data/2023/acs/acs5?get=B23025_005E,B23025_002E&for=county:089&in=state:39
  demographics:
  - text: Only 89.7% of Licking residents lived in the same county a year earlier, signaling 10.3% turnover. New Albany's master-planned absorption capacity is being tested by construction labor inflow tied to four hyperscaler campuses energizing on overlapping timelines.
    source: Census ACS 2023 B07001 (Licking County, OH)
  - text: 91.9% wired broadband adoption sits between Franklin (93.3%) and Fairfield (91.2%), placing Licking in the middle of the central Ohio cluster despite hosting the largest single AI build in the world.
    source: Census ACS 2023 B28002 (Licking County, OH)
  - text: Manufacturing employs 11.0% of Licking's workforce, well above Franklin's 7.5%. The Heath and Hebron Microsoft sites are landing in a county whose workforce already includes the kind of plant-operator skill base hyperscaler operations teams hire from.
    source: Census ACS 2023 C24050 (Licking County, OH)
  - text: Licking has an unemployment rate of just 3.2%, the lowest of any Ohio batch-3 county. The four-campus, 1 GW-plus build is therefore drawing construction labor from a market already at structural full employment.
    source: Census ACS 2023 B23025 (Licking County, OH)
ok-mayes:
  last_updated: '2026-05-17'
  takeaways:
  - text: Mayes County has 39,406 residents and a median household income of $57,279. Only 16.5% of residents over 25 hold a bachelor's degree, the second-lowest education base in any batch-3 county.
    source: Census ACS 2023 B01003, B19013, B15003 (Mayes County, OK)
  - text: Pryor's MidAmerica Industrial Park hosts more than 80 companies including Google, DuPont, and Nordam, with its own airport and a 5,000-foot runway. Google has invested $2.5 billion in its Pryor campus over two phases, making it the company's second-largest data center globally.
    source: 'sources[0] (Wikipedia: Pryor Creek, OK)'
  - text: Grand River Dam Authority is a state-owned wholesale utility, so EIA does not publish a residential rate delta for Mayes County. The bill-side impact of the Google load is invisible in the standard data even though GRDA is the named seller of record.
    source: data/cache/utility_rate_yoy.csv (no GRDA row) + data/sites/data_centers.csv
  - text: Property tax assessments rose 13.4% over three years against a 4.2% home-price gain. The gap is the widest of any batch-3 county and reflects industrial assessments running ahead of residential, the standard signature of a single large taxpayer like Google MidAmerica.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 40097)
  sources:
  - https://en.wikipedia.org/wiki/Pryor_Creek,_Oklahoma
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_002E,B02001_001E&for=county:097&in=state:40
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:097&in=state:40
  demographics:
  - text: Mayes County is only 63.8% white and includes a substantial Cherokee Nation citizen population, with the MidAmerica Industrial Park sitting inside the Cherokee Nation reservation boundary reaffirmed by McGirt v Oklahoma.
    source: Census ACS 2023 B02001 (Mayes County, OK)
  - text: 17.6% of Mayes residents live below the poverty line and 6.6% are unemployed, the highest combined economic stress in any batch-3 county. Google's Pryor expansion is therefore the largest single private payroll in a county where wage absorption matters more than the marginal kilowatt-hour.
    source: Census ACS 2023 B17001 and B23025 (Mayes County, OK)
  - text: Only 86.1% of Mayes households have wired broadband, leaving roughly 2,100 of the 15,267 occupied units without a fixed connection. The same county that hosts one of Google's largest global compute footprints has a residential connectivity gap larger than the population of its second-largest town.
    source: Census ACS 2023 B28002 (Mayes County, OK)
  - text: Veterans are 9.1% of Mayes adults 18 and over, well above the national 6.2% baseline. Camp Gruber and the Tulsa veteran-services network feed a labor pool that hyperscale operations teams routinely recruit from.
    source: Census ACS 2023 B21001 (Mayes County, OK)
ok-muskogee:
  last_updated: '2026-05-17'
  takeaways:
  - text: Muskogee County has 66,471 residents and a median household income of $51,999, the lowest of any batch-3 county. The city of Muskogee itself has 36,878 residents and was proposed as the capital of the Native-American-led State of Sequoyah in 1905.
    source: 'Census ACS 2023 B01003, B19013 (Muskogee County, OK) + sources[0] (Wikipedia: Muskogee, OK)'
  - text: Home prices rose 19.7% over three years against a median home value of $138,800, the largest percent gain on the smallest base in any batch-3 county. The Core Scientific 70 MW build for CoreWeave is small relative to Pryor next door but landed in a market that already moved on the announcement.
    source: data/cache/realestate_yoy.csv (FIPS 40101) + Census ACS 2023 B25077 + data/sites/data_centers.csv
  - text: OG&E's Oklahoma residential rate rose only 3.3% from 2021 to 2023, the smallest delta of any batch-3 county. That adds about $40 per year to a typical bill and reflects OG&E's vertically integrated cost structure across 710,123 residential customers.
    source: data/cache/utility_rate_yoy.csv (Oklahoma Gas and Electric Co, OK)
  - text: Stardust Power broke ground on a $1.2 billion lithium refinery in Muskogee in January 2025, and Google announced two additional Oklahoma data centers in November 2025 as part of a $9 billion state investment. The 70 MW CoreWeave site is the leading edge of a much bigger industrial bet on Muskogee.
    source: 'sources[0] (Wikipedia: Muskogee, OK)'
  sources:
  - https://en.wikipedia.org/wiki/Muskogee,_Oklahoma
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_002E,B02001_001E&for=county:101&in=state:40
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:101&in=state:40
  demographics:
  - text: Muskogee County is just 55.9% white, the most racially diverse county in the batch-3 set after Franklin OH. The Five Civilized Tribes Museum sits in the county seat, and Cherokee, Muscogee, and Choctaw citizen populations overlap the Core Scientific build's labor shed.
    source: Census ACS 2023 B02001 (Muskogee County, OK)
  - text: Only 76.2% of Muskogee households subscribe to wired broadband, the lowest connectivity rate in any batch-3 county and behind even Mayes next door. A county hosting a 70 MW AI training site has nearly one in four homes without a fixed internet connection.
    source: Census ACS 2023 B28002 (Muskogee County, OK)
  - text: Muskogee's 20.3% poverty rate is the highest in the batch-3 set, and 9.2% of adults are veterans. The Core Scientific build, the Stardust lithium refinery, and the announced Google expansion are landing in a county where one in five residents lives below the federal poverty line.
    source: Census ACS 2023 B17001 and B21001 (Muskogee County, OK)
  - text: Manufacturing employs 14.4% of the Muskogee workforce, and the county's median rent of $824 is the lowest of any batch-3 county. CoreWeave's tenants are arriving in a market with both the rent base and the skilled-trades inventory to absorb a build without immediate displacement.
    source: Census ACS 2023 C24050 and B25064 (Muskogee County, OK)
or-crook:
  last_updated: '2026-05-17'
  takeaways:
  - text: Crook County has 25,651 residents and a median household income of $81,675. The county seat Prineville has 10,736 residents, with a median age of 40.6, but hosts both Meta and Apple's primary Pacific Northwest data center clusters.
    source: 'Census ACS 2023 B01003, B19013 (Crook County, OR) + sources[0] (Wikipedia: Prineville, OR)'
  - text: PacifiCorp's Oregon residential rate rose 30.0%, from 10.8 to 14.0 cents per kWh between 2021 and 2023. That adds about $349 per year to a typical Crook County household bill, the steepest 3-year residential rate move in any batch-3 county.
    source: data/cache/utility_rate_yoy.csv (PacifiCorp, OR)
  - text: Property tax assessments rose 14.5% over three years against a $423,300 median home value. Both Apple and Meta have invested over $1 billion each in Prineville since the late 2000s, anchoring the assessed-value rise.
    source: 'data/cache/property_tax_yoy.csv (FIPS 41013) + Census ACS 2023 B25077 + sources[0] (Wikipedia: Prineville, OR)'
  - text: Facebook selected Prineville in 2010 for its first owned data center anywhere in the world, the template every hyperscaler later copied for rural Western Oregon sites. The campus now scales across multiple buildings on the same parcel.
    source: 'sources[0] (Wikipedia: Prineville, OR) + data/sites/data_centers.csv (Prineville Meta)'
  sources:
  - https://en.wikipedia.org/wiki/Prineville,_Oregon
  - https://api.census.gov/data/2023/acs/acs5?get=B21001_002E,B21001_001E&for=county:013&in=state:41
  - https://api.census.gov/data/2023/acs/acs5?get=B25064_001E&for=county:013&in=state:41
  demographics:
  - text: 11.8% of Crook County adults are veterans (2,428 veterans), the highest veteran share in any batch-3 county. The retired-military draw of Central Oregon shapes the labor pool Apple and Meta hire local operators from.
    source: Census ACS 2023 B21001 (Crook County, OR)
  - text: Median gross rent in Crook County is $1,224, more than Wasco ($978) and Umatilla ($962) combined per square foot proxy. Prineville's housing market is the most expensive in the Oregon AI hydro cluster, a consequence of the 14-year Apple and Meta capital flow.
    source: Census ACS 2023 B25064 (Crook County, OR)
  - text: 75.6% of Crook County housing is owner-occupied, the highest ownership rate of any Oregon AI county. The Prineville campuses sit in a market where any further price spike from new builds flows mostly to existing homeowner equity rather than rental displacement.
    source: Census ACS 2023 B25003 (Crook County, OR)
  - text: Only 84.1% of Crook residents lived in the same county a year earlier, the lowest residential stickiness of any Oregon AI county. The Bonneville Power-anchored data center economy is actively pulling in-migration in a county of 25,651 people.
    source: Census ACS 2023 B07001 (Crook County, OR)
or-morrow:
  last_updated: '2026-05-17'
  takeaways:
  - text: Morrow County has 12,249 residents, the smallest population of any batch-3 county, and only 9.8% of residents over 25 hold a bachelor's degree. The county is 73.5% Hispanic or Latino in Boardman, the largest town at 3,828 residents.
    source: 'Census ACS 2023 B01003, B15003 (Morrow County, OR) + sources[0] (Wikipedia: Boardman, OR)'
  - text: Umatilla Electric Cooperative residential rates rose 8.3% from 2021 to 2023, modest in absolute percentage but applied to a small base. The cooperative has only 12,620 residential customers across both Morrow and Umatilla counties to absorb AWS's announced 16-building Boardman expansion.
    source: data/cache/utility_rate_yoy.csv (Umatilla Electric Coop Assn, OR)
  - text: Portland General Electric's Boardman coal plant shut down in October 2020, the last coal-fired plant in Oregon, and was demolished in 2022. AWS's data center campus inherited the regional grid headroom that closure created.
    source: 'sources[0] (Wikipedia: Boardman, OR)'
  - text: Property tax assessments rose 7.1% over three years and home-price data is unavailable for the county. AWS's $4.8 billion 16-building expansion is the explicit driver of any future assessed-value rise, with the existing Boardman and Morrow Expansion sites already operational.
    source: data/cache/property_tax_yoy.csv (FIPS 41049) + data/sites/data_centers.csv (Boardman, Morrow County Expansion)
  sources:
  - https://en.wikipedia.org/wiki/Boardman,_Oregon
  - https://api.census.gov/data/2023/acs/acs5?get=B03003_003E,B03003_001E&for=county:049&in=state:41
  - https://api.census.gov/data/2023/acs/acs5?get=C24050_004E,C24050_001E&for=county:049&in=state:41
  demographics:
  - text: Morrow County is 41.2% Hispanic countywide, the most Hispanic-majority population of any AI county in the country outside Texas. AWS's Boardman footprint sits inside the Columbia Basin irrigation belt that has employed Mexican-American agricultural labor for four generations.
    source: Census ACS 2023 B03003 (Morrow County, OR)
  - text: Median gross rent in Morrow County is $910 and 70.9% of housing is owner-occupied. The 16-building AWS expansion is therefore landing on a stable owner-resident base, with limited rental inventory for the construction labor surge that 12,249 residents cannot absorb internally.
    source: Census ACS 2023 B25064 and B25003 (Morrow County, OR)
  - text: Only 87.3% of Morrow households have wired broadband, despite Umatilla Electric Cooperative serving the largest AI campus in Eastern Oregon. The cooperative's fiber buildout for AWS has not yet flowed to residential customers in Boardman, Heppner, and Irrigon.
    source: Census ACS 2023 B28002 (Morrow County, OR)
  - text: Manufacturing employs 15.5% of Morrow's workforce (829 jobs), most of it food processing at Lamb Weston and Tillamook. The AWS data center is the first non-agricultural industrial employer in the county not tied to the Bonneville hydro export economy.
    source: Census ACS 2023 C24050 (Morrow County, OR)
or-umatilla:
  last_updated: '2026-05-17'
  takeaways:
  - text: Umatilla County has 80,087 residents and a median household income of $68,958. Hermiston, the largest city at 19,354 residents, added 2,930 jobs from 2012 to 2022, 91% of all net job growth in the county over the decade.
    source: 'Census ACS 2023 B01003, B19013 (Umatilla County, OR) + sources[0] (Wikipedia: Hermiston, OR)'
  - text: Amazon Web Services is already the largest employer in greater Hermiston at 2,058 workers, more than double Lamb Weston's 370 in Boardman. The 2 AWS campuses in Umatilla County (Hermiston, Umatilla) ride the same Umatilla Electric Cooperative tariff as the Morrow County builds next door.
    source: 'sources[0] (Wikipedia: Hermiston, OR) + data/sites/data_centers.csv'
  - text: Property tax assessments rose 7.1% over three years against a 9.9% home-price gain. Both stats are restrained relative to neighboring Morrow County, which suggests AWS load is being captured by the Port of Morrow industrial enterprise zone rather than the residential tax base.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 41059)
  - text: Only 18.0% of residents over 25 hold a bachelor's degree, the second-lowest in the Pacific Northwest AI cluster after Morrow County. The Hispanic-majority demographic and irrigation-fed watermelon agriculture predate the data center boom and have not been displaced by it.
    source: 'Census ACS 2023 B15003 + sources[0] (Wikipedia: Hermiston, OR)'
  sources:
  - https://en.wikipedia.org/wiki/Hermiston,_Oregon
  - https://api.census.gov/data/2023/acs/acs5?get=B03003_003E,B03003_001E&for=county:059&in=state:41
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:059&in=state:41
  demographics:
  - text: Umatilla County is 28.9% Hispanic (23,185 residents), the second-highest Hispanic share of any Oregon AI county after Morrow. The same demographic concentration that built the Hermiston watermelon and onion economy now staffs the AWS data hall operations.
    source: Census ACS 2023 B03003 (Umatilla County, OR)
  - text: Only 85.3% of Umatilla households have wired broadband, the lowest connectivity rate among Oregon AI counties. The Umatilla Indian Reservation and the Pendleton-Hermiston-Boardman triangle hold the deepest digital-divide pockets in the Columbia River corridor.
    source: Census ACS 2023 B28002 (Umatilla County, OR)
  - text: Manufacturing employs 9.0% of Umatilla's workforce while owner-occupied housing is at 67.1%. The AWS campuses share an industrial enterprise zone with Lamb Weston, ConAgra, and the Boeing-supplier corridor, all of which compete for the same rental base in Hermiston.
    source: Census ACS 2023 C24050 and B25003 (Umatilla County, OR)
  - text: Median gross rent of $962 sits below the $978 rent in Wasco County despite Umatilla being four times larger. The Hermiston rental ceiling has been disciplined by the Port of Morrow enterprise zone, which keeps industrial demand from flowing fully into the residential market.
    source: Census ACS 2023 B25064 (Umatilla County, OR)
or-wasco:
  last_updated: '2026-05-17'
  takeaways:
  - text: Wasco County has 26,603 residents and a median household income of $63,602. The Dalles, the county seat at 16,010 residents, hosts Google's longest-running data center anywhere in the world. The campus opened in 2006 as Project 02.
    source: 'Census ACS 2023 B01003, B19013 (Wasco County, OR) + sources[0] (Wikipedia: The Dalles, OR)'
  - text: Northern Wasco PUD residential rates rose 5.5% from 7.3 to 7.7 cents per kWh between 2021 and 2023, the lowest rate of any utility serving a batch-3 county. The PUD has only 9,800 residential customers and buys at Bonneville Power Administration wholesale.
    source: data/cache/utility_rate_yoy.csv (Northern Wasco County PUD, OR)
  - text: BPA's Celilo Converter Station opened in 1970 near The Dalles, the northern terminus of the Pacific DC Intertie sending 3,100 MW to Los Angeles. That historical export infrastructure is part of why Google chose The Dalles for its first hyperscale build.
    source: 'sources[0] (Wikipedia: The Dalles, OR)'
  - text: Home prices rose only 3.4% and property tax assessments rose 4.1% over three years, the most restrained pair in the Oregon AI cluster. Google employed 150 combined permanent staff and contractors at The Dalles as of 2013, a reminder that hyperscale builds do not translate to commensurate local payroll.
    source: 'data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 41065) + sources[0] (Wikipedia: The Dalles, OR)'
  sources:
  - https://en.wikipedia.org/wiki/The_Dalles,_Oregon
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_002E,B02001_001E&for=county:065&in=state:41
  - https://api.census.gov/data/2023/acs/acs5?get=B25003_002E,B25003_001E&for=county:065&in=state:41
  demographics:
  - text: Wasco County is 19.8% Hispanic and only 79.6% white. The Confederated Tribes of Warm Springs reservation borders the county to the south, anchoring a Native and Latino labor history that predates the Google build by more than a century.
    source: Census ACS 2023 B02001 and B03003 (Wasco County, OR)
  - text: Wasco County has a 7.7% unemployment rate, the highest in the entire batch-3 set. The Dalles is therefore the rare AI county where 19 years of Google operations have not delivered a meaningfully tighter labor market than the rural Pacific Northwest baseline.
    source: Census ACS 2023 B23025 (Wasco County, OR)
  - text: 9.5% of Wasco adults 18 and over are veterans (1,986 veterans). The Dalles VA outpatient clinic and the Columbia Gorge military retiree corridor feed an operations-and-maintenance labor base Google has tapped since 2006.
    source: Census ACS 2023 B21001 (Wasco County, OR)
  - text: Only 87.9% of Wasco households have wired broadband, and only 66.2% of housing is owner-occupied. The Dalles has the most rental-heavy housing market in the Oregon AI cluster, which limits how much of Google's land-value uplift flows to existing residents.
    source: Census ACS 2023 B28002 and B25003 (Wasco County, OR)
or-washington:
  last_updated: '2026-05-17'
  takeaways:
  - text: Washington County has 600,266 residents and a median household income of $104,434, the highest income of any AI county nationwide. 46.7% of residents over 25 hold a bachelor's degree.
    source: Census ACS 2023 B01003, B19013, B15003 (Washington County, OR)
  - text: Portland General Electric residential rates rose 29.7%, from 14.0 to 18.2 cents per kWh between 2021 and 2023, adding about $450 per year to a typical household bill. That delta lands on Hillsboro CoreWeave at the same time Intel is contracting its 16,000-employee Silicon Forest footprint.
    source: 'data/cache/utility_rate_yoy.csv (Portland General Electric Co, OR) + sources[0] (Wikipedia: Hillsboro, OR)'
  - text: Hillsboro is the fifth-most populous city in Oregon at 106,447 residents and the only AI county where data centers compete with Intel for fiber, power, and tax abatement. Three trans-Pacific fiber optic cable systems land in Hillsboro.
    source: 'sources[0] (Wikipedia: Hillsboro, OR)'
  - text: Home prices fell 1.1% over three years, the only negative 3-year home-price reading in any AI county nationwide. The CoreWeave/Flexential build is therefore the rare AI campus arriving as residential demand cools rather than accelerates.
    source: data/cache/realestate_yoy.csv (FIPS 41067)
  sources:
  - https://en.wikipedia.org/wiki/Hillsboro,_Oregon
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_005E,B02001_001E&for=county:067&in=state:41
  - https://api.census.gov/data/2023/acs/acs5?get=B25064_001E&for=county:067&in=state:41
  demographics:
  - text: Washington County is 11.2% Asian (67,098 residents) and 18.2% Hispanic, the most diverse county in the Oregon AI cluster. Hillsboro's Silicon Forest workforce has carried a Chinese, Vietnamese, and Indian engineering base since the 1990s Intel buildout.
    source: Census ACS 2023 B02001 and B03003 (Washington County, OR)
  - text: Manufacturing still employs 17.6% of Washington County's workforce (55,826 jobs), the highest manufacturing share of any Oregon AI county. The CoreWeave Hillsboro build inherits the fiber, fab-experienced labor, and substation density that Intel's contraction is releasing.
    source: Census ACS 2023 C24050 (Washington County, OR)
  - text: 94.7% of Washington households subscribe to wired broadband, the highest connectivity in any batch-3 county. Hillsboro's three trans-Pacific cable landings and Frontier's residential fiber footprint give the CoreWeave campus a connectivity floor no other AI county matches.
    source: Census ACS 2023 B28002 (Washington County, OR)
  - text: Median gross rent is $1,773, the highest of any AI county nationwide. The CoreWeave/Flexential build lands in a rental market where the residential cost burden is already structural, well before any AI-driven rate pass-through.
    source: Census ACS 2023 B25064 (Washington County, OR)
pa-lancaster:
  last_updated: '2026-05-17'
  takeaways:
  - text: Lancaster County has 555,151 residents and a median household income of $83,703. The city of Lancaster has 58,039 residents and is 40.3% Hispanic, the largest non-Amish demographic concentration in any Pennsylvania AI county.
    source: 'Census ACS 2023 B01003, B19013 (Lancaster County, PA) + sources[0] (Wikipedia: Lancaster, PA)'
  - text: PPL Electric Utilities residential rates actually fell 0.3% from 2021 to 2023, the only cooling rate trajectory in any batch-3 county. The 300 MW CoreWeave Lancaster build is therefore one of the few AI campuses arriving without a baseline retail rate spike.
    source: data/cache/utility_rate_yoy.csv (PPL Electric Utilities Corp, PA)
  - text: CoreWeave's $6 billion Lancaster build with Chirisa is scheduled to energize in 2027. Lancaster General Hospital remains the largest existing employer in the city at 9,406 workers, a baseline a single 300 MW AI campus could match at scale.
    source: 'data/sites/data_centers.csv (Lancaster CoreWeave) + sources[0] (Wikipedia: Lancaster, PA)'
  - text: Home prices rose 9.7% and property tax assessments rose only 3.4% over three years, the most restrained tax-side delta in any batch-3 county with a similar home-price rise. Pennsylvania's separate school-tax structure damps property-tax sensitivity to industrial assessments.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 42071)
  sources:
  - https://en.wikipedia.org/wiki/Lancaster,_Pennsylvania
  - https://api.census.gov/data/2023/acs/acs5?get=B03003_003E,B03003_001E&for=county:071&in=state:42
  - https://api.census.gov/data/2023/acs/acs5?get=C24050_004E,C24050_001E&for=county:071&in=state:42
  demographics:
  - text: Lancaster County is 11.3% Hispanic countywide (62,574 residents), well above the Pennsylvania 8% average, with much of the concentration in the city of Lancaster itself. The CoreWeave campus lands in the most Latino county of any Pennsylvania AI build.
    source: Census ACS 2023 B03003 (Lancaster County, PA)
  - text: Manufacturing employs 14.4% of Lancaster's workforce (40,467 jobs), the deepest industrial labor base of any Pennsylvania AI county. The Plain Sect (Amish and Mennonite) economy's emphasis on trades carpentry and metalwork feeds construction labor for the 300 MW Chirisa build.
    source: Census ACS 2023 C24050 (Lancaster County, PA)
  - text: Lancaster's 3.3% unemployment rate is the lowest of any Pennsylvania batch-3 county. The CoreWeave Lancaster build will draw construction crews into a market that has been near structural full employment since 2022.
    source: Census ACS 2023 B23025 (Lancaster County, PA)
  - text: Only 86.9% of Lancaster households have wired broadband, depressed by the rural Plain Sect population that often does not subscribe by religious choice. The county's connectivity gap is therefore cultural, not infrastructure-driven, in contrast to Schuylkill and Luzerne.
    source: Census ACS 2023 B28002 (Lancaster County, PA)
pa-luzerne:
  last_updated: '2026-05-17'
  takeaways:
  - text: Luzerne County has 325,978 residents and a median household income of $62,321. The county seat Wilkes-Barre has 44,328 residents and lives with a 30.1% poverty rate, more than double the Pennsylvania state average.
    source: 'Census ACS 2023 B01003, B19013 (Luzerne County, PA) + sources[0] (Wikipedia: Wilkes-Barre, PA)'
  - text: AWS's Susquehanna Campus is a behind-the-meter colocation directly connected at 960 MW to the 2,514 MW Susquehanna nuclear plant in Salem Township. The full power purchase agreement scales to 1,680 to 1,920 MW by 2032 with an expected total contract value of $18 billion through 2042.
    source: 'sources[1] (Wikipedia: Susquehanna Steam Electric Station) + data/sites/data_centers.csv'
  - text: PPL Electric Utilities residential rates fell 0.3% from 2021 to 2023, so the bill-side impact of the AWS deal is structurally insulated from the residential tariff. The campus power flows directly from Talen Energy's nuclear units, not from the grid PPL serves.
    source: 'data/cache/utility_rate_yoy.csv (PPL Electric Utilities Corp, PA) + sources[1] (Wikipedia: Susquehanna Steam Electric Station)'
  - text: Home prices rose 21.0% over three years against a median home value of $163,800, the largest percent gain in any batch-3 county after Niagara. Wilkes-Barre's population peaked at over 86,000 in the 1930s and has fallen by half, so the AI build is landing on a deflated housing base poised for a sharp post-Susquehanna repricing.
    source: 'data/cache/realestate_yoy.csv (FIPS 42079) + Census ACS 2023 B25077 + sources[0] (Wikipedia: Wilkes-Barre, PA)'
  sources:
  - https://en.wikipedia.org/wiki/Wilkes-Barre,_Pennsylvania
  - https://en.wikipedia.org/wiki/Susquehanna_Steam_Electric_Station
  - https://api.census.gov/data/2023/acs/acs5?get=B03003_003E,B03003_001E&for=county:079&in=state:42
  - https://api.census.gov/data/2023/acs/acs5?get=B28002_004E,B28002_001E&for=county:079&in=state:42
  demographics:
  - text: Luzerne County is 15.9% Hispanic (51,917 residents), the highest Hispanic share of any Pennsylvania AI county. The Wyoming Valley's Puerto Rican and Dominican migration since the 2000s has reshaped a county that was overwhelmingly white through the anthracite era.
    source: Census ACS 2023 B03003 (Luzerne County, PA)
  - text: Median gross rent in Luzerne is $958 against a county poverty rate of 15.4%. The AWS Susquehanna behind-the-meter deal lands in a county where one in seven residents is below the poverty line and rent absorbs the second-largest budget item for most households.
    source: Census ACS 2023 B25064 and B17001 (Luzerne County, PA)
  - text: Only 86.3% of Luzerne households subscribe to wired broadband, and Wilkes-Barre's pockets of fiber-less rowhomes overlap the same blocks with the 30.1% urban poverty rate. The AI economy is energizing in a county whose residential digital divide is structural.
    source: Census ACS 2023 B28002 (Luzerne County, PA)
  - text: Manufacturing still employs 12.0% of Luzerne's workforce (18,462 jobs), down from peak coal-era industrial employment but still well above the Pennsylvania average. The legacy plant-trades labor pool overlaps with the kind of operator skill base Talen Energy hires for the Susquehanna nuclear units.
    source: Census ACS 2023 C24050 (Luzerne County, PA)
pa-schuylkill:
  last_updated: '2026-05-17'
  takeaways:
  - text: Schuylkill County's population peaked at 235,505 in the 1930 census and has fallen to 143,558. Anthracite output peaked in 1917 and now only four underground mines and 17 surface mines remain, the rump of an industry that once defined the region.
    source: 'Census ACS 2024 B01003 + sources[0] (Wikipedia: Schuylkill County)'
  - text: PPL's residential rate slipped 0.3% from 2021 to 2023, an outlier flat in the Mid-Atlantic. The 346-acre Tobyhanna campus in Kline Township is on a utility that has not yet been asked to absorb a publicly disclosed AI load number.
    source: data/cache/utility_rate_yoy.csv (PPL Electric Utilities Corp, PA) + data/sites/data_centers.csv
  - text: Home prices are up 23.5% over three years on a median household income of $68,313 and a median home value of $153,000, the largest 3-year home-price jump in any batch-4 county. Wind already supplies 80% of the county's 25% renewable electricity share, so the AWS site is landing in a county where the rural grid is unusually clean.
    source: data/cache/realestate_yoy.csv (FIPS 42107) + Census ACS 2024 B19013, B25077 + sources[0]
  - text: AWS has not disclosed Tobyhanna's MW or campus count, and Schuylkill is the only batch-4 county where the lead operator is AWS rather than a hyperscaler with a public site map. The bachelor's-degree share is 19.9%, low for an East Coast county.
    source: data/sites/data_centers.csv (Tobyhanna Kline) + Census ACS 2024 B15003
  sources:
  - https://en.wikipedia.org/wiki/Schuylkill_County,_Pennsylvania
  - https://api.census.gov/data/2023/acs/acs5?get=C24050_004E,C24050_001E&for=county:107&in=state:42
  - https://api.census.gov/data/2023/acs/acs5?get=B25064_001E&for=county:107&in=state:42
  demographics:
  - text: Manufacturing still employs 19.3% of Schuylkill's workforce (12,504 jobs), the highest manufacturing share of any Pennsylvania AI county and the second-highest in the batch-3 set. The county replaced anthracite with food processing (Yuengling, Wegmans distribution) rather than the service economy the AWS Tobyhanna build implies.
    source: Census ACS 2023 C24050 (Schuylkill County, PA)
  - text: Only 84.7% of Schuylkill households have wired broadband, the lowest connectivity rate among Pennsylvania AI counties. The same Kline Township the AWS campus sits in is part of the rural northern-tier broadband gap PennDOT and PUC have been documenting since 2018.
    source: Census ACS 2023 B28002 (Schuylkill County, PA)
  - text: Schuylkill is 89.7% white and just 6.8% Hispanic, the most racially homogeneous county in the batch-3 set. The Pottsville and Schuylkill Haven labor pool that Yuengling has hired from for 195 years is the same one AWS construction crews now compete for.
    source: Census ACS 2023 B02001 and B03003 (Schuylkill County, PA)
  - text: 76.3% of Schuylkill housing is owner-occupied, the highest ownership rate in any Pennsylvania AI county. Median gross rent is just $842, the second-lowest in the batch-3 set after Trumbull OH, which makes the 23.5% home-price spike a homeowner equity story rather than a renter displacement one.
    source: Census ACS 2023 B25003 and B25064 (Schuylkill County, PA)
sc-berkeley:
  last_updated: '2026-05-17'
  takeaways:
  - text: Berkeley County grew 29.2% from 2010 to 2020 and now has 246,802 residents, the fastest growth in any batch-4 county. Google has anchored Mount Holly since 2007 and announced $9 billion through 2027 to expand the Berkeley campus plus two new Dorchester County sites.
    source: Census ACS 2024 B01003 + sources[1] (Google datacenters)
  - text: Berkeley Electric Cooperative serves 115,117 residential members and is the only batch-4 utility that is a rural electric cooperative. Its residential rate rose 9.6% from 2021 to 2023, about $137 per year on a typical bill.
    source: data/cache/utility_rate_yoy.csv (Berkeley Electric Coop Inc, SC)
  - text: Property tax assessments rose 10.7% over three years against a county median income of $84,358 and a 56.2% combined Black and Hispanic share. Google signed a 225 MW renewable PPA in South Carolina in 2023 to offset the campus expansion.
    source: data/cache/property_tax_yoy.csv (FIPS 45015) + Census ACS 2024 B19013 + sources[1]
  - text: Volvo Cars, Nucor, and Booz Allen Hamilton are already in Berkeley's top employer list, and over 900 Google jobs sit across the three SC campuses. The 31.0% bachelor's share is mid-pack for a county anchoring a $9 billion hyperscaler buildout.
    source: 'Census ACS 2024 B15003 + sources[0] (Wikipedia: Berkeley County)'
  sources:
  - https://en.wikipedia.org/wiki/Berkeley_County,_South_Carolina
  - https://datacenters.google/locations/south-carolina/
  - https://api.census.gov/data/2023/acs/acs5?get=B02001_003E,B02001_001E&for=county:015&in=state:45
  - https://api.census.gov/data/2023/acs/acs5?get=B21001_002E,B21001_001E&for=county:015&in=state:45
  demographics:
  - text: Berkeley County is 23.2% Black and 8.9% Hispanic, the deepest combined non-white share of any batch-3 county outside Franklin OH. The Mount Holly Google campus sits in a Lowcountry corridor where the Gullah Geechee population has anchored Berkeley's coastal demographics for three centuries.
    source: Census ACS 2023 B02001 and B03003 (Berkeley County, SC)
  - text: 12.5% of Berkeley adults are veterans (21,799 veterans), the highest veteran share of any AI county on the East Coast. Joint Base Charleston's labor spillover gives Google the deepest operations-and-maintenance recruitment pool in the Southeast.
    source: Census ACS 2023 B21001 (Berkeley County, SC)
  - text: Manufacturing employs 13.2% of Berkeley's workforce (14,922 jobs), reflecting the Volvo, Boeing 787, and Nucor footprints already in the Lowcountry industrial belt. Google's $9 billion buildout layers AI capacity on top of an existing heavy-manufacturing labor base rather than into a deindustrialized one.
    source: Census ACS 2023 C24050 (Berkeley County, SC)
  - text: Median gross rent in Berkeley County is $1,518, well above the SC state average and second only to Washington County OR among batch-3 sites. The Charleston spillover means the same renter base that powers AI campus operations is paying near-coastal rents on a Lowcountry wage.
    source: Census ACS 2023 B25064 (Berkeley County, SC)
tn-sumner:
  last_updated: '2026-05-17'
  takeaways:
  - text: Sumner County has 204,424 residents and sits 25 miles northeast of Nashville, growing 9.8% from 2020 to 2025. Meta opened its Gallatin data center in 2020 and announced an expansion in 2024 that pushes total investment past $1 billion.
    source: 'Census ACS 2024 B01003 + sources[0] (Wikipedia: Sumner County) + sources[1] (Wikipedia: Gallatin, TN)'
  - text: Gallatin Department of Electricity is a municipal utility serving 23,204 customers, the smallest power provider in any batch-4 county. Its residential rate rose 6.3% from 11.1 to 11.8 cents per kWh between 2021 and 2023, about $75 per year on a typical bill.
    source: data/cache/utility_rate_yoy.csv (City of Gallatin, TN)
  - text: Home prices are up only 4.7% over three years but property tax assessments rose 9.2%, on a median household income of $90,301 and a median home value of $393,100. Sumner has the highest median income of any batch-4 county.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 47165) + Census ACS 2024 B19013, B25077
  - text: The Meta Gallatin campus draws power downstream from TVA's coal-fired Gallatin Fossil Plant. Sumner is the only batch-4 county where a hyperscaler campus has been operating for five years before any other batch-4 site even broke ground.
    source: 'sources[1] (Wikipedia: Gallatin, TN) + data/sites/data_centers.csv'
  sources:
  - https://en.wikipedia.org/wiki/Sumner_County,_Tennessee
  - https://en.wikipedia.org/wiki/Gallatin,_Tennessee
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 72.2% of Sumner County households own their home, the highest ownership rate among the metro-scale counties in batch 4. Hispanic residents are just 6.9% of the population, the lowest Hispanic share of any batch-4 county.
    source: Census ACS 2023 B25003, B03003 (FIPS 47165)
  - text: Only 3.2% of Sumner's labor force is unemployed and 9.0% live below the poverty line, the tightest labor market in batch 4. Meta's 2024 Gallatin expansion is landing in a county that is already near full employment.
    source: Census ACS 2023 B23025, B17001 (FIPS 47165)
  - text: 10.5% of Sumner's working population is in manufacturing, the highest mfg share of any Tennessee county in batch 4. Nissan suppliers and Gap's regional distribution hub feed that baseline.
    source: Census ACS 2023 C24050 (FIPS 47165)
  - text: 92.1% of Sumner households have broadband, the highest connectivity rate in batch 4 outside the DFW suburbs. Veterans are 7.4% of adults, lifted by the Nashville metro's proximity to Fort Campbell.
    source: Census ACS 2023 B28002, B21001 (FIPS 47165)
tx-armstrong:
  last_updated: '2026-05-17'
  takeaways:
  - text: Armstrong County has 1,822 residents on 914 square miles, one of the smallest counties in Texas. The county seat is Claude, named in 1888 for a railroad engineer, and Charles Goodnight's JA Ranch once spanned over a million acres across Armstrong and five adjoining counties.
    source: 'Census ACS 2024 B01003 + sources[0] (Wikipedia: Armstrong County, TX)'
  - text: Google's Armstrong campus is part of a $40 billion Texas commitment through 2027 that includes Armstrong and Haskell County sites. The two are Google's only new Texas data center counties in the announcement.
    source: 'sources[1] (Google: American Innovation Texas)'
  - text: Property tax assessments fell 7.9% over three years against a Texas-high $72,750 median household income for a county this small. The drop is a rare cool-tone in a state where most rural counties saw double-digit assessment jumps.
    source: data/cache/property_tax_yoy.csv (FIPS 48011) + Census ACS 2024 B19013
  - text: Xcel Energy SPS serves Armstrong's residential customers on the SPP grid, with a near-flat 0.1% 3-year rate decline. The campus will sit outside ERCOT, the only batch-4 Texas county not in the deregulated retail market.
    source: data/cache/utility_rate_yoy.csv (Southwestern Public Service, TX) + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Armstrong_County,_Texas
  - https://blog.google/company-news/inside-google/company-announcements/google-american-innovation-texas/
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Just 5.8% of Armstrong residents live in poverty and only 0.9% are unemployed, the lowest poverty and unemployment of any Texas county in batch 4. The Google campus is landing in a county where the baseline labor market is essentially closed.
    source: Census ACS 2023 B17001, B23025 (FIPS 48011)
  - text: 81.8% of Armstrong households own their home, tied for the highest owner-occupied share in batch 4. Median gross rent is $1,010 on a rental stock of fewer than 130 units, meaning new arrivals have almost nowhere to land.
    source: Census ACS 2023 B25003, B25064 (FIPS 48011)
  - text: Hispanic residents make up 9.6% of Armstrong's 1,883 people, the lowest Hispanic share of any rural Texas county in batch 4. 92.6% of residents are white alone, atypical for the southern High Plains.
    source: Census ACS 2023 B03003, B02001 (FIPS 48011)
  - text: 91.9% of Armstrong households have broadband at home, far above the rural Texas average. 93.0% of residents over 1 lived in the same house a year ago, the most settled population in batch 4.
    source: Census ACS 2023 B28002, B07001 (FIPS 48011)
tx-bell:
  last_updated: '2026-05-17'
  takeaways:
  - text: Bell County has 386,897 residents and contains Fort Cavazos (formerly Fort Hood), one of the largest US Army installations in the country. Meta restarted construction on the Temple campus in 2024 with a new AI-optimized design after pausing the project.
    source: 'Census ACS 2024 B01003 + data/sites/data_centers.csv (Temple, Meta) + sources[0] (Wikipedia: Bell County)'
  - text: Median household income is $68,865 and the median home value is $241,000, both at the rural-Texas baseline despite the metro Killeen-Temple-Fort Cavazos labor market. Property tax assessments rose 9.4% over three years.
    source: Census ACS 2024 B19013, B25077 + data/cache/property_tax_yoy.csv (FIPS 48027)
  - text: Home prices are down 0.1% on a 3-year baseline, essentially flat, while neighboring DFW counties saw double-digit declines. The Temple campus sits on Oncor's ERCOT-side grid, where there is no published residential rate delta because of deregulation.
    source: data/cache/realestate_yoy.csv (FIPS 48027) + data/cache/utility_rate_yoy.csv (no Oncor residential row)
  - text: The 27.2% bachelor's share is the lowest of any major Texas data-center county outside the Panhandle. Meta has not yet disclosed Temple's MW, leaving the regional load impact invisible.
    source: Census ACS 2024 B15003 + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Bell_County,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 19.4% of Bell County adults are veterans, the highest veteran share in batch 4 and roughly four times the Texas average. Fort Cavazos retirees and active-duty separations dominate the post-service civilian labor market around the Meta Temple site.
    source: Census ACS 2023 B21001 (FIPS 48027)
  - text: Bell County is 52.1% white, 23.3% Black, and 25.8% Hispanic, the most racially balanced batch-4 county. Killeen and Temple have absorbed Army-driven demographic mixing for decades, distinct from rural Texas next door.
    source: Census ACS 2023 B02001, B03003 (FIPS 48027)
  - text: 14.6% of Bell residents live in poverty and 6.5% are unemployed, both well above the Texas state baseline. The Meta campus enters a labor market where one in seven residents already qualifies as poor.
    source: Census ACS 2023 B17001, B23025 (FIPS 48027)
  - text: Only 56.2% of Bell households own their home, the second lowest owner-occupied rate in batch 4 after Shelby. Military-rotation rentals depress the ownership baseline that Killeen's home-price decline would normally help.
    source: Census ACS 2023 B25003 (FIPS 48027)
tx-bexar:
  last_updated: '2026-05-17'
  takeaways:
  - text: Bexar County has 2,067,341 residents, Texas's fourth most populous county and the 16th most populous in the US. Microsoft has operated a San Antonio campus since 2008, one of its older domestic data center sites.
    source: Census ACS 2024 B01003 + data/sites/data_centers.csv (San Antonio, Microsoft)
  - text: CPS Energy is the largest municipal utility in the United States by customers, serving 865,914 residential accounts in San Antonio. Its residential rate rose 5.7% from 11.8 to 12.4 cents per kWh between 2021 and 2023, about $77 per year on a typical household bill.
    source: data/cache/utility_rate_yoy.csv (City of San Antonio, TX)
  - text: Home prices are essentially flat at +0.1% over three years while property tax assessments rose 10.4% on a median household income of $72,341 and a median home value of $262,200. The 31.8% bachelor's share trails Austin metro counties.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 48029) + Census ACS 2024 B19013, B25077, B15003
  - text: Bexar is the only batch-4 county where the hyperscaler campus has been operational for more than 15 years before the current AI build cycle. Microsoft has not disclosed a separate MW expansion figure for the legacy San Antonio site.
    source: data/sites/data_centers.csv (operational since 2008)
  sources:
  - https://en.wikipedia.org/wiki/Bexar_County,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Bexar County is 59.5% Hispanic, the only majority-Hispanic county in batch 4 that hosts a hyperscaler campus. Microsoft has been running its San Antonio site inside this demographic for 17 years before the AI build cycle.
    source: Census ACS 2023 B03003 (FIPS 48029)
  - text: 9.7% of Bexar adults are veterans, lifted by Joint Base San Antonio and the Lackland medical complex. That is a ready labor pool with security clearances within a 30-mile radius of the Microsoft campus.
    source: Census ACS 2023 B21001 (FIPS 48029)
  - text: Median gross rent in Bexar is $1,290, the second highest in batch 4 after Plano. 59.1% of households own their home, low for a non-coastal Texas metro and a sign that the existing service-sector wage floor cannot reach the median home value of $262,200.
    source: Census ACS 2023 B25064, B25003 (FIPS 48029)
  - text: Only 5.6% of Bexar's working population is in manufacturing, the lowest mfg share of any major Texas metro in batch 4. The San Antonio labor market runs on hospitality, healthcare, and military services, not factory wages.
    source: Census ACS 2023 C24050 (FIPS 48029)
tx-childress:
  last_updated: '2026-05-17'
  takeaways:
  - text: Childress County has 6,743 residents and the city of Childress has 5,737. IREN's 576-acre Childress campus is announced at 750 MW, more than 110 kW of AI compute capacity per Childress County resident.
    source: 'Census ACS 2024 B01003 + sources[0] (IREN Childress) + sources[1] (Wikipedia: Childress, TX)'
  - text: The IREN site connects directly to ERCOT via on-site substations IREN owns, with both air and liquid cooling. AEP Texas serves the county but ERCOT's deregulated retail market means EIA cannot report a 3-year residential rate delta.
    source: sources[0] (IREN Childress) + data/cache/utility_rate_yoy.csv (no AEP Texas residential row)
  - text: Property tax assessments fell 18.2% over three years, the steepest drop in any batch-4 county. Median household income is $58,654 and the median home value is $125,400, both below state averages.
    source: data/cache/property_tax_yoy.csv (FIPS 48075) + Census ACS 2024 B19013, B25077
  - text: Childress is the only batch-4 county with a Bitcoin-miner-turned-AI operator anchoring its grid load, IREN built the original site as a mining facility before pivoting to AI compute. Only 11.8% of residents over 25 hold a bachelor's degree, the lowest in batch 4.
    source: data/sites/data_centers.csv (IREN) + Census ACS 2024 B15003
  sources:
  - https://iren.com/data-centers/childress
  - https://en.wikipedia.org/wiki/Childress,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Hispanic residents make up 34.0% of Childress County's 6,772 people. Combined with 6.7% Black residents, more than 40% of the county is non-white, atypical for the eastern Panhandle.
    source: Census ACS 2023 B03003, B02001 (FIPS 48075)
  - text: Only 0.5% of the Childress labor force is officially unemployed, the lowest unemployment of any Texas county in batch 4. The Childress Regional Medical Center and the state prison unit anchor a labor market with almost no slack for IREN's 750 MW expansion.
    source: Census ACS 2023 B23025 (FIPS 48075)
  - text: Just 80.8% of Childress households have broadband at home, the second lowest connectivity in batch 4 after Mitchell. About 1,300 residents face a digital-divide gap as a 750 MW AI campus connects to ERCOT in their county.
    source: Census ACS 2023 B28002 (FIPS 48075)
  - text: Only 2.9% of Childress adults are veterans, the lowest veteran share in batch 4. Manufacturing employs 6.5% of workers, with no large industrial anchor in the county before IREN.
    source: Census ACS 2023 B21001, C24050 (FIPS 48075)
tx-collin:
  last_updated: '2026-05-17'
  takeaways:
  - text: Collin County has 1,163,337 residents and a median household income of $121,600, the highest of any batch-4 county. JPMorgan Chase, Capital One, Toyota North America, and PepsiCo all have their corporate footprint in Plano, the campus city.
    source: 'Census ACS 2024 B01003, B19013 + sources[0] (Wikipedia: Plano, TX)'
  - text: Home prices fell 9.8% over three years against a median home value of $475,600, the steepest decline of any batch-4 county. CoreWeave's Plano site sits in a DFW housing market that is correcting after the 2021-2022 boom.
    source: data/cache/realestate_yoy.csv (FIPS 48085) + Census ACS 2024 B25077
  - text: The 56.2% bachelor's-or-higher share is the highest in any batch-4 county and rivals Silicon Valley counties. Property tax assessments rose only 6.0% over three years, restrained by the price correction.
    source: Census ACS 2024 B15003 + data/cache/property_tax_yoy.csv (FIPS 48085)
  - text: CoreWeave's Plano campus is on Oncor's ERCOT grid with no published residential rate delta because of retail deregulation. Plano is Texas's 9th most populous city, 73rd in the US, and the only batch-4 host city with five Fortune 500 HQs already in place.
    source: data/cache/utility_rate_yoy.csv (no Oncor residential row) + sources[0]
  sources:
  - https://en.wikipedia.org/wiki/Plano,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 17.6% of Collin County residents are Asian, the highest Asian share of any batch-4 county and more than four times the Texas state average. Plano's tech-corporate base has built an Asian-American population near the size of San Francisco's.
    source: Census ACS 2023 B02001 (FIPS 48085)
  - text: 96.1% of Collin households have broadband at home, the highest connectivity rate in batch 4. The CoreWeave Plano campus is landing in the most digitally connected county on the list.
    source: Census ACS 2023 B28002 (FIPS 48085)
  - text: Only 4.9% of Collin adults are veterans, the lowest veteran share of any major Texas metro in batch 4. The labor market is dominated by white-collar transplants, not military or oilfield service workers.
    source: Census ACS 2023 B21001 (FIPS 48085)
  - text: Just 6.3% of Collin residents live in poverty and 4.1% are unemployed, the lowest poverty rate in batch 4 outside Armstrong. Manufacturing employs 8.4% of workers, lifted by Texas Instruments and Toyota's North American plant footprint.
    source: Census ACS 2023 B17001, B23025, C24050 (FIPS 48085)
tx-denton:
  last_updated: '2026-05-17'
  takeaways:
  - text: Denton County has 979,561 residents and the campus city of Denton runs its own municipal utility, Denton Municipal Electric, with 58,941 residential customers. The Core Scientific and CoreWeave site is announced at 260 MW with a $1.2 billion 12-year contract.
    source: Census ACS 2024 B01003 + data/cache/utility_rate_yoy.csv (City of Denton, TX) + sources[0] (Core Scientific press release)
  - text: Denton Municipal Electric's residential rate jumped 20.5% from 10.6 to 12.8 cents per kWh between 2021 and 2023, the steepest 3-year residential rate move of any batch-4 county. That works out to about $235 per year more on a typical household bill.
    source: data/cache/utility_rate_yoy.csv (City of Denton, TX)
  - text: Home prices fell 3.9% over three years against a median home value of $437,200 and a $111,498 median household income. The campus expansion brings CoreWeave's total contracted infrastructure across Core Scientific's six sites to roughly 590 MW.
    source: data/cache/realestate_yoy.csv (FIPS 48121) + Census ACS 2024 B19013, B25077 + sources[0]
  - text: Denton is the only batch-4 county where the lead operator runs on a municipal utility and where bills have already moved sharply. The 49.4% bachelor's share reflects the University of North Texas's presence in the same city.
    source: data/sites/data_centers.csv + Census ACS 2024 B15003
  sources:
  - https://investors.corescientific.com/news-events/press-releases/detail/110/core-scientific-and-coreweave-announce-1-2-billion-expansion-at-denton-tx-site
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 10.3% of Denton County residents are Asian, the second highest Asian share in batch 4 after Collin. Frisco, Lewisville, and the I-35 tech corridor have built an Asian-American base larger than the entire population of any rural batch-4 county.
    source: Census ACS 2023 B02001 (FIPS 48121)
  - text: 95.5% of Denton households have broadband at home, second only to Collin in batch 4. The CoreWeave Denton site is anchoring on a fiber footprint already built for the suburban DFW workforce.
    source: Census ACS 2023 B28002 (FIPS 48121)
  - text: 65.4% of Denton households own their home and median gross rent is $1,642. The 20.5% utility-rate jump combined with $1,642 monthly rent means the per-household exposure to AI-driven bill increases is concentrated on the renter third of the county.
    source: Census ACS 2023 B25003, B25064 (FIPS 48121)
  - text: Manufacturing employs 8.2% of Denton's workers and only 6.0% of adults are veterans. Peterbilt's truck plant in Denton city is the largest single industrial employer, a payroll the CoreWeave site will not match.
    source: Census ACS 2023 C24050, B21001 (FIPS 48121)
tx-dickens:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dickens County has 1,747 residents on 905 square miles, one of the four smallest counties in batch 4 and 100% rural. The county seat is Dickens but the largest city is Spur, and the median age is 47.6.
    source: 'Census ACS 2024 B01003, B01002 + sources[0] (Wikipedia: Dickens County, TX)'
  - text: Galaxy Digital's 800 MW Helios campus is the second largest announced site in batch 4 after Stargate Milam. CoreWeave is the anchor tenant on a 15-year lease, the longest disclosed lease term in any batch-4 deal.
    source: data/sites/data_centers.csv (Helios)
  - text: Property tax assessments rose 19.1% over three years, the steepest jump in any batch-4 county that disclosed an MW number. Median household income is $49,335 and median home value is $65,300, both the lowest in batch 4.
    source: data/cache/property_tax_yoy.csv (FIPS 48125) + Census ACS 2024 B19013, B25077
  - text: Helios is on ERCOT via AEP Texas, with no published residential rate delta because of retail deregulation. The campus delivers 458 kW of announced AI compute per Dickens County resident, the highest density in batch 4.
    source: data/cache/utility_rate_yoy.csv (no AEP Texas residential row) + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Dickens_County,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Hispanic residents make up 34.0% of Dickens County's 1,641 people, identical to Childress. Combined, more than a third of the county that hosts Galaxy's 800 MW Helios campus is non-white.
    source: Census ACS 2023 B03003 (FIPS 48125)
  - text: 81.4% of Dickens households own their home, tied for the highest ownership rate in batch 4. Median gross rent is $753 on a rental stock of about 60 units, meaning the campus workforce has effectively no rental landing pad in the county itself.
    source: Census ACS 2023 B25003, B25064 (FIPS 48125)
  - text: 14.5% of Dickens residents live in poverty and only 2.5% of workers are in manufacturing, the lowest mfg share of any Texas county in batch 4. Helios will be the first industrial-scale employer the county has had in living memory.
    source: Census ACS 2023 B17001, C24050 (FIPS 48125)
  - text: Only 85.5% of Dickens households have broadband at home, leaving about 240 residents off the network as a 15-year CoreWeave AI lease moves in next door. Veterans are 4.0% of adults, half the rural Texas baseline.
    source: Census ACS 2023 B28002, B21001 (FIPS 48125)
tx-ellis:
  last_updated: '2026-05-17'
  takeaways:
  - text: Ellis County has 213,160 residents and hosts two announced Google campuses, in Midlothian and Red Oak. Midlothian alone has nearly doubled from 18,037 to 35,125 residents between 2010 and 2020, a 94.7% jump.
    source: 'Census ACS 2024 B01003 + data/sites/data_centers.csv + sources[0] (Wikipedia: Midlothian, TX)'
  - text: Midlothian already hosts three of the top 10 US cement plants, run by Martin Marietta, Holcim, and Ash Grove, plus a Gerdau Ameristeel mill. The Google campus is landing next to an already heavy-industrial grid corner.
    source: 'sources[0] (Wikipedia: Midlothian, TX)'
  - text: Property tax assessments rose 14.2% over three years against a county median household income of $99,595 and a median home value of $348,600. Home prices are still up 6.3% on a 3-year baseline despite the DFW correction nearby.
    source: data/cache/property_tax_yoy.csv + data/cache/realestate_yoy.csv (FIPS 48139) + Census ACS 2024 B19013, B25077
  - text: The Red Oak Google build is a $600 million Ellis County site, and both campuses sit on Oncor's ERCOT grid with no published residential rate delta. Ellis is the only batch-4 county where a single hyperscaler runs two separate campuses.
    source: data/sites/data_centers.csv + data/cache/utility_rate_yoy.csv (no Oncor residential row)
  sources:
  - https://en.wikipedia.org/wiki/Midlothian,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 11.8% of Ellis County's working population is in manufacturing, the highest mfg share in batch 4 and double the Texas state baseline. The cement plants and Gerdau steel mill already anchor an industrial-grid corner that Google's two campuses are extending.
    source: Census ACS 2023 C24050 (FIPS 48139)
  - text: 76.3% of Ellis households own their home, the highest ownership rate of any metro-scale county in batch 4. The county sits between Dallas exurbs and rural cropland, and its housing stock has stayed mostly out of the DFW rental market.
    source: Census ACS 2023 B25003 (FIPS 48139)
  - text: 27.6% of Ellis residents are Hispanic, the highest Hispanic share of any DFW-suburban county in batch 4. Midlothian and Waxahachie absorbed working-class Latino families pushed out of inner Dallas during the 2010s housing run.
    source: Census ACS 2023 B03003 (FIPS 48139)
  - text: Just 8.1% of Ellis residents live in poverty and 4.0% are unemployed, both at the metro-Texas baseline despite the heavy-industrial labor mix. 91.7% of households have broadband at home.
    source: Census ACS 2023 B17001, B23025, B28002 (FIPS 48139)
tx-hale:
  last_updated: '2026-05-17'
  takeaways:
  - text: Hale County has 32,131 residents and Plainview, the county seat, fell 9% from 22,194 to 20,187 between 2010 and 2020. TeraWulf and Fluidstack announced a 168 MW campus in Abernathy backed by a Google offtake commitment.
    source: 'Census ACS 2024 B01003 + sources[0] (Wikipedia: Plainview, TX) + data/sites/data_centers.csv'
  - text: Median household income is $51,897 and the median home value is $116,500, the second lowest values in batch 4 after Dickens. Property tax assessments still rose 10.4% over three years on the smaller base.
    source: Census ACS 2024 B19013, B25077 + data/cache/property_tax_yoy.csv (FIPS 48189)
  - text: Only 15.3% of Hale residents over 25 hold a bachelor's degree, second lowest in batch 4 after Childress. The 168 MW Abernathy site is the smallest disclosed MW in any batch-4 county, but a Google-backed deal is unusual for TeraWulf.
    source: Census ACS 2024 B15003 + data/sites/data_centers.csv
  - text: Abernathy sits on AEP Texas inside ERCOT, with no published residential rate delta because of deregulation. The campus adds about 5.2 kW of AI compute per Hale County resident, the lowest per-capita density in batch 4.
    source: data/cache/utility_rate_yoy.csv (no AEP Texas residential row) + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Plainview,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 60.8% of Hale County residents are Hispanic, the second highest Hispanic share in batch 4 after Bexar. The TeraWulf Abernathy campus is landing in a majority-Hispanic county with falling population.
    source: Census ACS 2023 B03003 (FIPS 48189)
  - text: 19.0% of Hale residents live below the poverty line, the highest poverty rate in batch 4. Cargill's Plainview beef plant closed in 2013 and the county has not replaced that wage floor.
    source: Census ACS 2023 B17001 (FIPS 48189)
  - text: Only 80.8% of Hale households have broadband at home, tied for second lowest in batch 4. The TeraWulf site is plugging into ERCOT in a county where one in five households is offline.
    source: Census ACS 2023 B28002 (FIPS 48189)
  - text: 5.9% of Hale's labor force works in manufacturing and 4.2% of adults are veterans. The Wayland Baptist student population skews the broader workforce demographics in Plainview.
    source: Census ACS 2023 C24050, B21001 (FIPS 48189)
tx-haskell:
  last_updated: '2026-05-17'
  takeaways:
  - text: Haskell County has 5,421 residents and remained 23% below the poverty line in the 2000 census. Google announced two Haskell campuses as part of a $40 billion Texas package, with one site to be co-located with a new solar plus battery storage plant.
    source: 'Census ACS 2024 B01003 + sources[0] (Wikipedia: Haskell County, TX) + sources[1] (Google: American Innovation Texas)'
  - text: Property tax assessments jumped 26.3% over three years, the steepest jump in any batch-4 county and the steepest of any disclosed slot on the powertracker map. Land speculation around the Google announcement appears to be the explicit driver.
    source: data/cache/property_tax_yoy.csv (FIPS 48207)
  - text: Median household income is $60,653 and median home value is $98,700, with the county on AEP Texas inside ERCOT and no published 3-year residential rate delta. Google has secured more than 6,200 MW of new Texas generation through PPAs to cover its package.
    source: Census ACS 2024 B19013, B25077 + data/cache/utility_rate_yoy.csv (no AEP Texas residential row) + sources[1]
  - text: Haskell is the only batch-4 county where a hyperscaler campus is explicitly being built next to its own dedicated solar plus battery facility. Google plans 1,700 new electrical apprentices statewide by 2030 to staff the buildout.
    source: 'sources[1] (Google: American Innovation Texas)'
  sources:
  - https://en.wikipedia.org/wiki/Haskell_County,_Texas
  - https://blog.google/company-news/inside-google/company-announcements/google-american-innovation-texas/
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 74.1% of Haskell County households own their home, far above the Texas state baseline. Median gross rent is $824 on a rental stock of fewer than 600 units, leaving any incoming Google construction workforce without an in-county housing supply.
    source: Census ACS 2023 B25003, B25064 (FIPS 48207)
  - text: 26.0% of Haskell residents are Hispanic and only 1.9% of the labor force is in manufacturing, the lowest mfg share of any Texas county in batch 4. Cotton and wheat farming have been the labor baseline for a century.
    source: Census ACS 2023 B03003, C24050 (FIPS 48207)
  - text: Just 84.2% of Haskell households have broadband at home and 6.6% of adults are veterans. The Google solar-plus-battery co-located build is the first industrial-scale infrastructure investment in the county in decades.
    source: Census ACS 2023 B28002, B21001 (FIPS 48207)
  - text: 14.2% of Haskell residents live in poverty and 5.4% are unemployed, on a population of 5,390. The county would have to double its workforce to staff a 1 GW data-center campus, an option the demographics do not currently support.
    source: Census ACS 2023 B17001, B23025, B01003 (FIPS 48207)
tx-milam:
  last_updated: '2026-05-17'
  takeaways:
  - text: Milam County has 25,567 residents. The Stargate Milam campus, anchored by SoftBank and SB Energy with OpenAI as primary tenant, is announced at 1.2 GW, the largest announced site in batch 4 and roughly 47 kW per county resident.
    source: Census ACS 2024 B01003 + data/sites/data_centers.csv
  - text: Alcoa ran a Rockdale aluminum smelter from 1952 to 2014 with capacity of about 1.67 million pounds per day, paired with the Sandow Steam Plant that closed in 2018. Bitdeer, a Bitmain division, now mines bitcoin at the former Alcoa site.
    source: 'sources[0] (Wikipedia: Rockdale, TX)'
  - text: Property tax assessments rose 10.1% over three years against a median household income of $66,141 and a median home value of $189,800. The county has a history of absorbing large industrial loads, just not this kind.
    source: data/cache/property_tax_yoy.csv (FIPS 48331) + Census ACS 2024 B19013, B25077
  - text: Stargate Milam is on Oncor's ERCOT grid with no published residential rate delta because of retail deregulation. The 1,200 MW announced load is roughly 70% of what the Sandow Steam Plant supplied at its peak, dropped back into the same county on a different timetable.
    source: data/cache/utility_rate_yoy.csv (no Oncor residential row) + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Rockdale,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 77.4% of Milam County households own their home and median gross rent is $948. The Stargate Milam campus is landing in a county with one of the higher batch-4 ownership baselines, on a rental stock of about 1,400 units.
    source: Census ACS 2023 B25003, B25064 (FIPS 48331)
  - text: 25.6% of Milam residents are Hispanic and 9.6% are Black, making the county more racially diverse than the rural Texas average. The Rockdale-Cameron labor corridor has absorbed migrant farm and industrial workers since the Alcoa era.
    source: Census ACS 2023 B03003, B02001 (FIPS 48331)
  - text: 15.8% of Milam residents live in poverty and 6.9% of adults are veterans. The 1.2 GW Stargate campus is moving into a county where one in six residents already lives below the poverty line.
    source: Census ACS 2023 B17001, B21001 (FIPS 48331)
  - text: Only 83.1% of Milam households have broadband at home, leaving about 4,300 residents off the network as the largest batch-4 AI campus prepares to energize. 6.5% of workers are in manufacturing, a fraction of what Alcoa employed at peak.
    source: Census ACS 2023 B28002, C24050 (FIPS 48331)
tx-mitchell:
  last_updated: '2026-05-17'
  takeaways:
  - text: Mitchell County has 8,989 residents and Colorado City the seat has 3,991. The 300 MW Cipher / Fluidstack Barber Lake campus is roughly 33 kW of AI compute per Mitchell County resident.
    source: Census ACS 2023 B01003 (Mitchell County, TX and Colorado City) + app/county/tx-mitchell.html
  - text: Median household income in Mitchell County is $56,033 and the median home value is $85,700, the lowest home value in the West Texas data-center belt. Only 13.9% of residents over 25 hold a bachelor's degree.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 48335)
  - text: Colorado City sits on Lake Colorado City and Lake J.B. Thomas, two of the larger surface-water reservoirs in the Permian fringe. Cipher's Barber Lake campus is named for the third reservoir, the one closest to the parcel.
    source: data/sites/data_centers.csv (Barber Lake)
  - text: Property tax assessments rose 6.5% over three years on a $1,599 median bill. ERCOT's deregulated retail market means AEP Texas has no published residential rate delta, so the bill-side cost of 300 MW of new load is invisible in the standard data.
    source: data/cache/property_tax_yoy.csv (FIPS 48335) + data/cache/utility_rate_yoy.csv (no AEP Texas residential row)
  sources:
  - https://en.wikipedia.org/wiki/Colorado_City,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: 38.7% of Mitchell County residents are Hispanic, the highest Hispanic share of any West Texas county in batch 4 outside the Hale-Plainview corridor. Colorado City sits on the eastern edge of the Permian's Latino agricultural-labor belt.
    source: Census ACS 2023 B03003 (FIPS 48335)
  - text: Median gross rent in Mitchell County is $481, the lowest in batch 4 by a wide margin. The Cipher Barber Lake workforce can find a rental for less than $500 a month, but the rental stock is barely 700 units total.
    source: Census ACS 2023 B25064, B25003 (FIPS 48335)
  - text: Only 80.0% of Mitchell households have broadband at home, the lowest connectivity rate in batch 4. About 1,800 residents are offline in the same county where a 300 MW AI campus is being announced.
    source: Census ACS 2023 B28002 (FIPS 48335)
  - text: 13.2% of Mitchell residents live in poverty and 4.7% are unemployed. Manufacturing employs only 4.6% of the labor force, with the state prison unit and oilfield service work absorbing most of the employed adults.
    source: Census ACS 2023 B17001, B23025, C24050 (FIPS 48335)
tx-oldham:
  last_updated: '2026-05-17'
  takeaways:
  - text: Oldham County has 2,097 residents, the smallest county in this batch. Hut 8's 205 MW Vega campus is roughly 98 kW of compute per resident, one of the highest per-capita ratios in the dataset.
    source: Census ACS 2023 B01003 (Oldham County, TX) + app/county/tx-oldham.html
  - text: Vega sits on historic Route 66 and the surrounding county is wheat and wind. Oldham County hosts several utility-scale wind farms tied to the Xcel SPS grid, the same grid Hut 8 is now drawing 205 MW from.
    source: 'sources[0] (Wikipedia: Oldham County, Texas)'
  - text: Xcel SPS residential rates actually fell 0.1% from 2021 to 2023 and Oldham property tax assessments fell 4.4% over the same window. Hut 8's load has not yet flowed through to either bill.
    source: data/cache/utility_rate_yoy.csv (Southwestern Public Service Co, TX) + data/cache/property_tax_yoy.csv (FIPS 48359)
  - text: Median household income in Oldham County is $76,402, the highest of the four West Texas counties in this batch. That income is propped up by a small population of ranch landowners rather than wage workers.
    source: Census ACS 2023 B19013, B25077 (FIPS 48359)
  sources:
  - https://en.wikipedia.org/wiki/Oldham_County,_Texas
  - https://api.census.gov/data/2023/acs/acs5
  demographics:
  - text: Only 0.7% of Oldham County's labor force is officially unemployed, on a working population of fewer than 800 adults. The Hut 8 Vega campus is landing in the tightest labor market in batch 4 by raw numbers.
    source: Census ACS 2023 B23025 (FIPS 48359)
  - text: 11.3% of Oldham's workers are in manufacturing, second only to Nolan in West Texas batch 4. The Vega industrial corridor along I-40 has absorbed wind-tower and pipeline fabrication for two decades.
    source: Census ACS 2023 C24050 (FIPS 48359)
  - text: 24.5% of Oldham residents are Hispanic and 9.8% of adults are veterans, the highest vet share of any rural Texas county in batch 4. Amarillo Air Force Base separations and Pantex retirees feed the local civilian base.
    source: Census ACS 2023 B03003, B21001 (FIPS 48359)
  - text: 17.7% of Oldham residents live in poverty despite the $76,402 median income, the second highest poverty rate in batch 4. The ranching-landowner income concentration leaves the wage-worker third of the county exposed.
    source: Census ACS 2023 B17001 (FIPS 48359)
tx-shackelford:
  last_updated: '2026-05-17'
  takeaways:
  - text: Shackelford County has 3,169 residents and Albany the seat has 1,854. The Stargate Shackelford build is the third Oracle / OpenAI campus in Texas, with megawatts not yet publicly disclosed.
    source: 'Census ACS 2023 B01003 (Shackelford County, TX and Albany) + sources[0] (Wikipedia: Albany, TX)'
  - text: Median household income in Shackelford County is $64,659 against a median home value of $176,900, the highest home value of the four West Texas counties in this batch. The 34.6% bachelor's-degree share is the highest, lifted by ranch-management and oilfield-engineering wages.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 48417)
  - text: Property tax assessments in Shackelford County fell 9.9% over three years, the steepest tax drop of any county in this batch. Stargate land transactions have not yet shown up in the assessor's roll.
    source: data/cache/property_tax_yoy.csv (FIPS 48417)
  - text: Albany's motto is Home of the Hereford and the Fort Griffin Fandangle is the official state theatrical production. The county sits in the heart of Permian-adjacent cattle country, not the oilfields that anchor the other Stargate Texas sites.
    source: 'sources[0] (Wikipedia: Albany, Texas)'
  sources:
  - https://en.wikipedia.org/wiki/Albany,_Texas
  demographics:
  - text: 91.0% of Shackelford County residents lived in the same house one year earlier, the highest residential stability in this batch. Stargate will need to import nearly every operator from outside the 3,169-person base.
    source: Census ACS 2023 B07001 (FIPS 48417)
  - text: The county is 86.8% white, 12.7% Hispanic, and 1.2% Black, the smallest Black population share of any Texas county in this batch. The Hispanic share has nearly doubled since 2010 driven by oilfield service work.
    source: Census ACS 2023 B02001, B03003 (FIPS 48417)
  - text: Median gross rent in Shackelford County is $485 per month, the lowest in this batch by a factor of two. A construction-trade family relocated for Stargate can absorb the cost of living with room to spare.
    source: Census ACS 2023 B25064 (FIPS 48417)
  - text: 81.9% of occupied homes are owner-occupied and only 5.7% of adults are veterans, the lowest veteran share of any county in this batch. This is ranching country first, with no nearby base anchoring federal-employee turnover.
    source: Census ACS 2023 B25003, B21001 (FIPS 48417)
tx-wilbarger:
  last_updated: '2026-05-17'
  takeaways:
  - text: Wilbarger County has 12,712 residents and Vernon the seat has 10,078, an 8.4% population loss over the last decade. The Google / AES Vernon campus is the largest single industrial commitment to the county since Tyson Foods built its Wright Brand bacon plant.
    source: 'Census ACS 2023 B01003 (Wilbarger County, TX and Vernon) + sources[0] (Wikipedia: Vernon, Texas)'
  - text: Vernon hosts the Waggoner Ranch, the largest spread in Texas under one fence at roughly 510,000 acres. Google's data center is not on Waggoner land but the ranch's existing wind leases set the template for how rural Texas counties absorb new electric load.
    source: 'sources[0] (Wikipedia: Vernon, Texas)'
  - text: Median household income in Wilbarger County is $51,626 against a median home value of $98,800. Only 17.4% of residents over 25 hold a bachelor's degree, lower than every county in the batch except Mitchell.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 48487)
  - text: Wilbarger property tax assessments rose 4.3% over three years, modest given the 10,000-resident base. AEP Texas does not publish a retail residential rate in EIA Form 861 so the bill-side impact of Google's new load is invisible in the standard data.
    source: data/cache/property_tax_yoy.csv (FIPS 48487) + data/cache/utility_rate_yoy.csv (no AEP Texas residential row)
  sources:
  - https://en.wikipedia.org/wiki/Vernon,_Texas
  demographics:
  - text: Unemployment in Wilbarger County is 9.8%, the highest in this batch and more than triple the national figure. The Google AES Vernon campus is landing in a labor market that already cannot place its existing workforce.
    source: Census ACS 2023 B23025 (FIPS 48487)
  - text: 18.8% of Wilbarger residents live below the poverty line and median gross rent is $862 per month. Manufacturing already employs 12.1% of the workforce, the highest share of any Texas county in this batch, anchored by the Tyson bacon plant.
    source: Census ACS 2023 B17001, B25064, C24050 (FIPS 48487)
  - text: 29.9% of Wilbarger residents are Hispanic, the largest Hispanic share of the West Texas counties in this batch. Only 78.0% of households have a home broadband subscription, the lowest broadband share among the Texas counties here.
    source: Census ACS 2023 B03003, B28002 (FIPS 48487)
  - text: 83.3% of Wilbarger residents lived in the same house one year earlier, lower than Shackelford or Mason but high enough that the Google campus will pull most of its construction crew from outside the county.
    source: Census ACS 2023 B07001 (FIPS 48487)
ut-utah:
  last_updated: '2026-05-17'
  takeaways:
  - text: Utah County has 683,622 residents, the second-most-populous county in Utah. Eagle Mountain alone is 60,575 residents in 2024, up from 43,623 in 2020, a 39% jump in four years that has nothing to do with the Meta campus and everything to do with cheap Wasatch Front housing.
    source: 'Census ACS 2023 B01003 (Utah County, UT) + sources[0] (Wikipedia: Eagle Mountain, Utah)'
  - text: Median household income in Utah County is $96,877 against a $489,200 median home value and a 25.5 median age, the youngest county in this batch by a wide margin. The Mormon family-formation pipeline keeps the workforce expanding faster than data centers can recruit from it.
    source: Census ACS 2023 B19013, B25077, B01002 (FIPS 49049)
  - text: Rocky Mountain Power residential rates rose 13.6% from 2021 to 2023 and property tax assessments rose 17.5% over the same window, the second-steepest tax move of any county in this batch. Meta's Eagle Mountain campus is one of nine PacifiCorp data-center loads driving the Wasatch Front rate case.
    source: data/cache/utility_rate_yoy.csv (PacifiCorp, UT) + data/cache/property_tax_yoy.csv (FIPS 49049)
  - text: Home prices rose 6.0% over three years against a $96,877 median income, modest by Utah standards. Eagle Mountain's growth has been absorbing the rate-and-tax pressure that is showing up first on the assessor's roll.
    source: data/cache/realestate_yoy.csv (FIPS 49049) + Census ACS 2023 B19013
  sources:
  - https://en.wikipedia.org/wiki/Eagle_Mountain,_Utah
  demographics:
  - text: Only 3.2% of Utah County adults are veterans, the lowest veteran share of any county in this batch by a wide margin. Meta's Eagle Mountain workforce will recruit from a young Mormon talent pool, not the federal-employee pipeline that anchors NOVA.
    source: Census ACS 2023 B21001 (FIPS 49049)
  - text: 92.0% of Utah County households have a home broadband subscription and only 8.7% live below the poverty line. The combination is unusual in this batch and reflects the BYU and Silicon Slopes overlap inside one county.
    source: Census ACS 2023 B28002, B17001 (FIPS 49049)
  - text: The county is 83.7% white, 13.9% Hispanic, 1.5% Asian, and 0.7% Black, the smallest Black share of any data-center county in this batch. The Hispanic share is the only non-white population large enough to register.
    source: Census ACS 2023 B02001, B03003 (FIPS 49049)
  - text: Median gross rent in Utah County is $1,441 per month against a 68.1% owner-occupancy rate. Manufacturing employs 9.0% of the workforce, larger than Loudoun's 4.4% and on par with Mecklenburg's 9.6%.
    source: Census ACS 2023 B25064, B25003, C24050 (FIPS 49049)
va-chesterfield:
  last_updated: '2026-05-17'
  takeaways:
  - text: Chesterfield County has 371,610 residents and a median household income of $98,910, the third-highest of the six Virginia counties in this batch. The 120 MW CoreWeave / Chirisa campus in Chester sits roughly 15 miles south of downtown Richmond on the Meadowville Technology Park corridor.
    source: Census ACS 2023 B01003, B19013 (FIPS 51041) + app/county/va-chesterfield.html
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023, the same rate-delta hitting every other Dominion-served county in this batch. The cost is allocated state-wide regardless of which county hosts the data-center load.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA)
  - text: Chesterfield property tax assessments rose 11.5% over three years on a $2,773 median bill, the second-steepest tax move of any Virginia county in this batch. Home prices rose 6.9% over the same window against a $336,700 median home value.
    source: data/cache/property_tax_yoy.csv (FIPS 51041) + data/cache/realestate_yoy.csv + Census ACS 2023 B25077
  - text: 42.7% of Chesterfield residents over 25 hold a bachelor's degree, well above the national 35% but below Loudoun's 64% and Henrico's 45.7%. The county is the suburban-family bedroom for Richmond, not the data-center magnet that Northern Virginia is.
    source: Census ACS 2023 B15003 (Chesterfield County, VA)
  sources: []
  demographics:
  - text: Chesterfield is 23.5% Black, 11.4% Hispanic, and 3.5% Asian against a 59.5% white share. The Black population share is the second-highest in this batch behind Henrico, and well above neighboring Loudoun's 7.7%.
    source: Census ACS 2023 B02001, B03003 (FIPS 51041)
  - text: Median gross rent in Chesterfield County is $1,542 per month, less than two-thirds of Loudoun's $2,317 despite the same Dominion rate-of-load shock. 77.3% of occupied homes are owner-occupied, the highest in Virginia data-center counties tied with Loudoun.
    source: Census ACS 2023 B25064, B25003 (FIPS 51041)
  - text: Only 6.8% of Chesterfield residents live below the poverty line, the lowest poverty rate of any Virginia data-center county in this batch outside Loudoun and Stafford. 9.0% of adults are veterans, comparable to Henrico but well below Stafford's 17.5%.
    source: Census ACS 2023 B17001, B21001 (FIPS 51041)
  - text: 88.0% of Chesterfield residents lived in the same house one year earlier. The county is the suburban anchor that retains families, not the transient corridor that Loudoun has become for federal contractors.
    source: Census ACS 2023 B07001 (FIPS 51041)
va-henrico:
  last_updated: '2026-05-17'
  takeaways:
  - text: Henrico County has 334,434 residents and is the fifth-most-populous county in Virginia. The Meta Sandston campus sits in the White Oak Technology Park east of Richmond International Airport, the same park that hosts QTS Richmond.
    source: 'Census ACS 2023 B01003 (Henrico County, VA) + sources[0] (Wikipedia: Henrico County, Virginia)'
  - text: 45.7% of Henrico residents over 25 hold a bachelor's degree against a median household income of $86,397 and a $333,600 median home value. The data-center workforce competes with VCU Health, Capital One, and the State of Virginia for the same college-educated talent pool.
    source: Census ACS 2023 B15003, B19013, B25077 (FIPS 51087)
  - text: Henrico property tax assessments rose 12.8% over three years on a $2,565 median bill, the steepest property-tax move of any Virginia county in this batch. Home prices rose 5.3% over the same window, well below the assessment growth.
    source: data/cache/property_tax_yoy.csv (FIPS 51087) + data/cache/realestate_yoy.csv
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023, the same rate-delta hitting every Dominion-served county in this batch. The Meta Sandston campus has been operating since the original Facebook lease in 2017 and was on the grid before the AI-era rate-of-load shock began.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA) + data/sites/data_centers.csv
  sources:
  - https://en.wikipedia.org/wiki/Henrico_County,_Virginia
  demographics:
  - text: Henrico is 29.7% Black, 9.5% Asian, and 6.7% Hispanic against a 51.3% white share, the most racially balanced county in this batch. The Asian share is the second-highest behind Loudoun's 21.0% and the Black share is the highest in any Virginia data-center county here.
    source: Census ACS 2023 B02001, B03003 (FIPS 51087)
  - text: Only 64.6% of occupied homes are owner-occupied, the lowest ownership rate of the six Virginia counties in this batch. Median gross rent is $1,474 per month, comparable to Chesterfield's $1,542.
    source: Census ACS 2023 B25003, B25064 (FIPS 51087)
  - text: 8.4% of Henrico residents live below the poverty line and 3.9% of the workforce is unemployed. Manufacturing employs only 5.9% of workers, less than Chesterfield's 6.9% despite hosting Meta and QTS at the White Oak Technology Park.
    source: Census ACS 2023 B17001, B23025, C24050 (FIPS 51087)
  - text: 91.8% of Henrico households have a home broadband subscription, in line with Chesterfield's 93.9% but well below Loudoun's 96.7%. The data centers serving global traffic from Sandston cannot fully close the gap inside their own county.
    source: Census ACS 2023 B28002 (FIPS 51087)
va-loudoun:
  last_updated: '2026-05-17'
  takeaways:
  - text: Loudoun County's median household income is $178,707, the highest of any county in the United States as of the 2023 ACS. 64.0% of residents over 25 hold a bachelor's degree, the highest concentration of college-educated workers in this batch.
    source: 'Census ACS 2023 B19013, B15003 (FIPS 51107) + sources[0] (Wikipedia: Loudoun County, Virginia)'
  - text: Data Center Alley in Ashburn now holds more than 25 million square feet of operational data centers across 60-plus campuses. Estimates of how much daily global web traffic transits the corridor range from 22% to 70%, a contested but unrivaled concentration.
    source: 'sources[0] (Wikipedia: Loudoun County, Virginia and Data Center Alley)'
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023 and Loudoun home prices rose only 3.8% over three years against a $701,000 median home value, the most muted home-price move in this batch. The 6.4% property tax delta is similarly restrained, in line with the county's existing high revenue base.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA) + data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 51107)
  - text: Loudoun's 427,082 residents already share their grid with AWS us-east-1, the region that hosts an estimated 70% of all AWS IP addresses. The single county is the canonical example of what a 25 million square-foot data-center cluster does to a wealthy bedroom community.
    source: 'Census ACS 2023 B01003 + sources[0] (Wikipedia: Data Center Alley)'
  sources:
  - https://en.wikipedia.org/wiki/Loudoun_County,_Virginia
  demographics:
  - text: Loudoun is 21.0% Asian, 14.2% Hispanic, and 7.7% Black against a 55.4% white share, the largest Asian population share of any county in this batch. Northern Virginia's Indian and Korean communities concentrate inside this single Dominion rate jurisdiction.
    source: Census ACS 2023 B02001, B03003 (FIPS 51107)
  - text: Only 4.0% of Loudoun residents live below the poverty line, the lowest poverty rate in this batch. Yet median gross rent is $2,317 per month, the highest rent in this batch and roughly three times Mecklenburg's $804.
    source: Census ACS 2023 B17001, B25064 (FIPS 51107)
  - text: 96.7% of Loudoun households have a home broadband subscription, the highest in this batch but only 4 points above Utah County's 92.0%. Data Center Alley does not deliver a corresponding lead in household connectivity over wealthy non-data-center counties.
    source: Census ACS 2023 B28002 (FIPS 51107)
  - text: Manufacturing employs only 4.4% of the Loudoun workforce, the smallest manufacturing share of any Virginia county in this batch. Unemployment is 3.2% and 88.6% of residents lived in the same house a year ago, a stable knowledge-economy base anchoring the data-center build.
    source: Census ACS 2023 C24050, B23025, B07001 (FIPS 51107)
va-mecklenburg:
  last_updated: '2026-05-17'
  takeaways:
  - text: Mecklenburg County has 30,431 residents and Boydton the seat has 302. Microsoft started its $500 million Boydton campus in 2010 and expanded it for another $350 million in 2014, the oldest hyperscaler footprint in this batch.
    source: 'Census ACS 2023 B01003 (Mecklenburg County, VA and Boydton) + sources[0] (Wikipedia: Boydton, Virginia)'
  - text: Median household income in Mecklenburg County is $51,691 and the median home value is $169,400, the lowest home value and the lowest income of any Virginia county in this batch. Only 21.2% of residents over 25 hold a bachelor's degree, less than half of Loudoun's share.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 51117)
  - text: Home prices in Mecklenburg County fell 12.7% over three years, the only county in this batch where Redfin shows a negative home-price delta. The 64 trailing-3-month sales is the lowest sales volume of any county in this batch, so the swing reflects a thin market as much as a softening one.
    source: data/cache/realestate_yoy.csv (FIPS 51117)
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023, the same delta Loudoun and Prince William residents face despite the gap in incomes. A Boydton household at the $51,691 median feels that rate increase roughly three times harder than a Loudoun household at $178,707.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA) + Census ACS 2023 B19013
  sources:
  - https://en.wikipedia.org/wiki/Boydton,_Virginia
  demographics:
  - text: Mecklenburg is 32.9% Black against a 61.9% white share and just 3.0% Hispanic. The Black population share is the largest of any county in this batch and a sharper contrast against Loudoun's 7.7% than any income gap.
    source: Census ACS 2023 B02001, B03003 (FIPS 51117)
  - text: Only 71.8% of Mecklenburg households have a home broadband subscription, the lowest broadband share of any county in this batch. Microsoft's $850 million Boydton campus moves cloud bytes for the world from a county where 28% of households have no home internet.
    source: Census ACS 2023 B28002 (FIPS 51117)
  - text: 17.4% of Mecklenburg residents live below the poverty line and median gross rent is $804 per month. Both numbers put the county closer to rural West Virginia or West Texas than to neighboring Dominion Virginia data-center counties.
    source: Census ACS 2023 B17001, B25064 (FIPS 51117)
  - text: Unemployment is just 3.0% on a small 12,887-person labor force, the tightest market of any Virginia county in this batch outside Loudoun. Manufacturing already employs 9.6% of workers, the largest manufacturing share of the six Virginia counties here.
    source: Census ACS 2023 B23025, C24050 (FIPS 51117)
va-prince-william:
  last_updated: '2026-05-17'
  takeaways:
  - text: Prince William County has 484,625 residents and is the second-largest county in Virginia. The 502,966 estimate for 2025 puts it on the cusp of overtaking Fairfax as the Northern Virginia data-center population center.
    source: 'Census ACS 2023 B01003 (Prince William County, VA) + sources[0] (Wikipedia: Prince William County, Virginia)'
  - text: Median household income is $128,873 and 44.5% of residents over 25 hold a bachelor's degree, the third-highest in this batch. The county is the affordable spillover from Loudoun for federal-contractor families priced out of Ashburn.
    source: Census ACS 2023 B19013, B15003 (FIPS 51153)
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023, the same delta every Dominion-served county faces. Home prices rose 7.2% and property tax assessments rose 7.2% over the same window, an exact coincidence that suggests a homeowner whose income tracks Dominion exactly is treading water.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA) + data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 51153)
  - text: The AWS Manassas campus sits in the corridor that became the focus of the Prince William Digital Gateway rezoning fight, the largest data-center land-use battle in the state. Acreage estimates for the full Gateway parcel run into the thousands, dwarfing the operational AWS footprint already on the grid.
    source: 'data/sites/data_centers.csv (Manassas, AWS) + sources[0] (Wikipedia: Prince William County, Virginia)'
  sources:
  - https://en.wikipedia.org/wiki/Prince_William_County,_Virginia
  demographics:
  - text: Prince William is 25.7% Hispanic, 20.5% Black, and 9.8% Asian against a 46.6% white share, the only Virginia county in this batch where no racial or ethnic group holds an outright majority. The Hispanic share is the largest of any Virginia county here.
    source: Census ACS 2023 B02001, B03003 (FIPS 51153)
  - text: 11.7% of Prince William adults are veterans, the second-highest veteran share in this batch behind Stafford's 17.5%. Manassas's proximity to Quantico and the Pentagon anchors a security-cleared workforce that the AWS campus inherits.
    source: Census ACS 2023 B21001 (FIPS 51153)
  - text: Median gross rent in Prince William County is $2,002 per month, $315 below Loudoun's $2,317 and $77 above Stafford's $1,925. The county is the rent spillover between the Ashburn ceiling and the federal-pay floor.
    source: Census ACS 2023 B25064 (FIPS 51153)
  - text: Only 6.1% of Prince William residents live below the poverty line and 96.2% of households have a home broadband subscription. The Digital Gateway rezoning fight is being waged by homeowners who already have everything the data centers offer.
    source: Census ACS 2023 B17001, B28002 (FIPS 51153)
va-stafford:
  last_updated: '2026-05-17'
  takeaways:
  - text: Stafford County has 160,520 residents and is the fastest-growing of the Northern Virginia data-center counties, projected at 170,803 by 2025. Marine Corps Base Quantico, the FBI Academy, the FBI National Laboratory and NCIS HQ all sit on the Stafford side of the county line.
    source: 'Census ACS 2023 B01003 + sources[0] (Wikipedia: Stafford County, Virginia)'
  - text: Median household income in Stafford County is $133,792, the second-highest in this batch behind Loudoun. The county was ranked the 11th highest-income county in the US by Forbes in 2009 and 43.3% of residents over 25 hold a bachelor's degree.
    source: 'Census ACS 2023 B19013, B15003 (FIPS 51179) + sources[0] (Wikipedia: Stafford County, Virginia)'
  - text: Dominion Energy Virginia residential rates rose 7.2% from 2021 to 2023 and Stafford property tax assessments rose 7.4% over three years, almost the same rate. The AWS Stafford campus is the southernmost AWS footprint in this batch and competes for grid capacity with both the federal facilities and the bedroom subdivisions.
    source: data/cache/utility_rate_yoy.csv (Virginia Electric & Power Co, VA) + data/cache/property_tax_yoy.csv (FIPS 51179)
  - text: Home prices rose 5.5% over three years against a $458,800 median home value. The federal-employee homeowner base means the housing market is anchored to federal-pay scales, not the data-center wage premium that drives Loudoun and Prince William.
    source: data/cache/realestate_yoy.csv (FIPS 51179) + Census ACS 2023 B25077
  sources:
  - https://en.wikipedia.org/wiki/Stafford_County,_Virginia
  demographics:
  - text: 17.5% of Stafford adults are veterans, the highest veteran share of any county in this batch and more than triple the national 5.5%. Quantico, the FBI Academy, and NCIS HQ together produce a security-cleared talent base that competes directly with AWS for the same workers.
    source: Census ACS 2023 B21001 (FIPS 51179)
  - text: 80.8% of occupied Stafford homes are owner-occupied, the highest in any Virginia data-center county in this batch. Only 5.1% live below the poverty line, the lowest poverty rate in this batch behind Loudoun.
    source: Census ACS 2023 B25003, B17001 (FIPS 51179)
  - text: Median gross rent is $1,925 per month and only 3.7% of the workforce is unemployed. Manufacturing employs just 2.6% of workers, the smallest manufacturing share of any county in this batch as the federal-services economy crowds out anything else.
    source: Census ACS 2023 B25064, B23025, C24050 (FIPS 51179)
  - text: Stafford is 19.3% Black, 15.9% Hispanic, and 3.8% Asian against a 57.2% white share. 96.4% of households have a home broadband subscription, statistically tied with Loudoun and Prince William.
    source: Census ACS 2023 B02001, B03003, B28002 (FIPS 51179)
wa-grant:
  last_updated: '2026-05-17'
  takeaways:
  - text: Grant County has 100,428 residents and Quincy the data-center seat has 7,543. Microsoft, Yahoo, Dell, and Intuit have all sited campuses in Quincy since 2007, drawing on Grant County PUD's hydropower from the Priest Rapids and Wanapum dams.
    source: 'Census ACS 2023 B01003 (Grant County, WA and Quincy) + sources[0] (Wikipedia: Quincy, Washington)'
  - text: Grant County PUD residential rates rose only 6.4% from 2021 to 2023, the cheapest rate environment of any data-center county in this batch. The 6.0-cent kWh average is roughly a third of Dominion Virginia's, which is why hyperscalers continue siting new builds here despite the 2010s diesel-emissions fines.
    source: 'data/cache/utility_rate_yoy.csv (PUD No 2 of Grant County, WA) + sources[0] (Wikipedia: Quincy, WA)'
  - text: Median household income in Grant County is $71,115 against a $275,700 median home value. Only 18.2% of residents over 25 hold a bachelor's degree, lower than every county in this batch except Mitchell and Wilbarger.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 53025)
  - text: Home prices rose 8.2% over three years and property tax assessments rose 6.7% over the same window. The Quincy data-center cluster has been live for nearly two decades, so the local economy has absorbed a buildout that is still novel in West Texas and rural Virginia.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 53025)
  sources:
  - https://en.wikipedia.org/wiki/Quincy,_Washington
  demographics:
  - text: 43.3% of Grant County residents are Hispanic, the largest Hispanic share of any county in this batch and more than triple any other county here. The Quincy data centers operate inside the heart of Washington's Yakima Valley agricultural workforce.
    source: Census ACS 2023 B03003 (FIPS 53025)
  - text: Unemployment in Grant County is 6.3% and 15.0% of residents live below the poverty line. The Microsoft, Yahoo, Dell, and Intuit cluster has been operating for nearly two decades without pulling the host county out of either statistic.
    source: Census ACS 2023 B23025, B17001 (FIPS 53025)
  - text: Median gross rent in Grant County is $1,059 per month and 65.6% of homes are owner-occupied. Manufacturing employs 10.8% of the workforce, largely food processing tied to the Columbia Basin irrigation district.
    source: Census ACS 2023 B25064, B25003, C24050 (FIPS 53025)
  - text: 89.7% of Grant households have a home broadband subscription, lower than every other data-center cluster in this batch except Mecklenburg, Wilbarger, and Mason. Two decades of hyperscaler operation has not closed the in-county digital divide.
    source: Census ACS 2023 B28002 (FIPS 53025)
wi-dodge:
  last_updated: '2026-05-17'
  takeaways:
  - text: Dodge County has 88,818 residents and Beaver Dam the largest city has 16,708. Meta's Beaver Dam campus is one of two new Wisconsin hyperscaler sites in this batch, joining the 1 GW Stargate Lighthouse in Port Washington 60 miles east.
    source: 'Census ACS 2023 B01003 (Dodge County, WI and Beaver Dam) + sources[0] (Wikipedia: Beaver Dam, Wisconsin)'
  - text: Alliant Energy's Wisconsin Power & Light residential rate rose 13.1% from 2021 to 2023, the second-steepest utility rate move in this batch behind Rocky Mountain Power. The 16.9-cent kWh average puts the average Dodge household bill at roughly $1,824 per year before Meta's load lands.
    source: data/cache/utility_rate_yoy.csv (Wisconsin Power & Light Co, WI)
  - text: Home prices in Dodge County rose 15.4% over three years, the steepest home-price move of any county in this batch. The $287,006 median sale price is up from $248,736 three years earlier and the trend predates the Meta announcement.
    source: data/cache/realestate_yoy.csv (FIPS 55027)
  - text: Median household income in Dodge County is $73,992 against a $218,400 median home value. Only 19.9% of residents over 25 hold a bachelor's degree, less than half of Ozaukee's 50.4% just one county over.
    source: Census ACS 2023 B19013, B25077, B15003 (FIPS 55027)
  sources:
  - https://en.wikipedia.org/wiki/Beaver_Dam,_Wisconsin
  demographics:
  - text: 26.9% of Dodge County workers are employed in manufacturing, the largest manufacturing share of any county in this batch by 6 points. Meta's Beaver Dam campus is landing in a county where the existing industrial base is already more than a quarter of all jobs.
    source: Census ACS 2023 C24050 (FIPS 55027)
  - text: Dodge County is 90.0% white, 6.4% Hispanic, 2.7% Black, and 0.5% Asian, the second-whitest county in this batch behind Mason WV. Only 88.8% of households have a home broadband subscription, the lowest broadband share among the Wisconsin counties here.
    source: Census ACS 2023 B02001, B03003, B28002 (FIPS 55027)
  - text: Median gross rent in Dodge County is $963 per month and unemployment is 3.9%. Only 7.9% of residents live below the poverty line, half of Racine's 10.8% just two counties south.
    source: Census ACS 2023 B25064, B23025, B17001 (FIPS 55027)
  - text: 90.2% of Dodge residents lived in the same house one year earlier and 7.5% of adults are veterans. The county is residentially stable and not yet pulling the migration churn that the Meta announcement is likely to bring.
    source: Census ACS 2023 B07001, B21001 (FIPS 55027)
wi-ozaukee:
  last_updated: '2026-05-17'
  takeaways:
  - text: Ozaukee County has 92,345 residents and Port Washington the host city has 12,353. The Stargate Lighthouse build at 1.0 GW is the largest Oracle / OpenAI / Vantage commitment outside of Texas and Wisconsin's largest single data-center campus.
    source: 'Census ACS 2023 B01003 (Ozaukee County, WI and Port Washington) + sources[0] (Wikipedia: Port Washington, Wisconsin) + app/county/wi-ozaukee.html'
  - text: Median household income in Ozaukee County is $96,734, the highest in Wisconsin. 50.4% of residents over 25 hold a bachelor's degree, the second-highest in this batch behind Loudoun and Stafford.
    source: Census ACS 2023 B19013, B15003 (FIPS 55089)
  - text: We Energies residential rates rose 11.4% from 2021 to 2023, the same delta hitting neighboring Racine County where Microsoft is spending $3.3 GW on the old Foxconn parcel. Ozaukee and Racine are now both We Energies hyperscaler counties and share the same rate-case cost-allocation question.
    source: data/cache/utility_rate_yoy.csv (Wisconsin Electric Power Co, WI) + data/sites/data_centers.csv
  - text: Home prices in Ozaukee County rose 13.7% over three years on a $487,274 median sale price. Property tax assessments rose only 3.3% over the same window, a gap that suggests the assessor has not yet caught up to the market or to the Stargate land-acquisition signal.
    source: data/cache/realestate_yoy.csv + data/cache/property_tax_yoy.csv (FIPS 55089)
  sources:
  - https://en.wikipedia.org/wiki/Port_Washington,_Wisconsin
  demographics:
  - text: Ozaukee County is 90.8% white, 3.6% Hispanic, 2.1% Asian, and only 1.5% Black, the whitest data-center county in Wisconsin and a sharp contrast against neighboring Racine's 10.6% Black share. The Stargate Lighthouse build is landing in the least-diverse hyperscaler county in the state.
    source: Census ACS 2023 B02001, B03003 (FIPS 55089)
  - text: 19.6% of Ozaukee workers are in manufacturing and only 4.6% of residents live below the poverty line. Unemployment is 2.5%, the tightest labor market in Wisconsin and matched only by Taylor TX in this batch.
    source: Census ACS 2023 C24050, B17001, B23025 (FIPS 55089)
  - text: Median gross rent in Ozaukee County is $1,112 per month against a 72.8% owner-occupancy rate. 93.0% of households have a home broadband subscription, the highest broadband share in Wisconsin data-center counties.
    source: Census ACS 2023 B25064, B25003, B28002 (FIPS 55089)
  - text: 89.3% of Ozaukee residents lived in the same house one year earlier and only 5.7% of adults are veterans. The county is a stable bedroom commuter base for Milwaukee professionals, not a transient industrial workforce.
    source: Census ACS 2023 B07001, B21001 (FIPS 55089)
