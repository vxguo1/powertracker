name: refresh-property-tax

# Annual refresh of Census ACS 5-year median real-estate tax per
# county (table B25103). ACS 5-year releases drop in mid-December
# covering the prior 5-year window — we run on January 15 to catch
# the new release plus any minor revisions.
#
# Will need its hard-coded year arguments (currently 2023, 2024) bumped
# in scripts/fetch_property_tax.py once ACS publishes 2025 5-year data.

on:
  schedule:
    - cron: "0 7 15 1 *"  # Jan 15, 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-property-tax
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pandas folium python-dotenv openpyxl
      - name: Refresh property-tax CSV
        # Unauthenticated Census API. Writes data/cache/property_tax_yoy.csv.
        run: python scripts/fetch_property_tax.py
      - name: Rebuild property_tax.pmtiles
        run: python scripts/build_tiles.py
      - name: Commit refreshed artifacts if changed
        run: |
          git config user.email "ci-bot@users.noreply.github.com"
          git config user.name "powertracker-ci"
          git add data/cache/property_tax_yoy.csv app/tiles/property_tax.pmtiles
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "refresh: property-tax ($(date -u +%Y-%m-%d))"
            git push
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
