name: refresh-annual-economic

# Annual refresh of the two December-release county economic layers:
#   - Census ACS 5-year median real-estate tax (table B25103)
#   - BEA county per-capita real GDP (CAGDP1 + CAINC1)
# Both upstream releases drop in mid-to-late December covering the prior
# year; we run on January 15 to pick up both plus any minor revisions.
#
# Will need its hard-coded year arguments bumped in
# scripts/fetch_property_tax.py and scripts/fetch_bea_gdp.py
# once ACS 2025 5-year and BEA 2025 county GDP land.

on:
  schedule:
    - cron: "0 7 15 1 *"  # Jan 15, 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-annual-economic
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pandas folium python-dotenv openpyxl
      - name: Refresh property-tax CSV
        # Census API now requires a key on every request. Writes
        # data/cache/property_tax_yoy.csv.
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python scripts/fetch_property_tax.py
      - name: Refresh BEA county per-capita GDP CSV
        # Public BEA zip downloads. Writes data/cache/county_gdp_yoy.csv.
        run: python scripts/fetch_bea_gdp.py
      - name: Rebuild PMTiles (property_tax + county)
        run: python scripts/build_tiles.py
      - name: Commit refreshed artifacts if changed
        run: |
          git config user.email "ci-bot@users.noreply.github.com"
          git config user.name "powertracker-ci"
          git add data/cache/property_tax_yoy.csv app/tiles/property_tax.pmtiles \
                  data/cache/county_gdp_yoy.csv app/tiles/county.pmtiles
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "refresh: annual economic (property-tax + BEA GDP) ($(date -u +%Y-%m-%d))"
            git push
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
