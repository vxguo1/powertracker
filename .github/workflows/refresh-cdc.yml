name: refresh-cdc

# Monthly refresh of the state-level surveillance layers:
#   - OD uptick (CDC xkb8-kh2a)
#   - Homicide uptick (CDC fpsi-y8tj)
#   - Temperature YoY ΔF (NOAA NCEI Climate at a Glance)
# All three regenerate their geojson and trigger a redeploy.
# Despite the name this isn't strictly "CDC" anymore; the file name
# is kept for cron continuity.

on:
  schedule:
    # 06:00 UTC on the 5th — CDC typically posts the previous month's
    # provisional release in the first few days of the following month.
    - cron: "0 6 5 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-cdc
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch OD uptick (multi-indicator)
        run: python scripts/fetch_od_uptick.py
      - name: Fetch homicide uptick
        run: python scripts/fetch_homicide_uptick.py
      - name: Fetch temperature YoY (state)
        run: python scripts/fetch_temperature_yoy.py
      - name: Fetch temperature YoY (county bulk)
        run: python scripts/fetch_county_temperature_yoy.py
      - name: Install Python deps for tile build
        run: pip install pandas folium python-dotenv openpyxl
      - name: Rebuild temperature + sites (county temperature feeds both)
        # build_tiles.py rebuilds all PMTiles; only temperature.pmtiles
        # and sites.geojson actually change unless other caches moved.
        run: python scripts/build_tiles.py
      - name: Commit refreshed artifacts if changed
        run: |
          git config user.email "ci-bot@users.noreply.github.com"
          git config user.name "powertracker-ci"
          git add app/od_uptick.geojson app/homicide_uptick.geojson \
                  app/temperature_yoy.geojson app/tiles/temperature.pmtiles \
                  app/sites.geojson data/cache/temperature_county_yoy.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "refresh: state-uptick + county temperature ($(date -u +%Y-%m-%d))"
            git push
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
