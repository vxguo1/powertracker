name: refresh-cdc

# Monthly refresh of the CDC-sourced state-level uptick layers
# (OD deaths via xkb8-kh2a, homicide rate via fpsi-y8tj). Both
# regenerate their geojson and trigger a redeploy.

on:
  schedule:
    # 06:00 UTC on the 5th — CDC typically posts the previous month's
    # provisional release in the first few days of the following month.
    - cron: "0 6 5 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-cdc
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch OD uptick (multi-indicator)
        run: python scripts/fetch_od_uptick.py
      - name: Fetch homicide uptick
        run: python scripts/fetch_homicide_uptick.py
      - name: Commit refreshed geojson if changed
        run: |
          git config user.email "ci-bot@users.noreply.github.com"
          git config user.name "powertracker-ci"
          git add app/od_uptick.geojson app/homicide_uptick.geojson
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "refresh: cdc upticks ($(date -u +%Y-%m-%d))"
            git push
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
